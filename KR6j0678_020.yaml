body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解五識陰五初示陰相阿難彼善男子修三摩地行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特伽羅酬業深脉感應懸絶於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗靜無復馳逸內內湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇通敘行滅識現也行為世間遷流之體性擾動生機之綱紐補特酬業之深脉能隱晦性天馳逸六根汩擾內湛為浮根塵究竟樞穴故行陰盡者生機綱紐倐然隳裂補特深脉感應懸絶而性天將大明悟六根無復馳逸以不馳逸故內內湛明以無樞穴故入無所入反動而靜深之又深故曰內內也涅槃性天為五陰所覆昏如長夜前三陰盡如雞初鳴雖為曙兆猶沉二陰精色未分此行陰盡如雞後鳴唯餘一陰故將大明悟也受命元由識陰也以行滅識現故深達無樞穴故可觀無遷流故可執無生機故不召遂了十方依正皆識所變故已獲其同性天精色雖未明徹而幽祕之相已漸發現此識陰之相也若於群召已獲同中消磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本群召同中即十二類之命元識陰也若於此中以定慧力消磨六門使根合而不分界開而不隔則見聞圓通六根互用由是外之世界內之身心無復留礙此識陰盡之相也性本一真由塵隔越性用之間同異失准名為命濁為識陰之體故識盡則超之識乃妄覺影明元無自體由顛倒起故名罔象虗無顛倒妄想二明狂解十一立真常因成外道阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見是名第一立所得心成所歸果違遠圓通背涅槃城生外道種識由行流故行空則還元既空行陰故已滅生滅尚依識元故寂滅未圓而能漸破識陰消磨六門故已六知根㳷合無隔諸類覺性通融不二故能入圓元圓元即融根隔通諸類之識元也若以此為真所歸地而立為真因則墮因所因執蓋真因非所有所皆妄娑毗外道認阿賴耶識未形之前冥然初相為所歸真因正同此也以心有所得果有所歸即因即果皆墮所妄所以違圓通背涅槃也今之行人於真性中輒起識心計因果生見解有所得有所歸者皆則得於識元歸於冥諦而已二計我生彼成遍圓阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種執識元為自體而謂一切衆生自此流出遂執我能生彼而實不能故曰能非能執摩醯首羅即色頂魔王也妄計我能現起無邊衆生亦能非能類也能為心能事果者計我能為彼依能成彼事也大慢天即摩醯也不能謂能故名大慢也遍圓者計我體圓遍空界也三計彼生我成倒圓種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見是名第二立因依心成妄計果違遠圓通背涅槃城生倒圓種以識元為所依故疑彼能生我及一切法遂計生起流出之處為真常無生之體此則在生滅中妄計常住既惑真不生性又迷現生滅法以非常為常故名常非常執也既計彼能生我即與計自在天能生一切者同矣由依識元妄計常住故曰立因依心成妄計果前計我圓生物此計彼圓生我故名倒圓四計物有情成倒知又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種所知即所觀識陰也謂識有知而一切法由知變起因計知體圓遍諸法遂立異解謂無情遍皆有知無所揀擇故曰無擇遍知此以無知為知故名知無知執婆吒霰尼二外道也執一切覺謂執一切有知也此謬計圓知以為因心則果終謬矣以無知為知是倒知也五崇水事火成顛化又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此群塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種識陰盡者消磨六門諸根互用今此未盡則才得隨順而已因隨圓互於是計一切法皆能圓化發生勝果謂火能顯發光明乃至塵能成就器界遂則邪求邪觀而勤心崇事執為能生勝果而實不能故名生無生執即三迦葉諸外道之儔也即迷真心從物求冀則因果皆妄顛倒化理名顛化種六計永滅依成斷滅又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明計明中虗非滅群化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種觀理不諦誤墮虗無故於圓明性中計皆空虗於是絶滅群化歸於永滅而不知其非名歸無歸執舜若多此云空言無想舜若即執斷空外道也以執斷空故圓虗無為因心成空亡之斷果永滅依即外道涅槃也七貪常固身成妄延又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄延種依識陰觀圓常執識元為圓精遂欲固保其身與之並存妄貪堅久不知其非名貪非貪執阿斯陀此云無比即長壽仙也彼雖延長終歸壞滅今此欲固妄身以求常住則空長勞耳妄延耳八留欲固命成天魔又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通却留塵勞恐其消盡便於此際坐蓮華宮廣化七珍多增寶媛恣縱其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種以識陰為命元而互通三際識陰若盡我命亦盡誰證真常故便於定中化諸欲境以留塵勞不令銷盡也依此邪思欲證真常而不知其非名真非真執吒枳迦羅能化欲境自娛即欲頂自在天類也因其邪思感生天魔唯恣塵欲名熾塵果媛美女也九證滅自休成纏空又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中分別精粗疏決真僞因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種命明者因窮識陰深明衆生受命元由也以生滅由識精粗由業故依四諦分別決擇以苦集為粗僞以滅道為精真於是專修道因求感滅果以少為足故居滅即休斯特定性聲聞上慢之儔也此則圓精應為因心成趣寂之小果精應者即決擇粗業唯求精應證於偏真纏空趣寂而已十存覺立證成不化圓又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種融淨覺明即識精也雖無惑習圓融清淨而未離於識故名覺明若以此為深妙立為果證則定性緣覺獨覺而已此則圓覺㳷為因心成湛明之滯果爾覺㳷如心精通㳷覺知通㳷之㳷謂僅與正覺通㳷而不前進也湛明即圓融覺明也所覺止於圓明識精而定性不回故名覺圓明不化圓種也上陳五十魔境皆是識情錯解邪悟未得正見者擬心動念皆墮其中雖證緣覺辟支猶為迷佛菩提亡失知見所以覺皇苦口垂慈勦心辨析欲人之不迷不失也然則如之何而可得耶當於五十位類審諦觀察覺已心念不墮其中斯得矣三結勸深防阿難如是十種禪那中途成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞緣覺不成增進窮道失趣故中途成狂轉遭枝歧曰因依迷惑所愛先習即邪傳謬解也祕為真得遂即休心將為畢竟所歸寧地適足自誤故邪魔依之終墮惡道二乘依之不成增進最宜深防也四敕令弘宣汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔自作沈孽保綏哀救消息邪緣令其身心入佛知見從始成就不遭歧路邪見錯解為妖為孽顛蹶身心謂之見魔心為內韄見宜外鍵故前防心魔此防見魔則助道之要盡矣五勉令究竟如是法門先過去世恆沙劫中微塵如來乘此心開得無上道識陰若盡則汝現則諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得先聖乘此心開得道後學固宜勉究也識盡則消磨六門故諸根互用從互用中入金剛慧發圓明心即心開事也直超信等入如來海歸無所得即得道事也金剛乾慧為等覺後心十信諸位為進修漸次此能直超不歷者諸位進修為治惑習今識盡無習故能超之等覺圓明歸無所得者自初乾慧修至等覺未為圓明猶有所得為識未盡也至獲金剛心破盡細識乃能圓明入妙覺海歸無所得此真修之盡道也妙莊嚴海者統衆德合異流不嚴而嚴無證而證之果海也前稱首楞萬行為妙莊嚴路則趍此而已三總結此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔消滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶若諸末世愚鈍衆生未識禪那不知說法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動汝當恭欽十方如來究竟修進最後垂範總結五陰辨魔之意使知深防也奢摩他中毗婆舍那者即定之慧也魔境皆因覺明而現所謂覺明分㭊即分析覺明此西天文勢也褫猶喪也二請益詳盡二初阿難請益阿難即從座起聞佛示誨頂禮欽奉憶持無失於大衆中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併消除為次第盡如是五重詣何為界唯願如來發宣大慈為此大衆清明心目以為末世一切衆生作將來眼二佛與詳盡三初總敘妄本佛告阿難精真妄明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影生死妄業塵垢妄緣真淨性中既無所留全因妄起猶如迷頭則五陰相中五妄為本從可知也妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是衆生妄心計度阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者明妄無因不容計度也知妄所起可說因緣不知所起因緣何有況推自然得非妄計耶是故如來與汝發明五陰本因同是妄想二別答所問三一答五陰妄本五一色本堅固汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虗妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想想為虗妄影像欲愛深脉遺體自想愛流出故曰體因父母想生陰心乘想愛冥求故曰心於想中傳命酢梅等說以驗體因妄結故與妄理相應若非妄倫則妄不能感也體因想生心因想起命因想傳諸想交固以成色陰故名堅固妄想二受本虗明即此所說臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想臨高空想而酸澀真受違順皆妄而損益現馳則受陰無體虗有所明故名虗明妄想三想本融通由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想念慮虗情也色身實質也虗實不倫而能相使者由想而融也心生虗像形取實物心形異用而能相應者由想而通也至於寤寐搖變使心隨境使境隨心皆融通妄想也四行本幽隱化理不住運運密移甲長髮生氣消容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想初標行陰幽隱之相阿難下牒辨虗妄之理而結成五識本罔象又汝精明湛不搖處名恆常者於身不出見聞覺知精湛不搖指識體也見聞覺知指識用也非真常而執常曰名恆常者若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用開合此之妄想無時得滅精真不容妄習今能藏昔宛不遺失即妄習也則湛雖不搖而念念受熏其容妄多矣當知湛非真湛特幽潛不覺耳故譬急流之水幽潛流注不可測知此真憶想之元容妄之體也直須破盡識陰消磨六門使妄習無寄然後可滅也故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想上皆標敘至此結顯也串常習也幾微也精明湛識為六用常習之本故見覺幾微斯即湛識罔象潛於見覺之中故名中串習幾似無曰罔以有曰象其體精微故名罔象虗無顛倒精想二答五陰邊際阿難是五受陰五妄想成汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際五受陰亦曰五取蘊由一念迷妄受此取此以自蔽藏也言因界者本無有界由妄相因也故色不自色因空有色故成色邊際乃至滅不自滅因生有滅故成行邊際識稱湛了而湛不自湛因行不流逸性入元澄而合乎湛了成識邊際三答陰滅次第此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併消事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問識譬則劫波巾也色譬則最後結也結依巾有故生因識起解因次第故滅從色除五陰生起從細至粗由迷智有識乃至由受有色也滅則從粗至細必破色而後受現乃至破行而後識現也理則頓悟乘悟併消者知巾本無結亦不有也事非頓除因次第盡者中根頓悟必假漸修也若因悟忘修則有解無行執理迷事適墮偏邪終非正修真三摩地三結勸弘宣汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界令以此義自覺覺他永斷妄元齊歸正果也三流通分二一顯勝勸持阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充遍皆施珍寶窮劫思議尚不能及是福云何更有邊際佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念消滅變其所受地獄苦因成安樂國得福超越前之施人萬倍千倍千萬億倍如是乃至算數譬喻所不能及寶施有竭福止一身法施不窮利沾無際故不唯獲福兼滅重罪波羅夷即十重也以法示人能消劇報變苦為樂如此其勝者使人因之明心見性脫粘復湛解六亡一破陰褫魔不歷僧祇成寶王果故也彼既如是則此消劇報猶淺近言耳誠將與彼同證也阿難若有衆生能誦此經能持此呪如我廣說窮劫不盡依我教言如教行道直成菩提無復魔業上勸流通此勸誦持二聽衆欣奉佛說此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去皆在會聽衆也聖仙童子即天仙類也大力鬼神諸護法者隨所證量皆得法喜也音切秉音丙歧音祇媛于願切霰蘇見切褫敕爾切串古患切㳷音泯首楞嚴經者乃釋迦如來之骨髓也其言曰當知虗空生汝心內猶如片雲點太清裏汝等一人發真歸源此十方空悉皆消殞又云無漏真淨云何是中更容他物若能轉物即同如來陳隋間天台智者聞五印土有此經日夜焚香西向頂禮願早至中國續佛壽命開人天眼逮唐神龍初方達南海訓釋者數家唯長水子璿師疏及蘇臺元約師鈔盛行於世然文義浩博學者泛其波瀾益昧源本疲於披覽溫陵寶勝戒環禪師少達妙理深悟大乘而首楞嚴尤謂得意嘗欲誘中止之徒徑登寶所乃為要解鈎深索隱續斷截繁錯節盤根遊刃言約義豐詞暢理詣披其解則見其經文理昭然如指諸掌惜乎未及流通而禪師委蛻泗州長老行璿久從之游深念刻意乃為募緣鏤板以廣其傳嗚呼誰無是佛誰無是經鬬沒額珠醉迷衣寶學者苟能依要解以明經洞真經而見性則妙湛總持王首楞嚴萬行不從人得也乃知寶勝之切老婆心泗州之飾畫蛇足不徒然矣建炎己酉中秋後五日住湖山萬安比丘行儀謹跋
