body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解三結功阿難是佛頂光聚悉怛多般怛囉祕密伽陀微妙章句出生十方一切諸佛十方如來因此呪心得成無上正遍知覺十方如來執此呪心降伏諸魔制諸外道十方如來乘此呪心坐寶蓮華應微塵國十方如來含此呪心於微塵國轉大法輪十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記十方如來依此呪心能於十方拔濟群苦所謂地獄餓鬼畜生盲聾瘖啞冤憎會苦愛別離苦求不得苦五陰熾盛大小諸橫同時解脫賊難兵難王難獄難風火水難飢渴貧窮應念消散十方如來隨此呪心能於十方事善知識四威儀中供養如意恆沙如來會中推為大法王子十方如來行此呪心能於十方攝受親因令諸小乘聞祕密藏不生驚怖十方如來誦此呪心成無上覺坐菩提樹入大涅槃十方如來傳此呪心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨若我說是佛頂光聚般怛囉呪從旦至暮音聲相聯字句中間亦不重疊經恆沙劫終不能盡所謂呪心者即大白傘蓋廣大無染周覆法界如來藏心祕密法門也惟其廣大周覆為如來藏故持之因之即能出生諸佛成無上覺降魔應化拔濟群苦及餘功德經恆沙劫說不能盡也地獄餓鬼等略舉八難之四怨憎愛別等略舉八苦之四也灌頂經大橫有九小橫無數攝受親因即攝諸有緣也亦說此呪名如來頂汝等有學未盡輪回發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處上顯如來境界此明亦攝漸修四勸持三一總勸阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白㲲書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害二顯益二一標阿難我今為汝更說此呪救護世間得大無畏成就衆生出世間智二釋若我滅後末世衆生有能自誦若教他誦當知如是誦持衆生火不能燒水不能溺大毒小毒所不能害如是乃至龍天鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神磣心毒人於如是人不能起惡頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護即所謂救護世間得大無畏也以誦呪利彼故諸惡鬼王皆領深恩金銀入藥或能發毒阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑所謂成就衆生出世間智也華嚴百二十大數初云一百洛叉為一俱胝俱胝俱胝為一阿庾多阿庾多阿庾多為一那由他對此方百千萬億兆京姟則洛叉為一億俱胝為兆那由他即姟也精心陰速者妙心陰潛速疾資發也三廣顯十一不墮惡趣從第一劫乃至後身生生不生藥叉羅剎及富單那迦叱富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處一劫言修行之始後身言修行之成二獲功德聚此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可說不可說劫常與諸佛同生一處無量功德如惡叉聚同處薰修永無分散不作有為之業自獲無漏之福華嚴百二十大數阿僧祇當一百三不可說不可說當一百十九惡叉果名生必同聚三衆行成就是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齊戒自成齊戒以摩登得果推之不誣然持之須得其人也故前言一不清淨不得成就後言如法持戒必得心通行人審之勿徒希覬也四滅輕重罪阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時消滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮未受謂未持呪時飲噉等皆言往事也比丘四棄即前四重犯當屏棄不得共住比丘尼八棄加觸八覆隨五消除宿障阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯消雪不久皆得悟無生忍六所求隨願復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方土國必定不生邊地下賤何況雜形雜形鬼畜等類也七能安家國阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆消滅支提云可供養處即淨剎通稱也脫闍云幢八歲豐民樂阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢九災變不作阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆消滅十二由旬成結界地諸惡災祥永不能入天反時物逆理皆所以為災而反之逆之職由乎人天與物應之而已所謂災變惡星則應人之災惡者也八萬四千應衆生煩惱業也二十八則四方之紀八則五行之經及羅計孛也順則福應逆則災應所謂惠迪吉從逆凶也能生災異者亦應其逆而已如彗孛飛流為應同分非星之為也今以呪力叶乎百順故惡變悉滅於天災祥不入其境祥吉凶先見也十結告行人是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語言戒潔心誠決能感致也心通謂障消智明如金剛藏速發之事三衆願護持六一金剛衆說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誠心保護如是修菩提者二天王衆爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願唐宣律師行道跌足事符此說三鬼帥衆復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿四天神衆復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏五地祇衆復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事風師行風風王主風此與無色天繼地祇舉者前舉釋梵方及二天後舉地水未盡風火故終舉風神以該四大舉無色以該三界也六菩薩衆爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩地正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願欲色界中一天名大自在即魔王天也二修道分竟三證果分由前密因了義而修可以高證佛果也阿難於此獨問修證地位世尊答文首敘十二類生而後明五十七位者意使一切衆生依此法門從凡入聖重重研極至盡妙覺成無上道而後已也文二初阿難請問阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益世尊如是修證佛三摩地未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈音瞪瞢瞻仰聖位極果曰涅槃初因曰乾慧自乾慧入信住行向及四加行為四十四心即信解行位目曰修行復進十地名入地中是為初證至十一地名為等覺猶是分證及到涅槃名為妙覺乃極證也凝視曰瞪冥心則瞢二佛慈開示二初讚許爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩地求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝說阿難大衆合掌刳心默然受教刳除雜想虗心受教也二廣陳五初本無修證佛言阿難當知妙性圓明離諸名相本來無有世界衆生二因妄有修因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號生滅真妄菩提涅槃皆所謂諸名相也妙性之中本來圓離由迷妄相因故有修有證於是轉不覺而依菩提轉生死而依涅槃名二轉依號三令識妄因二一略舉阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地前明三種相續此明二顛倒因乃開合言之下云熏以成業即攝業果但前明生起之相此明修斷之要義同意別也修三摩地能識倒因乃能斷治倒妄不生則復正性故曰斯則如來真三摩地二詳明三一總敘倒因阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生性明心指真如體也性明圓言不守自性也由其不守自性故因妄明而發妄性因妄性而生妄見於是從無相真成有相妄故曰從畢竟無成究竟有然此能有所有能住所住悉皆非因所因悉皆了無根本文互見也本此無住建立世界衆生則知二者無因無本全即倒妄而已二派成二倒二一衆生顛倒迷本圓明是生虗妄妄性無體非有所依迷真起妄衆相競生故名衆生此明起妄之本下明競生之相將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有衆生顛倒因迷本性故欲復真然希欲心生自已失真故曰欲真已非真真如性也以非真而求復於真則宛轉成妄故曰宛成非相遂使生住心法百非競發展轉熏感故衆相競生焉無而忽有曰生生而暫停曰住緣慮相續曰心染淨差別曰法衆生顛倒由是發生也二世界顛倒阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化衆生成十二類牒前此有所有非因所因等義以明也有所有故有分段有分段故有方位界為方位故因此界立也無所因則無所住無所住則常遷流世為遷流故因此世成也三世四方宛轉十二故涉乎其間者悉從其變此世界顛倒之由也三廣明化理二一原十二變是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復萬物皆從流動生形動則有聲形即色也故曰因動有聲因聲有色香味觸法皆相因而具焉由此六境發起六情名六亂妄想正為惑業之本故名業性十二類生因此輪轉也世間聲香味觸牒上六亂妄想之類也謂其區分既各十二窮變亦各十二故六亂妄形自無明緣行而變以至老死終而復始故曰窮十二變為一旋復二辨十二類三一總標乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想輪轉顛倒相即六亂妄想等也二別明十二一卵生阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞卵惟想生虗妄即想也想體輕舉名動顛倒卵以氣交名和合氣成想多升沉名飛沉亂想故感魚鳥飛沉之類也十二類各八萬四千者各由八萬煩惱感變也羯邏藍云凝滑入胎初位胎卵未分之相也二胎生由因世界雜染輪回欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞胎因情有雜染即情也情生於愛名欲顛倒胎以精交名合和滋成情有偏正名橫竪亂想故感人畜橫竪之類遏蒲曇云泡即胎卵漸分之相也虗妄雜染執著留礙等有情皆具但隨偏重者感類耳羯南等胎卵皆具而次第言者前能具後後不具前三濕生由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞濕以合感執著即合也合由愛滯觸境趨附名趣顛倒濕以陽生名和合暖成所趣無定名翻覆亂想故感蠢蠕翻覆之類也蔽尸云軟肉濕生初相也十生皆本於淫欲起於情想以迷情愈妄故化理愈乖以至蕩為空散頑為木石妄末雖殊妄本一也四化生由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞化以離應變易即離也離此托彼名假顛倒觸類而變名和合觸成轉故趣新名新故亂想故感報亦爾蛻脫故趣新也如蟲為蝶則轉行為飛如為蛤則蛻飛為潛凡以不同形而相禪皆轉蛻也羯南云硬肉蛻即成體無軟相也自下皆稱羯南者諸類通稱止此若第五鉢羅奢佉曰成形則各隨貌狀非通稱也五有色由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞真性融湛本非留礙亦非光耀由迷滯故成留礙輪回障失融湛妄合明著粘湛發光以成精耀休為三光咎為孛彗一切精明神物皆精耀也其想已結成精耀故但有色而已涅槃云八十神皆因留礙想元成其精耀此雖至精至神亦未離乎乘彼輪轉顛倒想也六無色由因世界消散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散消沉其類充塞厭有著空滅身歸無名銷散輪回迷漏無聞名惑顛倒厭有歸無則依晦昧空故和合暗成而名陰隱亂想即無色界外道類也此有想無色而不無業體故亦稱羯南又有惑業昏重形色消磨體合空昧識附陰隱亦空散消沉類也七有想由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞虗妄失真邪著影像無所托陰從憶想生於罔象中潛結貌狀其神不明而幽為鬼精不全而散為靈無有實色但有想相八無想由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯槁亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞不了諦理固守愚惑愚鈍之極則癡頑無知精神化為土木金石無復情想即枯槁也如劫毗羅之石燕昭墓之木鄭人緩之璧皆精神之化也九非有色由因世界相待輪回僞顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞水母之類以水沫為體以蝦為目本非有色待物成色不能自用待物有用迷失天真綿著浮僞彼此異質染緣相合故曰因依十非無色由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由是故有非無色相無色羯南流轉國土呪詛厭生其類充塞邪業相引使性情顛倒而乘呪托識不由生理妄隨呼召即世間邪術呪詛精魅厭物因而有生者不由生理則本自無色既感成質非無色也十一非有想由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞二妄相合性情罔昧異質相成生理回互如彼蒲盧本為桑蟲非有蜂想而成蜂想十二非無想由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞怨害相酬傷殺相反生理怪誕棄絶倫義故感土梟之類因土塊毒果成形非無鳥想而本無想三結是名衆生十二種類此皆不了妙覺明心迷陷情欲積妄發生隨妄輪轉非正修行莫能免脫故次示除妄修證之法音切樺胡化切詛莊助切磣初錦切夭於兆切刳音枯區豈俱切邏郎箇切蠢尺尹切蠕而尹切蛻音稅蝦呼牙切梟音澆塊苦對切
