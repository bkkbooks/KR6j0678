body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解三六識悟入六一眼識舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於中路逢迦葉波兄弟相逐宣説因緣悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生佛問圓通如我所證心見發光光極知見斯為第一心見眼識也識清淨故種種通利心無際故見覺圓明心見發光光極知見者由心見發明而圓照萬法也迦葉兄弟即優樓頻螺等或云遇馬勝説偈彼乃小乘因緣非圓通所取身子智慧第一聲德居長故稱長子二耳識普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就佛問圓通我説本因心聞發明分別自在斯為第一行無不遍曰普佑上利下曰賢以周遍佑利故凡具大根修菩薩行皆名普賢之行心聞耳識也分別衆生知見者擇普賢行而成就之也三鼻識孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及俱絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸消鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提佛問圓通我以消息息久發明明圓滅漏斯為第一孫陀羅難陀云𧰟喜佛親弟也前數息依根所以攝心此觀白依識所以駐心也息由風火而起鼓煩惱濁故其狀如煙昧者不覺唯諦觀能見六交見火燒息能為黑煙紫焰皆煩濁所發也淨觀發明則煩濁漸消故內明外虗而煙消成白及乎漏盡無復煩惱內瑩發光故出入息化為光明也消息即消煙成白也滅漏即心開漏盡也皆由鼻息發明也四舌識富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣説苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我説法無上佛問圓通我以法音降伏魔冤消滅諸漏斯為第一説法第一辨才無礙因以降魔滅漏皆舌識力也苦空實相者世間諸法一切無常一切皆苦一切皆空而中有真常不苦不空如涅槃四德即實相也佛以身口意三輪應物無滯音聲即口輪也五身識優波離即從座起頂禮佛足而白佛言我親隨佛逾城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推為上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一優波離云近執謂親近執侍於佛也言親隨親觀乃至脫欲承教皆明身識欽承也行住坐臥律儀各二百五十對三聚成三千復以三千配身口七支復配四分煩惱成八萬四千性業即殺盜淫等根於性者遮業即支末愆失因過遮止者戒律為衆綱紀親印我心言衆所印可也我以執身等者言由持戒故身與身識無不圓通也律中得度波離第一僧中得度憍陳最初故今堂置憍陳壇置波離各立本也六意識大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣説如來因緣深義我頓發心得大通達如來惠我袈娑著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來歎我神力圓明清淨自在無畏佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一因緣深義謂非世間和合粗相乃發明世出世法故因之發心得大通達神通如意也旋湛者旋意識而復妙湛故久成清瑩通力圓明清淨自在也四七大悟入七一火大烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王説多淫人成猛火聚教我遍觀百骸四支諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔冤佛問圓通我以諦觀身心暖觸無礙流通諸漏既消生大寶𦦨登無上覺斯為第一烏芻瑟摩云火頭即火頭金剛也多淫之人本由暖觸迫發生為欲火死為業火業力增熾故成猛火聚也遍觀暖氣者令悟火大無礙流通也諸礙既消故神火內凝成智慧火發於頭上故名火頭生大寶𦦨即火光三昧也二地大持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛現在世時世多飢荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齋我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別來如來藏虗妄發塵塵消智圓成無上道斯為第一平險防損代人濟牛無彼我相表善平心地無有高下也毗舍浮此云遍一切自在亦由平心故一切自在也我即心開下皆因地大圓悟也身界二塵本如來藏虗妄發生故不相摩觸了本虗妄即悟無生矣妙蓮華佛知見地即諸佛心地法門也行實圓契染淨雙忘名妙蓮華逈出三乘深造一實名佛知見地持地所持在此而已故得身界塵消無上智圓也三水大月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盼而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前説如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一月太陰水精也昔師水天修習水觀水性圓明故號月光修習水精謂觀水精性也水性無奪者內之津血外之剎海水相雖異而性不相奪此即因水悟圓也浮幢王剎者世界海外諸香水海通號也我於是時至身質如初敘作觀之緣也但見其水謂專於一觀未融四大故未得無身舍利弗於恆河岸入定遭怨害之鬼所掌而出定頭痛亦未得無身故也山海自在通王即於地水諸大得妙圓通者也月光至此乃融四大故方得無身而性合真空初由水性一味流通耳漢州綿竹縣水觀和尚迹同月光稠禪師入火光定其室如焚亦此類也四風大琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此群動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一因風大悟圓身心發光洞徹無礙號琉璃光無量聲佛亦依風大開示菩薩使知本覺無動而身界之動皆風力所轉琉璃光因是觀界觀世觀身觀心遷流運止悉唯風力故曰諸動無二由是覺了大千群動皆即狂勞猶百蚊蚋鼓於方寸耳既了狂勞乃見不動佛也東為群動之本而佛號不動乃即動而靜者也能即動而靜故身心無礙也傳一妙心者知風力無依萬動皆妄而獨證無動本覺也五空大虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一因證空性故性中所有一切皆空身與剎海涉入無礙號虗空藏定光即然燈佛也於定光所得無邊身者法身如空無有邊際必假心燈寂照而後發明也執四寶珠等者由觀四大無依妙力圓明而照了法界一切皆空所謂虗空無二佛國本同也又於自心現大圓鏡等者亦由四大無依妙力圓明於圓洞心內瑩發光而交徹融攝也幢王剎即華嚴法界剎名六識大彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地歷劫已來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一彌勒此云慈氏為慈隆即世悲臻後劫愍物迷識故示迹發明也心重世名好遊族姓者迷識著境故外慕妄求也從燈明教而名心頓歇者了識依智則迷妄自除也然燈佛現乃成妙圓者迷妄既除心燈即現心燈既現則萬境妙圓矣得是妙圓三昧遂了三界唯心萬法唯識故盡空如來皆我心變國土淨穢亦我心變無量佛性從此發揮是謂流出無量如來至得補處亦不離此也識心圓明入圓成實等者由妙圓識心證入實智不復迷識逐境種種計著也七根大前云見大此云根大者前舉一例諸此舉總兼別大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一大勢至亦名無量光觀經云以智慧光普照一切令離三塗得無上力名大勢至今表念佛三昧能發智光離三塗苦其力無上也所值之佛名無量光十二如來相繼一劫最後名超日月者表念佛之人自性如來十二時中淨念相繼則無量性光終自發明超於日月也觀經曰夫念佛者不得一彈指間念世五欲是謂繫念脫能如此一無間雜則無量性光自然發明下所謂不假方便自得心開者此也譬如下示必須繫念然後相應不專念佛則雖逢不逢雖見不見也染香則襲香念佛則見佛故以念佛妙薰名香光莊嚴也念佛得忍者蓋以淨念蠲濁想正念滅邪受邪濁既遣心境空寂一切不生名無生忍如此則自性佛土淨矣故可攝行人同歸也音切隘烏介切填音田闤音還闠胡對切推他罔切液余石切窺去規切稚直利切捷疾葉切激音擊
