body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解三深窮萬法決通疑滯入道以見性為本了法次之蓋雖見性不了萬法則觸途成滯故於發明心見顯如來藏之後復以富那呈疑窮辨山河大地諸有為相使法法決了一無疑滯然後修進可以順造也文三初富那疑問十大弟子阿難多聞富那説法各居第一前欲激發多聞狂慧使生正見故以阿難發起此為群疑塞滯須藉講通故以富那發起皆聖人應機方便也文二初敘疑爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦先讚前法次敘疑情也冠三乘統萬法名第一義諦世尊常推説法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地前所宣明旨義幽遠根機昧劣故譬聾人百步聞蚋以第一法才猶昧則中下之機難無疑惑所以富那示疑而請也世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所説法音尚紆疑悔阿難習漏未除容有疑惑富那既盡諸漏尚縈疑悔則餘衆可知也二正問二一問藏性清淨何生諸相世尊若復世聞一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始清淨則宜無諸相本然則宜無遷流二問四大各遍云何相容又如來説地水火風本性圓融周遍法界湛然常住世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界而我不知是義攸往唯願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨二問皆躡前四科七大之文起疑也意以性相相違理事相礙實常情疑滯故為致問庶獲決通二如來決答二一通許爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處汝今諦聽當為汝説有世俗諦有勝義諦脫俗冥真超情離妄世間三有出世二乘以所知心不能測度是謂勝義諦中真勝義性即下文由覺明以辨真覺因了發以窮諸妄至於山河不復出水火不相陵身含十方毛現塵剎皆勝義諦中真勝義性也定性聲聞即沉空趣寂者未得二空即初心有學回向上乘則大心羅漢一乘寂滅場地即冠三乘離諍論之真趣也阿練若云無喧雜富樓那等欽佛法音默然承聽二正答二一答諸相所起三初明本佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣説性覺妙明本覺明妙富樓那言唯然世等我常聞佛宣説斯義性覺妙明本覺明妙者萬法體用異稱也能性一切曰性覺性覺之妙顯乎明即自體而出見於萬法者也性之所本曰本覺本覺之明藏乎妙即自用而反冥於一真者也了斯二義則體用一覺物我一妙無復諸相之異矣佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺促舉前義問之定其解惑也夫汝所謂覺所謂明意作何解為此性本自明靈然不昧故稱之為覺耶為復性自不明用心覺之故稱之為明覺耶靈然不昧者真覺也用心覺之者妄覺也富樓那言若此不明名為覺者則無所明富那意以性明為覺不以不明為覺故曰若此不明則無所明然不知纏有所明即墮妄覺無窮妄業由是而生也故下云覺非所明因明立所所妄既立生汝妄能佛言若無所明則無明覺明覺之妄由所明起有所非覺無所非明無明又非覺湛明性覺離能所故有所非覺照了諸相故無所非明若果非明又不得謂之覺湛明性當知有所無所是明非明皆為妄度終非妙明明妙之真也二敘妄二初三細所起性覺必明妄為明覺前云性覺妙明此云性覺必明者湛然寂照曰妙明強生了知曰必明妙明則真必明則妄所以妄為明覺此即三細之首妄識初相也起信云由不如實知真如法一故不覺心動即此相也覺非所明因明立所所既妄立生汝妄能無同異中熾然成異真覺本無能所因必明故妄見有所能所既立心境互分故無同異中熾然成異即轉相也異彼所異因異立同同異發明因此復立無同無異如是擾亂相待生勞勞久發塵自相渾濁以彼熾然之異為異復因異相立同又因其有同有異故復立無同無異一真體中本無是事皆由能所對待妄立以擾發情塵遂使妙明斯渾妙湛斯濁晦昧空色自此兆矣即現相也上三屬根本煩惱下起六粗即枝葉也二六粗所起由是引起塵勞煩惱由三細而引起也染污為塵擾動為勞憂煎為煩迷亂為惱即智及相續執取計名四粗之總相自下世界相續衆生相續即業相也業果相續即業繫苦相也三感結三一總明起為世界靜成虗空虗空為同世界為異彼無同異真有為法妄覺動則勞擾發塵故起為世界妄覺伏則頑然冥漠故靜成虗空法界一空曰同情器萬殊曰異此乃於無同異中熾然成異故曰彼無同異真有為法二別明三一世界起始覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界火騰水降交發立堅濕為巨海乾為洲灘以是義故彼大海中火光常起彼洲灘中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種以是因緣世界相續萬法自五行變化五行由妄覺發生故世界起始肇於覺明而依乎風金水火以生成萬物也真覺妙空本非明昧由妄為明覺遂有昧空明昧相傾則不覺心動故曰覺明空昧相待成搖故有風輪世界最下依風輪住故曰執持世界因空生搖等者因空昧動念覺明堅執而立礙感金也大地最下依金輪起故曰保持國土堅覺寶成等者因堅覺妄搖觸起煩惱而感火也內外二界革生為熟化有為無皆火大所變故曰為變化性寶明生潤等者由堅覺生識而蒸以煩惱積情發愛而感水也世界居大海內故曰含十方界火騰水降等者妄覺煩起妄識橫流交結立礙而感土也地性堅礙故曰立堅其高為山其深為海皆土也水阜曰洲沙汀曰灘諸皆肇於妄覺感於五行故曰交妄發生遞相為種也土水生木木土生金金木生火火金生水水火生土世界初由覺明發識為水空昧結色為土相待成搖為風為木即土水生木也又因空昧之土生搖為木而堅明立礙即木土生金也餘文甚明土由水火所生若子受父母氣分故海中火起灘中水注也五行以我尅為妻夫劣然後陰陽和而生子故水劣火為山土劣水為木焰融明水火氣分燒絞明土水氣分也此世界相續之由也二衆生起始復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化明妄者指堅明明覺搖明之妄無他特覺明妄心為咎耳真明妙理本無能所元一圓融清淨寶覺由所妄既立遂成隔礙故明理不踰以不踰故聽見六根於是妄局色香六塵於是妄染覺知六識於是妄分根塵識三為業性故發起妄業於是同業相纏合離成化此六道四生之始也同業即胎卵類因父母己三者業同故相纏著而有生合離即濕化類不因父母但由己業或合濕而成形即蠢蠕也或離異而托化如天獄鬼等類也見明色發明見想成異見成憎同想成愛流愛為種納想為胎交發生吸引同業故有因緣生羯羅藍遏蒲曇等胎卵濕化隨其所應卵唯想生胎因情有濕以合感化以離應情想合離更相變易所有受業逐其飛沉以是因緣衆生相續妄見所明而顯發妄色曰見明色發此由心生境也因明起見而因見生想曰明見想成此由境生情也見異則境違故成憎想同則心順故成愛三愛交注曰流三想相投曰納愛為輪回根本故流愛為種想為傳命之媒故納想成胎藉交遘而發生由同業而吸引此受生托質之始也胎中五位七日一變羯羅藍此云凝滑初七日之相也遏蒲曇云皰二七日之相也以至鉢羅奢佉等也四生之類卵應於想胎應於情濕應於合化應於離故曰隨其所應也亂思曰想結愛曰情氣附曰合合濕而生也形遁曰離離此生彼也情想合離有生皆具此以多分言耳卵生居首者想念初動情愛後起又兼胎濕化故也此文論想乃內分染想非外分淨想論化乃轉蛻業化非意生妙化也情想合離更相變易者或情變為想合變為離無定業也卵易為胎濕易為化無定質也故所受業報或升或沈無定趣也此衆生相續之由也三業果始起富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本父母子孫非愛不聚非欲不生貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本胎卵濕化以弱遭食緣貪起殺以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本不與而取曰盜又陰取曰盜以人食羊不與取也羊死為人互來相噉陰取也世間相噉皆盜貪也淫殺盜三為業果根本汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛上明業果之本此明相續之由負債殺盜由也愛憐欲貪由也唯殺盜淫三為根本以是因緣業果相總結顯也三結答富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始總牒前文結答世界衆生業果皆覺明為咎也覺明即性覺必明者也明了知性即妄為明覺者也了發相即因明立所者也妄見即生汝妄能者也此虗妄指覺明也前問云何忽生山河至終而復始此全牒其辭而指覺明以答也四躡迹疑難二一富那反難富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生妙覺指無真妄之體也本妙覺明依真起妄者也衆生覺體與佛無別無端忽生諸有為相則如來既證空覺何時復生諸有耶此固常情所惑故特反難也二佛與曲盡五一既覺不迷二一喻明佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟所出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟聚落村市也漢書無燔聚落聚落喻性分南北喻迷倒然南北初不易則性分本無倒故曰迷本無根悟非生迷佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊二合顯富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷顯既覺不迷也昔本無迷而謂從迷覺名覺迷迷二妙空無習二一喻明亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧翳喻妄見華喻山河空華滅地喻妙空明覺富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧二合顯佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地既了所喻何復前疑三果覺無變又如金礦雜於精金其金一純更不成雜四果德無生如木成灰不重為木五結答諸佛如來菩提涅槃亦復如是菩提果覺也涅槃果德也果至無變無生則習漏不生可知矣四喻之意前二明昔本無迷迷由妄起後二明習漏妄緣證乃永斷若但舉前喻恐謂妄不妨真惑能自滅成撥無執但舉後喻恐謂覺本非淨性本有生成雜染見所以四喻兼舉使知迷悟雖妄而不廢修證也二答四大相容二一牒富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相陵滅又徵虗空及諸大地俱遍法界不合相容二答二一略明能容二一引喻富樓那譬如虗空體非群相而不拒彼諸相發揮虗空非諸相而諸相依空而發真體非四大而四大攬真而成先非水火故不相拒此總標下別釋所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映此示諸相下明相容霾風雨土也於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中霄雲霧之時不生光曜當知是明非日非空不異空日觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者觀相既妄陵滅亦妄觀性一真無不容者隨處而發故曰殊方彼指日雲等也二合顯真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現此如空非相不拒發揮也汝以空明等者以事言之如鑿井出空照燧生火是也以業言之如起為世界靜成虗空風金相摩故有火光是也以心言之妄起空見則有空現地水火風亦復如是故曰各各發明則各各現各各謂前後也俱謂同時也云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據釋俱現之相也日影隨人不一如七大隨緣成異先無準的不應詰難二廣明互現三一隨妄發現富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相迷失真體分別緣影名背覺合塵了相元妄觀性元真名滅塵合覺二依真發現我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪色空世間妄相也妙明真如妙性也皆如來藏所現元一圓融特由衆生背真合妄故局促世相之中諸佛滅妄合真故妙得真如之用所以一多互應小大相容現寶剎於毛端轉法輪於塵裏事事無礙法法如如蓋由觀相元妄無可陳指觀性元真故無不容者三離即圓會三一依體圓非滅塵合覺故發真如妙覺明性而如來藏本妙圓心非心非空非地非水非風非火雖滅塵發真於一多小大能一切如而本妙圓體初無變異故非心非火乃至非世出世法也非心非火謂七大五陰也心即識大而攝五陰非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界謂非十八界亦攝十二處非明無明明無明盡如是乃至非老非死非老死盡非緣覺法也緣覺觀十二緣欲翻無明為明十二緣有生起相有修斷相此兼舉之非苦非集非滅非道非智非得非聲聞法也聲聞修四諦法以智為能證以果為所得非檀那非尸羅非毗梨耶非羼提非禪那非般剌若非波羅蜜多非菩薩法也菩薩修六度行檀等即施戒忍進禪智也波羅蜜即度也如是乃至非怛闥阿竭非阿羅訶三耶三菩非如來法也怛闥阿竭此云如來阿羅訶云應供三耶三菩云正遍知即十號之三也非大涅槃非常非樂非我非淨非佛果法也常樂我淨為涅槃四德以是俱非世出世故結上起下也自七大至十八界為世間法自緣覺至大涅槃為出世法二依用圓即即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨體雖無變用乃如如故即心即法即法即心也三雙會圓泯以是俱即世出世故即如來藏妙明心元離即離非是即非即既非而即即即而非妙絶心言不容測度矣此文似乎矯亂而各有所主初曰本妙圓心自體言也次曰元明心妙自用言也終曰妙明心元合體用言之也本妙圓心是本非末是圓非偏是心非物乃真淨妙體故非一切法也元明心妙是元非本是明非體乃如如妙用故即一切法也妙明心元是妙之明是心之元徼妙並觀故離即離非是即非即妙造乎此則體用圓泯情謂斯絶而藏心妙性廓無瑕玷矣三結責妄度如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見結妙絶心言責其妄度蓋為擬心動念即乖法體也譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足琴音雖具非指不發人心雖圓非師不悟前之多方顯如來藏即佛之按指也身心萬法當處昭然即海印發光也而富那等隨語生解疑慮紛紜是塵勞先起也此由不求無上覺道愛念小乘之咎也今夫宗師扣擊直下歷然學者因之競生狂解皆由情塵易起故動涉疑妄使知無上覺道則一唱一酬足以廓清天地何復塵勞之有大集經云閻浮萬像皆現海中故名海印四躡迹疑難二一富那疑難二初問難富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切衆生何因有妄自蔽妙明受此淪溺躡上各各圓滿之言發問也既悟無二益顯妄淪而不知妄之所由故請窮其因二答難三一原妄所起二初引喻佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故演若達多狂人也愛鏡中頭責己狂走喻因執影明遂迷本真妄隨流轉二法合佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返妙覺明圓指我與如來無二圓滿者本圓明妙言本無虧欠本無迷妄也此人人本來面目也奈何以妄二之虧之遂分物我強起愛憎諸妄相因迷輪不返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人説夢中事心縱精明欲何因緣取夢中物況復無因本無所有富那自恨昔遭妄想而稱世尊諸妄圓滅似謂迷有所因妄有可滅故告以此如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性如是因何為在牒喻重顯令了妄無因無可滅者二勸息妄緣汝但不隨分別世間業果衆生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇世間業果衆生皆妙心影明如鏡中頭分別則妄故不隨分別則狂性自歇也以世間業果衆生為三緣者妄心緣之而起也以殺盜淫為三因者妄心因之而有也所謂自諸妄想展轉相因故斷而不生則狂性自歇三妄息真現歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證所謂但離妄緣即如如佛也肉間骨曰肯骨肉之間小結可啓曰綮莊子技經肯綮之未嘗今以肯綮譬斷微細惑結蓋劬勞修證只為妄惑妄因既自惑結自除故不勞肯綮也譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得譬妄息真現不勞修證也二阿難疑難二一問難即時阿難在大衆中頂禮佛足起立白佛世尊現説殺盜淫業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏遞躡上文起難為後學決疑也上稱緣斷而因不生斯正因緣之義何前言頓棄耶從老梵志者須菩提等皆晚年從外道來今説菩提不從因緣則王舍城拘舍梨等所説自然成第一義唯垂大悲開發迷悶今棄因緣則外道自然之執為當矣富那之後又以阿難問難者諸法既明則進修無滯將示修證之門故復以當機之人發起二答難五一例前推本佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是狂因既滅則自然性出不狂之前二皆本無由是觀之凡所謂因緣自然本皆不有悉由狂妄而立故曰理窮於是二詳明妄立三一以因緣破自然阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走自然者本自天然不假因緣也若本自然則或狂不狂無所然而非自矣夫何又假照鏡因緣而後狂走此自然之計墮矣二以自然破因緣若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣若本自不狂假因緣故狂則本自不失盍假因緣故失頭既不失特由狂妄則因緣之計墮矣三明妄立本狂自然本有狂怖未狂之際狂何所潛不狂自然頭本無妄何為狂走若狂怖本於自然則是本有狂怖然既無所潛非本狂矣若狂怖不本於自然則頭本無妄何為狂走非本不狂矣既非本狂非不本狂足知自然因緣之説皆妄立也三令悟實相若悟本頭識知狂走因緣自然俱為戲論是故我言三緣斷故即菩提心若悟本真則知諸妄了不相關真見性人一切妄緣豁然蕩絶得大解脫者以此四示無戲論菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離離合俱非此句方名無戲論法菩提心中本無生滅亦無自然若謂菩提心生生滅心滅此但生滅非菩提也若謂滅生俱盡無功用道有自然者因是則明自然心生生滅心滅此亦生滅非菩提也而又反指無生滅者名為自然皆則戲論譬如因有雜和故説和合而反指非和合者稱本然性是皆對待妄立戲論之法直使然與非然合與非合一切遠離亦無離與不離之心乃真無功用道無戲論法也菩提涅槃尚在遙遠非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恆河沙秪益戲論此責其妄計戲論難契菩提故曰菩提遙遠非汝能證雖持多經只益戲論也五結咎勸修汝雖談説因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦因緣自然有益於辨無益於道多聞第一有益於名無益於實故雖積劫熏持不如一日修無漏業無漏業者首楞真定也得此定者永滅諸漏故離憎愛苦如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記明熏無漏業之速效也摩登伽此云本性故云性比丘尼宿因即歷世貪愛苦因也出纏登伽也授記耶輸也如何自欺尚留觀聽結責阿難令捨苦本修無漏道無以貪愛存於心目也自初決擇真妄發明覺性乃至深窮萬法決通疑滯皆為最初方便使其信解真正為因地心因心既真斯可圓成果地修證故前經止此別起下文音切逾羊朱切蚋而鋭切渾胡昆切蒸諸仍切灘徒早切遞音第倐音叔遏烏葛切蒲薄胡切翳於計切拒音巨屯徒渾切邀於宵切霾音埋凖之尹切
