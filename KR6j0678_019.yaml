body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋伽譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解四行陰四初示陰相阿難彼善男子修三摩地想陰盡者是人平常夢想消滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑑明來無所粘過無蹤迹虗受照應了罔陳習唯一精真生滅根元從此披露見諸十方十二衆生畢殫其類雖夫通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇通敘想滅行現也浮動妄習晝明則想夕瞢則夢汩亂性真莫得而一擾動覺明莫得而靜故想陰盡者夢想消滅寤寐常一覺明虗靜猶如晴空也五陰前粗後細故想盡則無粗重影事雖觀萬象而無想念故如鏡鑒明無粘無迹虗受照應了無陳習唯一精真明極如此故幽隱行陰於是披露也行為萬化生滅根元故其相披露則十二類生之元無不殫見各命由緒識也同生基行也擾動幽隱故譬野馬乍生乍滅故曰熠熠無復粗影故曰清擾根塵運止皆本於此故名究竟樞穴也若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超衆生濁觀其所由幽隱妄想以為其本行陰習擾成性故稱元性元習能滅擾習則歸元澄之本而遷流相盡矣故如波瀾滅化為澄水也生滅不停業運常遷名衆生濁即行陰之體也故行陰盡則超之行陰密移曾無覺悟故曰幽隱妄想二明狂解十一於圓元計二無因三初總敘阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是入墜入二無因論夢想消亡寤寐常一故稱正知奢摩他又稱凝明正心皆想盡之相也外魔皆因心召故想盡凝明則天魔不至從此唯是修禪失趣狂解妄計是即陰魔也生類本即同生基也於本類中生元露者於同生基見已行元也幽清動元即行元也既見此已遂以一切生滅皆圓於此而不進窮識陰本末遂立二無因論二別明二一計本無因一者是人見本無因何以故是人既得生機全破乘于眼根八百功德見八萬劫所有衆生業流灣環死此生彼秪見衆生輪回其處八萬劫來冥無所觀便作是解此等世間十方衆生八萬劫外無因自有由此計度亡正遍知墮落外道惑菩提性生基既破則根離區穴而眼清淨故能洞見業流灣環者隨業流轉如水在灣洄漩其處不能自出也未脫識陰定力有限故八萬劫外冥無所見以無所見故計本無因也不知本因存乎妄識此所謂亡正遍知二計末無因二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事常知今日一切物象皆本無因謬執生根不達化理以人竟為人乃至黑竟為黑無復改移因而例我本不見道末亦無成是末無因也結文本字合是未字三結失由此計度亡正遍知墮落外道惑菩提性是則名為第一外道立無因論二於圓常計四遍常三一總敘阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四遍常論前言圓擾動元此言常擾動元者以生滅之元皆圓於此遂執為常而起遍常論遍即圓也故此標名遍常後結名圓常四二別明一依心境計常一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常由妄計行陰為生滅圓元遂於心境四大八識等皆起妄計或撥生滅而計常或存生滅而計常或認識神而計常或起邪見而計常今此窮心境性本自無因謂無生滅故以十方衆生生滅之理皆則循環本無散失此撥生滅而計常也想陰盡者依心境二法修觀故功力能知二萬劫事後四萬八萬例此二依四大計常二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常衆生依地水火風生滅而四性元則常住則諸生滅法咸皆體常此存生滅而計常也三依八識計常三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常六根及末那執受即八識也心意識中本元即識性也八識元由惟佛與八地菩薩能窮若真能窮盡則入智境離心意誡今此唯得心意識中本元由處謂其本性恆常衆生依之循環而住不曾散失此認識神而妄計也四依想滅計常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常想元想陰也生理行陰也妄謂流轉生滅皆屬想心今已永滅則不生滅理自然屬行不知行陰即生滅元是起邪見而妄計也三結失由此計常亡正遍知墮落外道惑菩提性是則名為第二外道立圓常論三於自他計四顛倒三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論於自他境妄起倒見其類有四各計一分無常一分有常二別明四一由自及他起分計一者是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性妙明圓湛離我我所而外道於此妄立神我從是計我遍凝不動而諸衆生於中生死遂計自為常計他無常二離心觀土起分計二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常前依心觀此依土觀種種遍計一法既邪萬法皆倒矣三別觀心精起分計三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性不能即身即心故作別觀微塵喻精微也謂由心精密運令身生滅而心不壞滅前於一法作二計此於一性作二計也四謬於四陰起分計四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常幻陰一體遷流一相而且執是迷非見今忘昔故以流者為常遷者為滅三結失由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論今人以性為真以相為幻於理則融於事則礙不免墮此四種分計四於分位計四有邊三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論分位有四謂三際分位見聞分位彼我分位生滅分位二別明四一三際邊計一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊生元流用行陰也因遷流計三際以過者已滅來者未見故名有邊現在相續故名無邊不知真際本非有邊非無邊也二見聞邊計二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊前以不見為有邊此以無聞為無邊乃回互倒計也三彼我邊計三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性我知彼性乃是同體今曾不知是彼與我異則我得無邊彼但有邊矣四生滅邊計四者是人窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊因窮行空昔有今無遂以一陰為半生半滅而內根外器一切皆然以生為有邊滅為無邊三結失由此計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論諸皆窮道失趣展轉妄計所謂禪那狂解迷謬至此五於知見計四矯亂三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂遍計虗論以邪倒故於知見中狂解不決遂矯亂其語也婆沙論云外道計天常住名不死謂不矯亂得生彼天故有問者不敢實答恐成矯亂佛言此真矯亂也二別明四一觀化迷理矯亂一者是人觀變化元見遷流處名之為變見相續處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句此觀萬化見其不齊遂生異解用心別見即異解也於是不能決擇矯亂其語二觀心執無矯亂二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言說此觀妄心故見生滅互互無即念念滅相也得證者悟一切法皆無也三觀心執有矯亂三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言說各各有即念念生相也言無言是皆不明答四觀境亂心矯亂四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰枝如樹枝差互不一三結失由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂遍計虗論今之邪人妄謂得道而中無主正矯惑於人者多類此四六於行相續計後有三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒無盡流即行相續相也以生滅滅生相繼不絶故知死後有相二別明二一正計或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相心顛倒故固執色身以色是我又謂我體圓遍則色為我有前緣即目前之色也行相續相亦色也於色作此四計於受想行亦然故成十六相皆計死後復有也不計識陰者以幽祕未現故二旁計從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸旁計有為無為諸法也畢竟並驅者計煩惱菩提不相凌滅皆後有也三結失由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論七於諸陰滅計後無三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒二別明二一正計見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性消散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相陰性消散謂色受想滅也生理即行也謂無受想則行亦滅也此約四陰現前因亡未來果滅因果合論故成八相二旁計從此或計涅槃因果一切皆空徒有名字究竟斷滅前旁計諸法後有此旁計諸法後無三結失由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論八於存滅中計八俱非三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論行存則有相也受想滅即無相也以前後相例則存者終無雖有非有滅者曾有雖無不無四陰雙計故成八非二別明二一正計色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相三陰為滅相故見有非有遷流為存相故觀無不無隨得一緣者於四陰隨舉皆生計執二旁計又計諸行性遷訛故心發通悟有無俱非虗實失措諸行一切遷流法也因見行陰遷訛不定遂生邪悟謂一切法有無俱非不可定指三結失由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論昏瞢無可道者不能明知死後之事也今人惑於俗論而疑死後有無者多矣皆八俱非類也九於後後無計七斷滅三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論見行陰念念滅處名後後無由是妄計設生人天七處後皆斷滅二正計或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前消滅滅已無復身滅即欲界人天二處也欲盡初禪也苦盡二禪也極樂三禪極捨四禪及無色也是名七際謂七際事相皆現前消滅更無復生終歸斷滅也三結失由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論十於後後有計五涅槃三一總敘又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論見行滅復生名後後有妄於五處計涅槃果二正計或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟轉依者轉生死依涅槃也或於欲界悟圓明理遂以欲界即轉依處或以初禪離憂二禪離苦三禪極喜四禪極捨即轉依處是謂五涅槃也迷有等者不知此天皆屬有漏非無為果非究竟處也三結失由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論三結勸深防阿難如是十種禪那狂解皆是行陰用心交互故現斯悟衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深孽凡見道不真多岐妄計皆即狂解是謂心魔最宜深防也四敕勸弘宜汝等必須將如來語於我滅後傳示末法遍令衆生覺了斯義無令心魔自起深孽保持覆護消息邪見教其身心開覺真義於無上道不遭枝歧勿令心祈得少為足作大覺王清淨漂指令弘宣人將如來語遍為群生保持覆護使魔不侵孽不作不墮邪歧不取小證而直登覺位是謂作大覺王標指也然則楞嚴垂教待群生者甚厚望行人者非輕吾徒宜勉旃音切殫音丹熠羊入切樞昌朱切灣烏關切孽魚列切綴陟衛切
