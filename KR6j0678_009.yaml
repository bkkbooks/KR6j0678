body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒如解二修行真要阿難見性未能證入譬遇華屋不得其門遂請修行方便前示真基則華屋之址也此示真要則華屋之門也文二一解結真要二一阿難牒請阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧前第二義門令審業本文云不見所結云何知解故此牒之而請也諸無明通根本枝末也方能暫伏未能永斷故如隔日瘧由不知結解真要故也惟願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示身心結惑實未來苦難之本解結之元實免脫輪回之要二真慈開示四初金手摩頂爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩訶難頂先摩其頂表無上開示也二光瑞助顯即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌環來頂是諸大衆得未曾有六震者動起涌吼震擊表破六根妄結也諸佛頂光灌釋迦頂者示同發明無上頂法故次復同音宣告阿難於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物異口同告者示諸佛脫生死證菩提皆由斯要也俱生即根本無明也生死妙常同因六根者知見立知故輪生死知見無見即證妙常如下所明三阿難疑問阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物四正示真要二一總示二一長行佛告阿難根塵同源縛脫無二識性虗妄猶如空華阿難由塵發知因根有相相見無性同於交蘆是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物根塵本真故曰同源結解俱幻故曰無二夢識無初故譬空華物境成有故由塵發知因根有相此根塵識譬如束蘆互相依倚雖粗有相其體全空故曰相見無性同於交蘆既無自性則隨緣轉變故於知見立識知之心則結為無明之本於知見無見覺之妄則解為涅槃真淨既曰真淨豈容立知故曰云何是中更容他物此總示妄結依根塵識起但妄識不立則妄結自解是為解結真要所以學道務去識情也二偈頌爾時世尊欲重宣此義而說偈言偈文句也梵語祇夜云應頌應長行而頌也伽陀云諷誦不應長行而孤起也文二初祇夜真性有為空緣生故如幻無為無起滅不實如空華言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交蘆真性之中有為之法皆空則根塵本空此頌根塵同源也緣生之法皆幻則縛脫亦幻此頌縛脫無二也起滅之法皆無則妄識元無此頌識性虗妄猶如空華也妄法既無真亦不立若言妄顯真真還同妄真與非真尚猶雙非見與所見云何復存當知俱無實體若交蘆耳此頌相見無性同於交蘆也結解同所因聖凡無二路汝觀交中性空有二俱非迷晦即無明發明便解脫結解同所因聖凡無二路頌同是六根更非他物也汝觀下牒根塵無體徒因妄結迷晦下頌知見立知即無明本知見無見斯即涅槃也二伽陀解結因次第六解一亦亡根選擇圓通入流成正覺躡前結解之義起後圓通之文也六解則根拔一亡則湛圓選得圓根則入聖流證聖果矣陀那微細識習氣成暴流真非真恐迷我常不開演頌根結初起之由也阿陀那此云執持謂執持種子發起現行即第八梨耶初起之相故曰微細含藏種子為習氣積生識浪為暴流湛由是分結由是起也此識依真如合生滅雜乎真妄之間故曰真非真也若以為真恐迷妄習而自誤以為非真恐迷自性而外求故權小教中皆不開演也深密經曰阿陀那識甚微細一切種子成暴流我於凡愚不開演恐彼分別執為我外道所執神我即此識也自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立頌解結入圓之要也一切諸法唯心所現而於中取著妄成根結是自心取自心非幻成幻法也由妄取故有幻非幻若不妄取非幻亦無非幻尚無幻法何有幻法不立則根塵頓淨圓通現前矣是名妙蓮華金剛王寶覺如幻三摩提彈指超無學此阿毗達磨十方薄伽梵一路涅槃門結頌真要也此之法門於淨不著於染不汙名妙蓮華根境結惑擬之則銷名金剛王覺即為無為亡情絶解名如幻正受依此修進一彈指間可超無學而入圓位也阿毗達磨云無比法十方如來逈出生死速證寂常莫不由斯故曰十方薄伽梵一路涅槃門薄伽尊號具六義謂自在熾盛端嚴名稱吉祥尊貴二詳明二一重請於是阿難及諸大衆聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有二偈並頌而雙美故曰雜糅精瑩阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次惟垂大慈再愍斯會及與將來施以法音洗滌沉垢無遮大悲言其博濟也性淨妙常真實法句則真妄兩忘稱性之談也沉垢微細結惑也二巧示二一示結之由即時如來於師子座整涅槃僧斂僧伽梨攬七寶几引手於几取劫波羅天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結涅槃僧裏衣也僧伽梨大衣也劫波羅云時分即夜摩天所獻巾也綰縈結也巾喻一性綰喻妄動結喻六妄一一詳問者使悟凡所妄動皆為結業也佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來秪許初時第二第三不名為結佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不得成一真如體無異無同六妄結根確然異執則汝六根亦復如是畢竟同中生畢竟異結顯也二示解之要二初總敘佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非蜂起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成佛言六解一亡亦復如是不成謂是非蜂起不成一體也願樂一成莫非解除結惑不生則同異圓泯故曰尚不名一六云何成由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相前明所結惑業之理此明能結狂妄之心也狂心之結妄境如勞目之見狂華故曰皆即狂勞二詳示阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散佛告阿難如是如是若欲除結當於結心偏掣左右喻依偏權之教不知真要適重狂勞故欲解狂勞當解狂心知解狂心則不藉偏權肯綮修證矣阿難我說佛法從因緣生非取世間和合粗相如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄消亡不真何待令依出世正智審擇根結本因而解之也若得正智不惟能知根結本因雖沙界萬類皆了元由矣阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除示六不頓解必由其序也佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍了煩惱結皆由著我則於我無著離煩惱障是得人空也了所知結皆由著法則於法無著離所知障是得法空名法解脫人法雙解是名俱空而俱空亦泯心無所起是從正受得無生忍也觀音初於聞中入流亡所動靜二相了然不生即先得人空也如是漸增聞所聞盡盡聞不住覺所覺空即成法解脫也空覺極圓空所空滅即俱空不生也生滅既滅寂滅現前即得無生忍也二入圓真要二一牒請阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別惟垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授慧覺圓通存乎一心已蒙開示故身心皎然圓通本根冥乎萬法猶未通達故冀佛冥授也密言即發明慧覺之言也祕嚴即圓通本根祕要也慧覺圓通我固有之故雖因密言還同本悟若不開祕嚴則與未聞無異故別求開示也二十五聖於根塵七大各悟圓通是知本根冥乎萬法也佛不顯說而因衆敷陳是謂冥授退藏密機即息慮凝心也二廣示四初總發爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地圓通二十五門即十八界七大也七大自十八界開故此不言夫根器萬法唯十八界七大攝盡故此備陳欲令行人於根身器界種種法上顛沛造次得真圓通無少滯也二詳明五一六塵悟入六一聲塵憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上阿若多因聲圓悟故曰妙音密圓下云妙色密圓妙香密圓因味覺明妙觸宣明妙法開明文意同此二十五門初標聲塵者先此方教體也雞園無憂王造以迎佛也二色塵優波尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上波尼沙陀云塵性因塵悟解得名昔多貪欲佛令作不淨觀觀此色身皆即空塵而因色圓悟三香塵香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齊見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意消發明無漏如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上遍觀有為而因香圓悟得童真位故名童子辭佛宴晦者宴坐晦迹齊心作觀也木煙皆非去來不有意無所緣故由是意銷而發明無漏塵氣滅故妙香密圓也四味塵藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩佛問圓通如我所證味因為上善救功成堪紹佛位名法王子曠劫為醫常善救人也言分別味因者謂了知味性而發明非空有離即之圓因乃指圓通本根非謂因之悟入也前言色因後言水因法因同此五觸塵跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅妙觸宣明成佛子住佛問圓通如我所證觸因為上跋陀婆羅云賢護洗塵洗體及塵體之中少有所得皆妄觸妄覺故得無所有則妙觸宣明成佛真子名佛子住以善能守護令妄不起令覺不動故名賢護六法塵摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫光金塗佛形像自爾已來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊說我頭陀為最妙法開明消滅諸漏佛問圓通如我所證法因為上摩訶迦葉大飲光也其身金色光吞日月因觀塵變悟法空寂遂修滅盡定以滅意根不緣法塵得無生滅故越百千劫如彈指頃于今於雞足山待彌勒乃入此定也頭陀云抖擻以能抖擻法塵為號二六根悟入五一眼根阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢佛問圓通如我所證旋見循元斯為第一阿那律此云無貧乃白飯王子證得天眼樂見照明即天眼定也定成四大淨色半頭而發障暗皆矚照大千界故曰精真洞然旋見循元即反妄任真也二耳根後特標三鼻根周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證反息循空斯為第一周利槃特迦此云繼道即誦比丘也宿以吝法報性散鈍佛令數息攝心因而了悟生住異滅諸行無常故反生滅息循無生空而得圓證四舌根憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢消塵法眼清淨成阿羅漢如來親印登無學道佛問圓通如我所證還味旋知斯為第一憍梵鉢提此云牛呞乃輕弄報也佛為遮謗賜之數珠令常念佛是謂一味心地法門能滅心緣得入正受亦因教觀舌根嘗味入道觀舌之知不從體生不因物有妄緣併絶名得滅心入三摩地衆生所以迷淪有漏由心緣不斷故滅心絶緣即超諸漏遺器界也不著塵味不隨妄知是謂還味旋知五身根畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來說諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學佛問圓通如我所證純覺遺身斯為第一畢陵伽婆蹉云餘習多我慢習也不可樂事一切苦事也思不可樂法而觸不可樂事因而正觀為有知故知此深痛雖覺有知之心能覺深痛反覺清淨之心曾無痛覺然此存雙覺其覺未純故又思而進之至於身觸皆亡故諸漏虗盡知痛俱寂故純覺遺身也六意根須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一須菩提曠劫解空非唯一世了身空寂故心得無礙洞達宿命了境空寂故十方成空自覺覺他故亦令衆生證得空性然此唯小乘所證之空於性覺真空猶未圓明故逮今發明性覺真空乃能頓入寶明妙性真空之海離二乘見而同佛知見也諸相入非能所皆盡蓋融於寶明空海也旋諸有法復歸至無蓋歸於寶明空海也音切瘧魚約切糅女又切攬音覽綰烏板切緝七入切績則力切掣昌列切棘几力切鵠紅沃切縈於營切呞音詩
