body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二外攝軌則前示內攝此示外攝文二一徵引內攝阿難汝問攝心我今先說入三摩地修學妙門求菩薩道要先持此四種律儀皎如冰霜自不能生一切枝葉心三口四生必無因阿難如是四事若不遺失心尚不緣色香味觸一切魔事云何發生內攝為要故先說妙門先持四律四律為本餘戒為末故四律潔淨則枝葉不生緣塵不偶而魔事潛消正定可入矣心三即意三備舉十重也二正示外攝四初勸誦神呪若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶悉怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪現業易制自行可違宿習難除必假神力今夫行人好正而固邪欲潔而偏染不教而能不願而為隱然若有軀策而不能自已者宿習之使也德隆而福鄙行善而身凶多障多冤數病數惱綿然若有機緘而不能自釋者宿習之召也茲非一生一劫之緣乃無始來念念受熏者故非神力莫能脫之摩訶悉怛多般怛囉此云大白傘蓋即藏心也量廓沙界曰大體絶妄染曰白用覆一切曰傘蓋神呪從此流演故名心呪無見頂者華嚴九地知識自說為佛乳母初生親捧持諦觀不見頂示頂法不可以見見也二示呪神力且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚于順風有何艱險登伽淫質猶能速證聲聞道器固易冥資也云何合作何況三持呪軌則若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後著新淨衣然香間居誦此心佛所說神呪一百八遍然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂師者人之模範正邪所自出故不遇第一真僧則律儀不得成就誦呪百八表滅百八煩惱也阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟戒根清淨願行精誠乃能感應四結壇軌則二一阿難詳問阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則請問結壇軌則之詳也言自知修證等者知呪力冥資聖果可期也二佛慈詳答五一壇場用度佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺已下取其黃土和上栴檀沉水蘇合熏陸鬱金白膠青水零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地法王法言即事即理法不孤起事無唐設如華嚴一字法門書海墨而不盡五位行相即世諦以彰明凡所設施必有取像則此壇場用度無非表法也山為高土雪山純淨上信也大力白牛純淨大根也香草淨水妙善淨智也茹退充實遺餘也上栴檀為十香之首十度之總萬行之冠也原為平土中信也地皮未淨也五數之中黃色之中取中中淨信也十香十波羅蜜法香也細羅為紛推之以為微妙萬行也夫欲取如來寂滅場地必本於廣大信心而資於淨智妙善以養成純一大根充實遺餘猶足以合法香冠十度故可以嚴成寂滅場地也上信大根有不可得則求其次焉故取中中信心雖未能冠乎十度萬行而能具之者亦可以嚴成方圓丈六為八角壇壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉壇寂滅坦實之體也體具八正故為八角能攝八邪故方丈六壇心蓮華中道妙行也蓮之為物華實同體染淨同源表妙行大致也用金銀銅木所造者表妙行云為也金銀百鍊愈精而不變銅剛而能同義之像也木能上草以覆其下仁之像也夫依體起行精而不變剛而能同或以義制或以仁覆無過不及凡皆會于中道乃所以為妙行也鉢為應器表隨量應物也露為陰澤以秋降八月秋之中也水中華葉即仁覆之行隨澤所施此又隨量應物陰利潛化之表也取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沉水無令見火圓鏡大圓鏡智也各安八方圍繞華鉢者智行相依隨方圓應也鏡外蓮華香爐各十六而間設者華表妙行香表妙德鏡外即正智之外方便建立使邪正相攝德行相熏庶久而俱化兩忘邪正也純燒沉水無令見火者反德藏用滅伏覺觀然後能契寂滅場地也或曰表法且然奈古德不解無傷臆說歟曰愚所宗者華嚴大論若熟覽彼知此非臆矣二獻享儀式取白牛乳置十六器乳為煎餅并諸沙糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩表以法喜禪悅獻可二尊也權教開許乳酪實教遮禁而復取以享奉者意在融權實同邪正故八味亦各十六圍繞華外表融權攝邪之法喜隨行施設也每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩佛以日中受食故每以日中致享中夜例日中也蜜成於華表和融法行也酥成於乳表和融法味也半為中數三為成數小火爐方寸覺心也以香沐炭發覺之法也藥王然身先服兜樓婆香意能發焰故取沐炭然令猛熾投酥蜜於焰爐燒令煙盡者行法既成不可終滯當於覺心勇猛煅煉使習氣併鑠緣影俱亡豁然如所謂紅爐點雪者然後為佛所享夫居寂滅場餐采禪悅者於此宜盡心三像設儀式令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并監地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置四外幡華外行嚴飾也室中四列自性四依也孤山頌大經四依云五品十信初十住為第二行向地為三等覺妙覺四當陽正位盧舍那等寂場真主也彌勒當來真主也阿閦居東彌陀居西智悲真主也諸大變化觀音形像上同下合真主也金剛藏常領金剛護持呪人伏魔斷障真主也門側左右釋梵等衆有力外護也末法修行凡賴於此一有所闕必不成就烏芻火頭金剛藍地迦青面金剛軍茶利金剛異號也毗俱胝亦大神變者毗盧神變經稱左邊毗俱胝三目持鬘髻是也頻那夜迦即猪頭象鼻二使者又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉壇中之鏡混物而有依行人之智也空中之鏡離物而無依諸佛之智也混物有依者方能照物未能照已必得乎離物無依住智交相為用然後物我互照心境雙融諸佛衆生身土相入不勞動步不待擬心法法遍周事事無礙舉目千聖齊現觸處萬象昭然一華一香遍供塵剎一行一相充擴無窮不假神通不涉情謂寂場法法本如是也密因修證妙極於此四持呪儀式於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛囉呪至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃一變為七七變為九皆陽數也而七居其中無過不及故道場以七日為期而取成於三焉凡所蘄嚮以歸依三寶為最初方便故初七日至誠頂禮如來菩薩羅漢名號所以假其不思議力發行助道也然非願力無以持之故第二七日依毗尼教專心發願也行願堅強則得大勇猛故第三七日時無間歇呪無遍限一向誦持遂能以精誠感格進力克功也鏡交光處則生佛智照感應道交也身心明淨謂宿習緣障纖悉蕩絶此感應克功事也百八乃呪之遍若行道則謂之匝阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就今之道場少獲感應者以此從三七後端坐安居經一百日有利根者不起于座得須陀洹縱其身心聖果未成決定自知成佛不謬汝問道場建立如是儀備律完決獲果感得須陀洹者謂遂從凡地得入聖流非指小果也故云縱未成果決知成佛如瓔珞經十地第四名須陀洹斷非小果矣五正說神呪三一阿難哀請阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞惟願大慈重為宣說悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫阿難所敘皆警末學而顯呪妙力也于時會中一切大衆普皆作禮佇聞如來祕密章句二如來正說四一現變爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣說神呪光中遍現金剛威武之狀者示此呪力有大神用破魔斷障也又此呪常有八萬恆沙金剛藏王菩薩眷屬晝夜隨侍所以遍現餘義經首及卷初已釋二說呪南無薩怛他蘇伽多耶阿羅訶帝三藐三菩陀寫一薩怛他佛陀俱知瑟尼釤二南無薩婆勃陀勃地薩跢弊三毗迦反南無薩多南三藐三菩陀俱知南四娑舍囉婆迦僧伽喃五南無廬雞阿囉漢跢喃六南無蘇盧多波那喃七南無娑羯唎陀伽彌喃八南無盧雞三藐伽跢喃九三藐伽波囉底波多那喃十南無提婆離瑟𧹞十一南無悉陀耶毗地耶陀囉離瑟𧹞十二舍波奴揭囉訶娑訶娑囉摩他喃十三南無跋囉訶摩泥十四南無因陀囉耶十五南無婆伽婆帝十六嚧陀囉耶十七烏摩般帝十八裟醯夜耶十九南無婆伽婆帝二十那囉野拏耶二十一槃遮摩訶三慕陀囉二十二南無悉羯唎多耶二十三南無婆伽婆帝二十四摩訶迦囉耶二十五地唎般剌那伽囉二十六毗陀囉波拏迦囉耶二十七阿地目帝二十八尸摩舍那泥婆悉泥二十九摩怛唎伽拏三十南無悉羯唎多耶三十一南無婆伽婆帝三十二多他伽跢俱囉耶三十三南無般頭摩俱囉耶三十四南無跋闍囉俱囉耶三十五南無摩尼俱囉耶三十六南無伽闍俱囉耶三十七南無婆伽婆帝三十八帝唎茶輸囉西那三十九波囉訶囉拏囉闍耶四十跢他伽多耶四十一南無婆伽婆帝四十二南無阿彌多婆耶四十三哆他伽多耶四十四阿囉訶帝四十五三藐三菩陀耶四十六南無婆伽婆帝四十七阿芻耶四十八跢他伽多耶四十九阿囉訶帝五十三藐三菩陀耶五十一南無婆伽婆帝五十二沙闍耶俱嚧吠柱唎耶五十三般囉婆囉闍耶五十四跢他伽多耶五十五南無婆伽婆帝五十六三補師毖多五十七薩憐捺囉剌闍耶五十八跢他伽多耶五十九阿囉訶帝六十三藐三菩陀耶六十一南無婆伽婆帝六十二舍雞野母那曳六十三跢他伽多耶六十四阿囉訶帝六十五三藐三菩陀耶六十六南無婆伽婆帝六十七剌怛那雞都囉闍耶六十八跢他伽多耶六十九阿囉訶帝七十三藐三菩陀耶七十一帝瓢南無薩羯唎多七十二翳曇婆伽婆多七十三薩怛他伽都瑟尼釤七十四薩怛多般怛㘕七十五南無阿婆囉視耽七十六般囉帝揚歧囉七十七薩囉婆部多揭囉訶七十八尼羯囉訶揭迦囉訶尼七十九跋囉毖地耶叱陀你八十阿迦囉蜜唎柱八十一般唎怛囉耶儜揭唎八十二薩囉