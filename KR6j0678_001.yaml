body:
  text: 唐天竺沙門般剌密帝譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解開釋科三初通釋經題如來果體其體本然何假密因菩薩道用其用無作孰為萬行無因無行無修無證無了不了大小名相一切不立此真首楞嚴畢竟堅固者也特以衆生如來隱於藏心非密因不顯衆生菩薩淪於七趣非萬行不修覺皇於是示之以大法使不迷於小道而默得乎無外之體喻之以佛頂使不滯於相見而妙極乎無上之致指如來密因使明本妙心知三世諸佛皆依此為初因明修證了義使悟究竟法知一切聖人皆依此而證果乃至具足菩薩清淨萬行一切事法無不究竟至於實相堅固不壞故名大佛頂如來密因修證了義諸菩薩萬行首楞嚴經通有五名今題處三焉以約該博也若所謂遍知海妙蓮華王十方佛母即餘二也所謂悉怛多般怛囉無上寶印清淨海眼灌頂章句通前三也悉怛多般怛囉者云白傘蓋也即如來藏心廣大無染周覆法界之體此經即為是心之印是心之眼也以是寶印印使七大萬法咸契本心以是海眼照了陰入處界皆如來藏繇是證菩提心入佛智海作妙蓮華王於染淨萬境自在開敷為十方佛母於塵毛國土隨緣降誕乃至成就果德受灌頂位則一切畢竟堅固之事皆備於我矣首楞嚴此云一切事畢竟堅固亦云健相分別一切畢竟已如前釋餘稱金剛觀察覺明分折始於徵心辨見終於破陰褫魔無非健相分別事也經即能詮之文而已詮猶筌也知經為筌則從而釋之者皆筌也非魚也學者慎勿執筌為魚然後首楞真經可得矣二通敘科判楞嚴自唐至宋科判疏釋十有餘家愚及見者若長水璿師孤山圓師閩中度師長慶巘師泐潭月師舒王張觀文之說其末及見者亦髣佛遺意矣然其科經皆執匿王琉璃異代謂非一會頓說其判教皆局持地耶輸等事而斷為法華之後愚竊疑焉請先質之夫夜壑負趨速於反掌匿王代謝可唯旦暮而楞嚴法會自夏徂冬此不應執異王疑異會也法華自燈明已還諸佛無時不說菩薩無時不證持地既曰聞諸如來宣妙蓮華豈止釋迦歟經稱摩登由神呪力消其愛欲與耶輸同悟宿因或得出纏或蒙授記若執授記為法華之事則靈山會上當有摩登乃可言同且曰由神呪力灼非法華況有道記果記之異疑今經所言道記耳非法華果記也此又不應局授記而定先後也經言最後垂範者彼乃結辨魔文當第十卷末實楞嚴法會最後非臨滅之最後也舊引多說不可縷疏皆未足為科判准繩科判失准則理義自差今准吾佛設教之序未知其可也請陳管見夫法王說法有條不紊初說一乘頓教以立本即華嚴也次說三乘漸教以逗機即阿含方等般若也後說一乘圓教以顯實即法華也楞嚴即般若法華之中實大乘終極之教故如來密因菩薩萬行修證之法一切畢竟自此已往無復進修直造一乘圓妙之道故法華會上更無地位之說純談妙法隨根印可授記作佛而已蓋出興大事於法華至矣盡矣不可有加矣法華之後便說涅槃扶律談常而終焉其扶律者所以囑後事談常者所以示真寂此獨臨滅遺付之事非有加於法華也說者不本扶律之意輒判楞嚴在法華後亦稱扶律談常然則進修既畢而又進修扶律之後而又扶律前則加於法華後則於涅槃是乃倒置枝駢紊於法王之法矣夫進修之事譬稼穡猶耘耨譬芙蕖猶敷華既號法華秋穫涅槃捃拾則不應穫拾之中又耘耨也既號法華廢權立實如華落蓮現則不應廢落之後又敷華也以經證之竛竮之子隨領寶藏復何所求化城之人既到寶所復何前進燈明說法華已便於中夜涅槃釋尊說法華已便於四衆唱滅復何枝蔓於楞嚴哉如必楞嚴居後則阿難既於法華諸漏已盡而復於楞嚴未盡諸漏既於法華堪任佛記而復於楞嚴未全道力既先領悟妙法而復不知真際所詣既已安住佛道而復為彼所轉溺於淫舍是皆倒置理自不然故判楞嚴在般若之後也蓋般若之後慧學方盛定力未全人或溺於多聞失於正受於是示首楞之大定資般若之大慧使定慧均等學行兩全而究竟趣於一乘實相此楞嚴所以作也論三經大致無非為一大事因緣而必先藉般若發明次由楞嚴修證終至法華印可然後盡諸佛能事序固如是也然導達禪乘決擇正見無尚楞嚴矣其科准常大分為三初序分二正宗三流通序分文二初陳時處主伴以證信次陳阿難示迹以發起正宗文五一見道分初由七徵以顯常住真心性淨明體即第一卷次由八還以辨妙淨見精顯如來藏第二第三後即山河萬象宣勝義中真勝義性四初至中皆使行人明心見性為修證密因故名見道分二修道分首示初心二決定義令審因心果覺又審煩惱根本為修行真基四中至末次示六根舒結倫次令解結心而得妙圓通為修行真要五至六中此利根修進之一終也故阿難至此明了菩提所歸道路自謂已悟成佛法門而願度末世復請安立道場攝心軌則遂聞三無漏學四種律儀及大神呪六中七末總為修行方便故名修道分三證果分始從凡夫終大涅槃歷示增進五十五位至盡妙覺成無上道故名證果分七末八中四結經分列示五名結顯大旨也八中五助道分初明天獄七趣一唯心造次明奢摩他中微細魔事恐諸行人洗心非正失錯墮落故名助道也八中十末夫見道然後修道修道然後證果修證事畢於是結經楞嚴法要止此而已而世尊大慈復欲持戒衆生謹潔無犯真修行者不遭枝歧故說助道之法為最後垂範遂入流通而終會焉此乃一經綸貫連環不斷不可判為異會科為異義也此其大略耳隨文科釋乃盡其詳然以今視昔稍多違戾專門舊學不免矛盾惟通人考之三正釋經文三初序分二初證信序二初說法時處如是我聞一時佛在室羅筏城祇桓精舍如是之法我從佛聞此集者依佛立言證法有所授而已不必他說一時之語亦因佛立諸經通用故不定指也室羅筏亦曰舍衛祇桓猶云祇樹也二法會聽衆二一常隨衆三一總標與大比丘衆千二百五十人俱內祕菩薩外現聲聞破惡怖魔曰大比丘千二百即憍陳如三迦葉鶖子目連之徒二嘆德皆是無漏大阿羅漢佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫衆生拔濟未來越諸塵纍智水妙湛不隨欲有無明惑業而出名無漏離分段生應人天供殺無明賊名阿羅漢華嚴嘆衆住一切菩薩智所住境護持諸佛正法之輪所謂佛子住持也法華嘆衆盡諸有結心得自在所謂善超諸有也能於國土成就威儀者隨剎現身正容悟物也從佛轉輪妙堪遺囑者道能助化德足利生也而又嚴毗尼而作範示應身而度生意非利彼一時直欲拔濟未來使皆超諸有塵纍耳此阿難同列之德也凡經序衆皆隨緣起此經以阿難起教示墮淫室疑若未能住持佛法善超諸有虧威儀汙戒律不堪遺囑度生拔濟未來故因嘆同列之德以顯阿難示迹實無虧汙意在拔濟也三列名其名曰大智舍利弗摩訶目犍連摩訶拘絺羅富樓邪彌多羅尼子須菩提優波尼沙陀等而為上首舍利弗智慧無雙決了第一大目連圓明洞達神通第一俱絺羅根性聰敏博學第一富樓那具大辨才說法第一須菩提從曠劫來證得空性優波尼沙陀於六塵中了悟色性衆有千二特舉六名者表入法大旨也夫欲於一切事畢竟堅固必以智為先導決了諸法使圓明洞達又博學以貫之辨說以明之了空了色圓融自在則首楞嚴王最初方便如此而已二來集衆二一聲聞衆復有無量辟支無學并其初心同來佛所屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密義辟支此云獨覺無學即羅漢初心即有學也自有愆失恣任僧舉曰自恣九旬禁足莫由覲佛故於休夏咨決心疑自恣決疑皆所以考九旬德業也欽奉如來而稱慈嚴者慈以恩言嚴以威言即時如來敷座宴安為諸會中宣示深奧法筵清衆得未曾有迦陵仙音遍十方界宣示深奧所以為楞嚴發起如法華以無量義為發起也迦陵頻伽仙禽也其音和雅佛音如之二菩薩衆恆沙菩薩來聚道場文殊師利而為上首文殊此云妙德表根本智楞嚴會上為擇法眼故居上首二發起序八初佛赴王命時波斯匿王為其父王諱日營齊請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩匿王舍衛國王也宮掖王之內庭也於內庭延佛敬之至也二聖衆分應城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齊主三阿難獨異唯有阿難先受別請遠遊未還不遑僧次既無上座及阿闍梨途中獨歸其日無供即時阿難執持應器於所遊城次第循乞心中初求最後檀越以為齊主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切衆生無量功德此敘其誤墮淫室之由也律制僧遠出侶須三人一上座一軌範師所以嚴行止防誤失也鉢曰應器最後檀越謂未飯僧者平等之慈於己等心而化使彼等心而施於食等者於法亦等所以能成無量功德若摩登者即穢而微賤阿難既無簡擇所以誤墮也剎帝利王族旃陀羅云殺者即屠膾淫酒之家阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗經彼城隍徐步郭門嚴整威儀肅恭齊法此敘平等行慈之意也空生捨貧飲光捨富一謂富者易施一為貧者植因如來呵之欲其心無遮限而息不均之疑謗故阿難欽仰以肅恭齊法齊法者齊整莊重次第行乞之謂也或局維摩經謂非如來呵責安知如來不呵獨淨名哉四示遇惡緣爾時阿難因乞食次經歷淫室遭大幻術摩登伽女以娑毗迦羅先梵天呪攝入淫席淫躬撫摩將毀戒體摩登伽妓女也娑毗迦羅此云黃髮外道所傳幻呪名先梵天實妖術耳淫躬撫摩將毀戒體者以身逼近欲染淨戒之體也後云心清淨故尚未淪溺則將毀而已阿難於空王佛所同佛發心功行固已侔佛但本願常樂多聞護持法藏不取佛果則今之示迹乃所以護持也蓋般若之後慧學方盛迷己之流一向多聞不修正定為物所轉易遭邪染宛轉零落則佛之法藏殆無以護持故假多聞之人邪染之事起教以首楞之大定資般若之大慧使定慧均等學行雙明則倒妄可消妙湛可得不為物轉而能轉物同如來矣當知阿難方便真慈俯為末學後經轍迹無非䇿礪也五佛慈垂救如來知彼淫術所加齊畢旋歸王及大臣長者居士俱來隨佛願聞法要佛常齊畢為施者說法今遽歸故王臣隨之以願聞于時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪敕文殊師利將呪往護惡呪銷滅提獎阿難及摩登伽歸來佛所頂門為無上果光有百寶色謂之無畏者能懾魔外物無以勝也世尊不自說呪而於頂光化佛說者示此呪乃無為心佛無上心法也六阿難反省阿難見佛頂禮悲泣恨無始來一向多聞未全道力多聞之慧必得正定道力乃全而不為邪攝七因求今法殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便奢摩他云止三摩鉢提云觀禪那云靜慮即圓覺靜幻寂三觀也靜觀依覺滅塵所以處己幻觀從定發行所以應物寂觀雙忘起滅所以泯迹三者齊運非三非一故以妙稱即首楞正定之初門也十方如來得成菩提凡資始於此八時衆樂聞於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨上序分竟二正宗分五一見道分三初決擇真妄以為密因二初明心見失真沉妄二初顯大要因愛染起佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛問捨愛之因發起下文也阿難斛飯王子同氣共本也天倫兄弟也阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落答捨愛之因意顯欲漏粗惡能障妙明欲復真淨當離愛染也棄濁染發妙明正此經緣起餘說則疏矣三十二相始於足下安平終於頂相高圓佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉衆生生死輪轉由不自知常心妙體妄纏愛想今阿難獨能知省厭捨所以稱善二明倒妄因于心目二初徵顯妄本汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相道固坦直因妄而曲將與研窮正道革去倒妄故敕以直答心言之直則道可徑造矣一道謂皆以直心也阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死問誰愛樂徵起妄本也答因心目正顯妄本也二推窮妄體佛告阿難如汝所說真所愛樂因于心目惑業轉徙一切由此若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在自此有七重徵破皆顯妄心妄見本無實體由攀緣起是謂無始生死根本故須破斷初在內二一徵阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵秪在我面如是識心實居身內謂心在內目在外自衆生至如來阿難皆然文互見也異生有十二類除土木空散非心眼倫也眼根外浮假地水火風四塵以成及其散也還歸於塵故以塵名二破二初引事辨定佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外定內外境欲明在內之心當次第見阿難汝今堂中先何所見世尊我在堂中先見如來次觀大衆如是外望方矚林園定先後見欲破在內之心不先見內阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見皆且引事辨定下乃牒破二正破非內二初發令諦聽爾時世尊在大衆中舒金色臂摩阿難頂告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨三摩提亦云三摩地亦云三昧此云正定首楞三昧千聖共由故曰一門妙莊嚴海由此而至故謂之路二躡前推破佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處身在堂中合先見內阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有衆生先見身中後觀外物心在身內合見身中頗猶可也引衆以問決不能也縱不能見心肝脾胃爪生髮長筋轉脉搖誠合明了如何不知必不內知云何知外心胃內藏縱不能知爪脉外浮云何不曉既不內知果非在內矣是故應知汝言覺了能知之心住在身內無有是處結破也二在外二一徵阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶因破非內復生妄計謂心在外為決了義二破二初引喻辨定佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齊汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽彼食不能飽此則外心不能知身矣言乞食歸林乃舉見前方食之衆故云我已宿齊宿預也食有四種謂段觸思識摶即段食也有形段可摶取揀非思食識食也二正破非外佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知辨非外也我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外驗非外也兜羅綿其色如霜佛手柔軟如之是故應知汝言覺了能知之心住在身外無有是處三潛根二一徵阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處佛言處今何在阿難言此了知心既不知內而能見外知我思忖潛伏根裏復計心潛眼根之裏下喻可明猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故琉璃籠根喻眼根藏心也以在根故不見腑藏以根淨故明見外境故說潛根二破佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合事理俱違非潛根矣不成隨者前云隨即分別今眼為所見則隨義不成是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處音釋筏房發切桓胡官切範音犯纍力水切絺音癡屬音燭會也匿女力切諱虗貴切掖音亦羞音修佇直呂切遑音皇循音旬均居旬切隍音皇整蒸字上聲奢式車切遘古候切牖與久切摶度官切
