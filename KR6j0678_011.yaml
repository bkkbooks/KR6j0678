body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆授溫陵開元蓮寺比丘戒環解五特標耳根總諸圓通二十五門此最當機故特標也文三一敘本修證二初敘圓證爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地觀音者觀世言音圓悟圓應之號也於音言觀者以觀智照之不以耳識聞之也所謂入流亡所則以觀不以聞可知矣所師之佛亦名觀音者因果相符古今一道也初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前釋從三慧入圓通也達耳之謂聞著心之謂思治習之謂修三者圓明是名三慧入流亡所者不隨聲塵頓入法流而亡其所入也音聲之性由動靜顯故所入既寂則動靜不生此聞慧也既達乎耳復著於心如水之漸如土之增使能聞所聞情境俱泯而盡聞之心亦復不住以合真覺此思慧也既著於心還以治習使能覺所覺皆合妙空則空覺不二是謂極圓能空所空亦復不立乃為盡道此修慧也夫然後生滅滅生情境俱盡而真寂真滅圓通之體於是現前即所謂入三摩地也以圓覺配之入流亡所等即應當遠離幻妄境界也如是漸增等即心如幻者亦復遠離也覺所覺空即遠離為幻亦復遠離也空所空滅即離遠離幻亦復遠離也生滅既滅則得無所離即除諸幻也寂滅現前即譬如磨鏡垢盡明現也造至於此則圓通之體極矣二敘圓用二一總忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰由根境圓融故世出世法不能限礙而十方法界圓明洞達也惟其圓洞故上合諸佛下合群生無間然者上合諸佛故能愍物興慈應機與樂即三十二應是也下合群生故知其悲仰隨與拔苦即十四無畏是也二別三一三十二應此現十法界身圓應群機也開有三十二合惟四聖六凡攝盡群類文三一總舉世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土幻人作為本於無作故此言如幻三昧後言無作妙力此之三昧由聞慧熏修以成而無能沮壞故稱金剛依此三昧隨緣應化凡皆如幻而已二詳列二一四聖四一佛世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為說法令其解脫修正定取正果曰進修無漏境智雙忘情解俱泯名勝解現圓斯可以得佛故現佛身為說果法也第十地菩薩坐華王座垂成正覺亦須別佛說教斷最後無明方成佛道二辟支若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為說法令其解脫有學小聲聞也獨覺亦曰麟喻喻麟之獨也出無佛世觀物變易自覺無生故號獨覺樂獨善寂求自然慧故曰寂靜妙明能妙萬物以明自性故曰勝妙三緣覺若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為說法令其解脫知迷勝性由十二緣於是斷之自無明滅至憂悲苦惱滅則緣斷而性現矣性因緣斷而現故曰緣斷勝性由觀緣悟道名緣覺乘四聲聞若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為說法令其解脫斷四諦下粗惑名得四諦空依道諦修而證滅諦果名修道入滅此未能妙物獨證空性故曰勝性現圓也四聖不舉菩薩者兼在佛位二六凡三一天若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為說法令其解脫若諸衆生欲為天主統領諸天我於彼前現帝釋身而為說法令其成就梵天超出欲界故心能明悟不犯欲塵身根清淨即得生彼也帝釋為忉利天主統三十三天若諸衆生欲身自在遊行十方我於彼前現自在天身而為說法令其成就若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為說法令其成就自在遊行名自在天即欲頂他化也飛行虗空名大自在天即色頂摩醯也初舉梵王至此乃自欲天色天而超至色頂意兼無色以明無剎不現也若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為說法令其成就若諸衆生愛統世界保護衆生我於彼前現四天王身而為說法令其成就若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為說法令其成就上舉正統此舉臣輔也天將軍為帝釋上將統領鬼神四天王臣於帝釋統領世界四天太子即那吒之類能驅鬼神二人三一王臣士庶若諸衆生樂為人王我於彼前現人王身而為說法令其成就若諸衆生愛主族姓世間推讓我於彼前現長者身而為說法令其成就若諸衆生愛談名言清淨自居我於彼前現居士身而為說法令其成就自金輪至粟散皆人王也粟散即國小王散於天下如粟之多長者具十德謂姓貴位高大富威猛智深年耆行淨禮備上嘆下歸故為族姓之主世間推讓也隱居求志行義達道名居士名言典雅之言也若諸衆生愛治國土剖斷邑我於彼前現宰官身而為說法令其成就若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為說法令其成就剖判也合和占相推步盈虗皆數術也二入道四衆若有男子好學出家持諸戒律我於彼前現比丘身而為說法令其成就若有女子好學出家持諸禁戒我於彼前現比丘尼身而為說法令其成就若有男子樂持五戒我於彼前現優婆塞身而為說法令其成就若有女子五戒自居我於彼前現優婆夷身而為說法令其成就戒謂比丘戒二百五十尼倍之言律言禁者比丘所持常律而已尼則禁切尤詳優婆塞優婆夷謂近事佛法男女五戒殺盜淫妄酒也此為諸戒根本萬善樞機五分真體前四能具戒定慧解脫後一能具解脫知見蓋使昏昏為昭昭故也三主婦童真若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為說法令其成就天子三公九卿等掌外政三后九妃等掌內政所以修治家國女主即后妃也命婦即公侯之妻受錫命者漢班惠姬為皇后傅號稱大家若有衆生不壞男根我於彼前現童男身而為說法令其成就若有處女愛樂處身不求侵暴我於彼前現童女身而為說法令其成就三神若有諸天樂出天倫我現天身而為說法令其成就若有諸龍樂出龍倫我現龍身而為說法令其成就若有藥叉樂度本倫我於彼前現藥叉身而為說法令其成就若乾闥婆樂脫其倫我於彼前現乾闥婆身而為說法令其成就若阿修羅樂脫其倫我於彼前現阿修羅身而為說法令其成就若緊那羅樂脫其倫我於彼前現緊那羅身而為說法令其成就若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為說法令其成就若諸衆生樂人修人我現人身而為說法令其成就若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為說法令其成就此天龍八部等類也樂人修人者此類似人而非故樂生人道諸非人指有形無形有想無想即休咎精明空散消沉類也六凡不舉獄鬼畜者此類方沉幽昏未能聞法則以施無畏力拔之三結是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就迹示同類心絶愛見名妙淨依無作智起大神用名妙力無作無為隨緣泛應名自在成就二十四無畏三一總舉世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德由我不自觀音而彼獲脫苦由我知見旋復而彼能不燒故曰於我身心獲無畏德二詳列三一脫外業七一脫衆苦一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫不自觀音者不隨聞塵所起知見也以觀觀者謂旋倒聞機反照自性也不起知見則無所妄反照自性則一切真寂無復苦惱可得此則真觀淨觀大智慧觀能破癡暗能伏災難故令苦衆生蒙我真觀即得解脫二脫三災二者知見旋復令諸衆生設入大火火不能燒三者觀聽旋復令諸衆生大水所漂水不能溺內外四大常相交感見覺屬火聞聽屬水故見業交則見猛火聞業交則見波濤今知見旋復則無見業觀聽旋復則無聞業故水火不能燒溺也於聽言觀猶於音言觀也大水所漂意兼風災三脫鬼害四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害自此至脫囚離怨之事皆由六根消復心無所召故境不能為也四脫刑戮五者熏聞成聞六根消復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動以聞慧熏其聞根以成圓聞一根既圓則六根消復同於聲聽無復形礙故如割水吹光也五脫幽邪六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥叉羅剎鳩槃茶鬼及毗舍遮富單那等雖近其旁目不能視聞熏精明爍彼幽暗故不能視六脫囚繫七者音性圓消觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著音性圓消則內無所繫觀聽返入則外無所纍故枷鎖自脫七脫冤賊八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫音聞兩立則物我成敵滅音圓聞則內外無待故能遍生慈力無復怨敵矣二脫內業三一脫欲九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲衆生以欲習合塵故為色劫能以金剛三昧熏聞成性遂能離塵性成則欲愛乾枯離塵則根境不偶故雖有妖色不能劫動二脫恚十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚瞋由違情而起對境而生音性純淨無復妄塵故圓融無違無能所對無違無對則不嗔矣三脫癡十一者消塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗癡由妄塵所蔽無明所覆銷塵則無蔽旋明則無覆故外之法界內之身心凝瑩朗徹離癡暗矣性障即癡也阿顛迦云無善心內業有十而壞滅法身唯淫怒癡為甚故舉三以兼餘三示福應十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男融形則礙滅復聞則性真故涉入世間而無動無壞能遍十方供微塵佛稟承其法各為法子供佛足福稟法足慧而繼紹法王有男子之道故能應其求也十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女圓故無二通故含界明照則大圓鏡智之質也含界則空如來藏之體也具此故能承順法門受領無失承順即坤儀柔德受領即閨門能事有女之道故能應其求也十四者此三千大千世界百億日月現住世間諸法王子有六十二億恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同先舉多佛次顯多福也一剎一日月百億日月即百億剎土也由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二億恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通圓通本根妙含法界一多平等彼我無二故令持我名福等於彼當知修習得真圓通則一身多身他方此界一福德一名物各各圓遍無復涯異也二結是名十四施無畏力福備衆生三四不思議二一總舉世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德現衆多容誦一一呪攝化衆生圓應所求理出於無為神應於不測名不思議無作妙德然前亦現形應求獨此名不思議者前則略顯此復深明如於一身現八萬首臂固莫得而思議也二詳列四一現容一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆多妙容能說無邊祕密神呪從真妙圓重發真妙曰妙妙聞心旋聞脫聲獨返真源曰心精遺聞由獲妙遺聞故衆塵不隔一覺圓融而應現無滯矣言初獲者指本因也其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在首為六用之總臂表提接之悲目表照了之智各依本數充之以至八萬四千者表依根本六用根本智悲而泛應塵勞得大自在此十一地等覺妙行也華嚴十地已前猶依本智長養大悲至十一地長養功終純是大悲為法界體與智圓現故觀音手眼通身遍身而以大悲稱也一體之中塵勞萬法慈威定慧無所不備而繼二十四聖示現者明彼所現雖各一端圓而會之咸極於此使悟入者不止二十五門頓了八萬塵勞法界理事曾不離吾一圓融淨覺之體能同能異即一即多無邊剎海德用遍周十方身土境相相入邪正吉凶之術養生安物之方法法圓通塵塵具足矣或曰八萬四千特表法耳一身何所施乎是特以有思惟心測度菩薩圓通境界也夫身含十虗毛端現剎彼空與剎又不啻如首臂而已彼現八萬四千首臂猶人之八萬四千毛孔耳未足異也聖人之言即理即事既曰不思議德無以限意思之議之爍迦羅云金剛堅固不壞也母陀羅云印各有妙印也清淨寶目離塵合覺也慈以攝化威以折伏定以復湛慧以開覺通指衆多妙容也二說呪二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者以聞思慧脫塵不礙故現形誦呪神變妙力一一無礙是謂妙能三攝化三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍本根清淨則一切無著故能令衆生捨諸慳著也求我哀愍者哀愍為受而施作佛事也四應求四者我得佛心證於究竟能以珍寶種種供養十方如來旁及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃得佛心證慧足也珍寶供養福足也福慧兩足故餘波傍及使彼所求世出世法無不隨願二結答圓通佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩提成就菩提斯為第一初於聞中入流亡所是從耳門得圓照也由得圓照故隨緣應化得大自在次又漸增以至圓空覺證寂滅是因入流相成就菩提也三結顯圓號世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界因能觀聽故果號觀音實洞十方故名亦遍界三瑞應爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大衆得未曾有一切普獲金剛三昧即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏前說圓通之法此顯圓通之瑞而應之也諸佛五體同放寶光者表證性明極則寶覺圓融全體發現也互相灌頂者頂為圓極之相表諸佛證性圓極於此會中菩薩羅漢即二十四聖之儔佛光亦灌其頂者印其修證等無優劣也林木池沼皆演法音交光相羅者圓通現前則一切聲是佛聲一切色是佛色無非悟入之處無非圓通之理也大衆普獲金剛三昧者因此皆能破惑障悟圓通也天雨寶華空現寶色地隱山河界含塵剎者表證圓通性則無作妙行自然分披寶明空覺自然發現有為習漏當不復生衆塵廓然無復隔越也梵唄詠歌自然敷奏者能使法界永離衆苦常得妙樂也聖人所演圓通法門奧旨妙利詳悉若是故衆瑞詳而應之音切驅丘于切暴簿報切割音葛忿敷蘊切垣胡官切
