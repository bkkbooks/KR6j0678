body:
  text: 唐天竺沙門般剌密諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二修道分雖見性真非修莫證故即前了義示修行門文三初修行真基二初阿難伸請阿難及諸大衆聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沉冥出於苦海讚謝前法也惑消心悟身意輕安謝發明覺性決通疑滯之益也多方誨示為無上大悲洗我沉垢為清淨寶王世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習引前請後也我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入唯願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學有從何攝伏疇昔攀緣得陀羅尼入佛知見失性如旅泊見性如華屋見性不修如獲屋不入故請如來本發心路冀入佛知見也無餘涅槃圓果也本發心路圓因也陀羅尼圓行也佛知見圓解也既已見性又求入佛知見者見方開示修乃悟入周稱天子曰天王簡諸王也作是語已五體投地在會一心佇佛慈旨二佛慈開示二初敘意標宗爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法衆生發菩提心開無上乘妙修行路宣示阿難及諸大衆汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義妙三摩提即首楞正定二決定義即因心業本也二開示二義二一審因心二一總教云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處不滅不生合如來藏為同以生滅心求常住果為異二審察二一外審以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故使先審有為法無非幻妄例明己身即幻妄本唯湛圓真體終無滅壞是為真基也二內審二一明妄三一示濁因則汝身中堅相為地潤濕為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁四大假幻妄之身縛性為纏五疊織見覺之妄汩湛為濁纏為生死根本濁為惑業根本故應審明二明濁相云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是清水覺湛明性也塵沙煩惱惑業也性不相循真妄染淨異也世間人非出世智也故起惑擾湛使性渾濁三釋濁義此五濁義與法華別蓋彼依果言此依因言也因者由於覺湛明性瞥起妄惑汩湛成濁次第有五劫濁者劫云時分即三細初不覺心動之相為無明初起之時非劫末之劫濁也見濁即轉相現相也煩惱濁即六粗前四衆生濁即業相命濁業繫苦相也文五一劫濁阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁覺非空色由一念不覺妄見空相以生發遍迷故空見不分以不分故有空無體為雜於見也有見無覺為雜於空也此無明初起混茫之相也故為第一重二見濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁真性廓湛本無見覺由四大摶結以成根隔故見覺生而廓湛壅四大旋而覺知生是謂相織三煩惱濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁憶識誦習即智及相續執取計名之事也由是於性之內分發六知根容之外分現六塵境根境煩搆以惱湛性名煩惱濁四衆生濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名衆生濁朝夕生滅即造業相也知見欲留即戀著三界業運常遷即隨趣受生此所以為衆生也五命濁汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失凖相織妄成是第五重名為命濁見聞自湛圓而分故元無異性衆塵隔圓融之體故無端成異自性觀之同一真常故曰相知自用觀之互起生滅故曰相背真常生滅同異和合失其凖常是命濁之妄織也五濁從細至粗有生皆具所謂生死根本虗妄滅生者也二審真阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地修證如澄濁水貯於靜器靜深不動沙土自沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德見聞覺知六受用根也常樂我淨涅槃妙德也生死根本五濁業用也夫欲反妄契真先當擇去生死妄本依不生滅圓湛之性以成其功如澄濁水必於靜器以湛旋其虗妄使伏還元覺如以靜沉其沙土使清水現前也此則初伏客塵煩惱而已蓋方旋之使伏非真無生滅性也及得其本元真明之覺無生滅性則無明之根本永斷而覺湛明相於是精純一切變現不為煩惱如去泥鈍水一任攪淘無復汩濁乃可為因地心也因心如此則果地修證無有不圓涅槃妙德無有不合故因心不可不審也二審業本五一總教審察第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位無明發業愛取潤生六識能作梨耶能受潛為煩惱根本發為虗妄根塵知之乃可降伏降之乃可取果阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故釋上須知其處也引空義者謂除無結則無解而孰能無結哉二正示業本則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越示虗妄根塵顛倒處也眼耳六賊妄根也媒引六境妄塵也自劫真性自生纏縛顛倒也衆生世界即根身也器世間即三界也三廣明妙用阿難云何名為衆生世界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去末來現在為世方位有十流數有三一切衆生織妄相成身中貿遷世界相涉衆生世界亦具四方即左右前後是也世者三際迭遷界者各有定位界位有十世數有三一身所具理自互涉故曰身中貿遷世界相涉而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方方雖有十常數唯四四數必明與世相涉三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百三四互涉故曰宛轉三世流變故有三疊自一疊十十疊百百疊千成千二百六根各具然此權依世論以顯妙用大略耳若夫六解一亡互用圓照夫何數量所及阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右傍觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德依四方論則一方三百以三分言則一分四百先顯織妄欲明根結之始使知所解也次辨優劣欲明耳根圓通使知所選也如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德能周聽故功全也動若等者隨彼之動則似有近遠在我之靜則周聽無邊如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻唯八百功德出能取香入能聞香出入之中無能故闕中交如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德世出世智所知之境唯舌詮顯其言雖局其理不窮如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身唯八百功德離闕一分合全二分曰離一合雙如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德四牒審圓根二一總告阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍流根即妙湛不動者也決之而出流逸奔境名生死流逆之而入反流全一名不生滅六受用根即上所明者循圓則合性而深不圓則離性而淺深淺相遼故遲速之功日劫相倍夫欲速反須擇圓根也我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨得圓自在慧則十八界無非圓通然下劣初機未能圓得且自一門而入一根無妄則六皆清淨不唯悟十八界塵塵剎剎皆圓通矣二別明二一問阿難白佛言世尊云何逆流深入一門能令六根一時清淨二答四一辨惑佛告阿難汝今已得須陀洹果已滅三界衆生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得河況此中生住異滅分劑頭數湛圓因惑而分一六因惑而生故將告一六之義先與辨惑也小乘見道門斷三界貪嗔癡等十分別惑乃證初果故曰已得陀洹已滅見惑也修道門斷三界貪嗔癡慢四俱生惑亦曰思惑此乃根中纍生無始虗習三果乃斷所以阿難未知也況此根中更有生住異滅諸微細惑其分劑頭數又非阿難所知者斷盡此惑六湛乃圓二推明今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承耳不見足無語不可以為一也耳聞法而身口同不可以為六也是故應知非一終六非六終一終不汝根元一元六阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生既無定趣則一六之義非本元有由顛倒生汝須陀洹雖得六銷猶未亡一六者粗惑妄結也一者法執細識也須陀洹已斷粗惑不入色聲香味觸法是得六銷而尚滯法執是未亡一也以後文證之此乃方得人空而未能成法解脫至俱空不生乃亡一矣然小乘必消六然後亡一大乘直亡一使六自消叔世窮道雖曰得妙竟涉離微求其真能亡一者不可多得覆尋聖言蓋深有所發也如太虗空參合群器由器形異名之異空除器觀空說空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是虗空本非同異喻湛圓本非一六合器除器喻一六義生之由也知太虗之同異是非了無所立則一六併亡而湛圓不分矣三原妄一六既無而現有六根者由粘湛妄發耳故原其妄發之源以示之文七一原眼由明暗等二種相形於妙圓中黏湛發見妙湛圓明本非見覺由粘妄失真於是發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色見精眼識也色眼塵也二者妄結以成眼根此根之元攬四大而成體以未奔境故名清淨方是之時如蒲萄朵而已蓋體雖具而識未流所謂但如鏡中無別所知者是也及乎流逸奔境則染故轉名浮根四塵而不名清淨四大二原耳由動靜等二種相擊於妙圓中粘湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲自此而下皆例上釋新卷葉則有竅而已三原鼻由通塞等二種相發於妙圓中粘湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香四原舌由恬變等二種相參於妙圓中粘湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味常性為恬奔味為變初生之月偃然舌相如之皆喻無情之物者明體雖具而識未流也五原身由離合等二種相摩於妙圓中粘湛發覺覺精映觸摶觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸覺精身識也腰鼓顙徒有觸體未有觸用喻清淨根元也顙喻根元則鼓喻浮根元因浮根然後流如顙因成鼓然後觸六原意由生滅等二種相續於妙圓中粘湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法暗室之見亦有體而已識未流也七結顯阿難如是六根由彼覺明有明明覺失彼精了黏妄發光有明明覺如所謂性覺必明妄為明覺也黏妄發光則妄有見覺也是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄釋上因妄發故六皆虗妄若離六塵悉無自體了知即意用也四顯圓四一開發汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫粘內伏伏歸元真發本明耀耀性發明諸餘五粘應拔圓脫彼十二相能粘六根障湛明故拔一根而本明發本明一發則妄粘皆脫而圓矣不由前塵所起知見不明循根寄根明發由是六根互相為用粘妄則由前塵循浮根故成隔礙脫粘則不由不循特寄根而已故能互用二引證阿難汝豈不知今此會中阿那律陀無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念那律尊者因精進失明而能見賢喜龍王無耳能聽恆河之神無鼻聞香驕梵受牛哨報故曰異舌舜若多主空神也其質如風而能覺觸修滅盡定得空寂者意根斯滅如大迦葉者雖滅意根而能了知此皆不由不循而發本明耀者也三結示阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷冰應念化成無上知覺失彼精了由塵起見則根境成礙故脫粘圓拔真光瑩發則浮塵幻相如湯消冰成一圓融清淨寶覺四驗顯阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙聚見於眼則緣明有見之時也急合而暗則暗成無見之時也六根頭足既黯然無見而觸之一一能辨同於明時由是驗之不明自發暗不能昏者人人具有但脫粘消塵自成圓妙矣五牒審常性二一問難阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應牒前起難也世尊如果位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果離幻復真常住不壞名七常住果而見聽六用離塵無體是斷滅法依斷滅因求常住果烏得相應耶此誤認緣塵迷失常性也由失常性故難契常果實修證大患故須難明也諸佛所得曰菩提寂靜常樂曰涅槃不妄不變曰真如離過絶非曰佛性分別一切而無染著曰菴羅識一法不立煩惱蕩盡曰空如來藏洞照萬法而無分別曰大圓鏡智菴摩羅此云無垢即第九白淨識也此已成智而名識者以能分別故楞伽曰分別是識無分別是智有空如來藏有不空如來藏有空不空如來藏寶積經曰空如來藏離不解脫一切煩惱不空如來藏具河沙佛不思議法空不空如來藏隨為色空普應一切後二隨用得名獨空如來藏為真體故為果號世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先說湛精圓常違越誠言終成戲論云何如來真實語者唯埀大慈開我蒙吝復揣六用疑若斷滅而反以佛說湛常為不誠而近乎戲論不得為真實語者二與審二一辨迷三一敘迷佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑倒因即疑妄分別也真倒即執常為斷也二驗倒二一約根驗即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大衆俱言我聞鐘歇無聲佛又問言汝今聞不阿難大衆俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大衆又言俱聞佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絶則名無聞此但無聲非謂無聞必再擊疊問者欲令審辨而有悟也二約塵驗如來又敕羅睺擊鐘問阿難言爾今聲不阿難大衆俱言有聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大衆俱言有聲佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絶則名無聲上答為倒此答為正蓋聲有生滅聞性常在迷情不了以聞同聲是以常為斷也三責惑佛語阿難及諸大衆汝今云何自語矯亂大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂二正審四一顯常阿難聲銷無響汝說無聞若實無聞聞性已滅同于枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者聲塵或有或無聞性未嘗有無所謂聲無亦非滅聲有亦非生此即不生不滅真常性也夫知無者亦因聞根不可謂無聲則無聞也是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無牒上顯常也二警發汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性牒上警發使悟常性也三驗常如重睡人眠熟牀枕其家有人於彼睡時搗練舂米其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅此驗勞生雖在倒妄生死常性不昏不滅也四結告以諸衆生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺不悟性常故逐諸生滅能守常性常果可冀矣前令審擇常性為因地心而阿難牒難故此結告也常光現前根塵消落者謂得其常心則妄塵自滅妄塵既滅法眼自明以此為因則七常住果於是可獲故曰云何不成無上知覺音切繄烏奚切泊步各切捐與專切汩古忽切媒莫杯切織音職貿亡候切黏女亷切恬徒亷切顙蘇朗切殑其證切黯乙湛切怪昔怪選先充切頃傷并切舂書容切遄市緣切
