body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二發明覺性直使造悟三初經家敘意爾時阿難及諸大衆聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性敘衆心感悟冀佛發明也前責以動為身以動為境則身心真妄未辨虗實又責念念生滅遺失真性則不生滅者亦未能辨故願顯出二義庶幾發明也二問答發明十一初即身變異明不生滅二初匿王請問時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大衆諸有漏者咸皆願聞欲明身心不生滅地而因匿王發起者明不生滅性在纏皆具而世俗但隨物化雖居至貴終從變滅曾不自知則匿王發起蓋有所警也迦旃延毗羅胝子執斷見外道也二佛與發明二初問答辨幻佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅世實危脆無牢強者佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡如羊入屠肆步步趍死地佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頺齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時壯色不停猶如奔馬故不可比也孩才成骸者孺需人以養者皮表曰膚文理曰腠頺如日頺言晚暮也佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十于今六十又過于二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀二紀實為年變豈惟年變亦兼月化何直月化兼又曰遷沉思諦觀剎那剎那念念之間不得停住故知我身終從變滅細觀幻理暗促迭更驟趣於盡也過二謂六十二也且限十年以寬數粗觀也自促細觀實念念不停矣二即幻明真佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知佛言我今示汝不生滅性大王汝年幾時見恆河水王言我生三歲慈母携我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所説二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至于今年六十二亦無有異幼壯老耄種種變異而見無有異此即生滅中不生滅者也耆婆此云長壽天神携子謁之求長壽也佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽梨等都言此身死後全滅既無生死即汝真常不應惑彼斷滅異論也末伽梨即迦旃毗羅之徒王聞是言信知身後捨生趣生與諸大衆踊躍歡喜得未曾有既蒙發明頓悟真常不執斷滅也二依手正倒明無遺失二初阿難請問阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢因王問答反動疑塵以謂性有生滅可説遺失既無生滅云何能遺二佛與開示二初比類即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間衆生以此為倒而我不知誰正誰倒此明諸佛衆生同一體性固無遺失特依倒見言遺失也如臂順垂為正反以為倒逆竪為倒反以為正是失真也自本觀之初無遺失初無正倒故曰誰正誰倒母陀羅云印手即三十二相之一佛告阿難若世間人以此為倒即世間人將何為正阿難言如來竪臂兜羅綿手上指於空則名為正佛即竪臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視以竪為正真顛倒也然此顛倒但是首尾相換自本觀之初無遺失而世人一齊倍加瞻視強生分別足見其妄也則知汝身與諸如來清淨法身比類發明如來之身名正遍知汝等之身號性顛倒臂體本一由情執妄辨法身本同由正倒成異若夫忘情執遺正倒則臂體自如法身不二矣二原迷隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒于時阿難與諸大衆瞪瞢瞻佛目睛不瞬不知身心顛倒所在將與原窮顛倒之本庶幾反悟而大衆迷瞢不知所在佛興慈悲哀愍阿難及諸大衆發海潮音遍告同會諸善男子我常説言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷示倒無別處唯心所現使即心而悟也色總舉五根六塵也心總舉六識八識也諸緣即根識所緣諸法也心所使即善惡業行靜作思想也諸所緣法廣舉山河大地明暗色空真妄性相邪正因果悉無自體唯心所現如鏡中像全體是鏡然則汝今幻妄身心皆是妙明心鏡所現全體是心直不即幻妄而悟妙體反乃遺本妙而執幻妄是認悟中之迷此即顛倒所在也妙心則一而稱謂多異者依法隨用之異也此明心所現物如鏡故稱妙明真精也又明迷本逐末故稱本妙明心也所謂本妙者本來自妙不假修為也心之與性乃體用互稱也心則從妙起明圓融照了如鏡之光故曰圓明妙心性則即明而妙疑然寂湛如鏡之體故曰寶明妙性晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來説為可憐愍者正原迷倒之由也圓妙明心本非空色全一真覺而已由妄塵瞥起成晦昧相於是轉覺體為頑空晦妙明為妄色空色既立想相競生色想雜和遂為身相妄有緣氣於中積聚內則隨想搖蕩外則逐境奔逸此特雜妄緣塵昏擾之相而人以為自心體性得非迷哉既一迷此則決定以心為在幻質之內曾不知妙明真心範圍天地包吞萬象乃認之於蕞爾身中何異棄彼無邊剎海認一浮漚以為全潮之體溟渤之量此則以正為倒一剖瞻視之人故引垂手之事結之明其以正為倒也二辨斥緣影甄別混疑二初請問混疑阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現説法音現以緣心允所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道因聞法音悟妙明心本來圓遍了無遺失故曰常住心地然情猶鹵莽見未精明尚以能聞緣心為所悟本性此固常情疑混根於心而難拔者故願佛與之二佛與宣示二初認緣失真佛告阿難汝等尚以緣心聽法此法亦緣非得法性因聲而有分別者緣心耳非心之真也因境而有妄見者緣法耳非法之性也如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是因境妄認則展轉迷緣事事失真也三辨緣無性若以分別我説法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若真汝心則無所去云何離聲無分別性分別緣心離塵無性若過客耳常住真心則無所去若亭主也斯則豈唯聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等昧為冥諦躡阿難之意廣明也聲分別心指聲上緣心即悟佛法音者也分別我容謂色上緣心即允所瞻仰者也如是乃至等即兼舉六塵緣影皆無自性也一切皆無故非色對緣妄有故非空既非色空冥然莫辨匪唯外道昧為冥諦末學至此皆冥冥然也拘舍梨即末伽梨異稱離諸法緣無分別性則汝心性各有所還云何為主結前起後也四依八境示見性無還二初阿難請問阿難言若我心性各有所還則如來説妙明元心云何無還唯垂哀愍為我宣説妙明元心即見精也二佛與宣示佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地且汝見我見精明元全指阿難對境之見也此之見元自妙精明心而出故云雖非妙心如第二月蓋第二之月實則一體因揑成異譬見精妙心本無二相由人二之也月影則端有二相故云非是阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦瞑則復昏暗戶牖之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中遍是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還明暗通塞緣空清各還八因能觀八種見精明性當還何所則復見緣者分別心生則見色心諸緣也何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別徵釋無還也若有所還則隨境去無復能見矣境自有差見性無別則不隨境明矣諸可還者自然非汝不汝還者非汝而誰結示無還實汝真性所謂萬象之中獨露身者也則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍結責警悟也五即諸物像決擇真性二初阿難躡問阿難言我雖識此見性無還云何得知是我真性雖知見精無還而現與物雜未能甄辨二佛與決擇五初泛敘見用佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚衆生洞視不過分寸此敘有五一聲聞二羅漢三菩薩四如來五衆生意明四聖六凡見量雖異見精不殊皆可即物象而決擇也阿難見未離欲故曰未得無漏清淨初禪即色界之首離欲天也那律即無漏羅漢修得天眼能見大千故觀閻浮如一顆耳衆生不過分寸者屏帷之隔即不能及也二即物決擇阿難且吾與汝觀四天王所住宮殿中間遍覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰為物象先標物象次令決擇阿難極汝見源從日月宮是物非汝至七金山周遍諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝極汝見源令窮力諦觀也上極日月下極輪圍中極萬物令一一詳擇也三正示見性阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性前問云何得知是我真性此示萬境差別見無差別無差別者即汝真性此之真性覽粗濁而不雜精也涉萬殊而不異妙也極遠近而同矚明也四辨見非物若見是物則汝亦可見吾之見物則可見此躡上咸物非汝之言重辨也若同見者名為見吾吾不見時何不見吾不見之處同見者依物之迹也不見者離物之體也若謂吾汝同見一物是見吾之見特迹而已當吾離物不見之時其體何在既無處可見定非是物矣若見不見自然非彼不見之相縱辨也縱使妄意謂能見吾不見者終自非是彼不見相蓋彼不見相非見所及若不見吾不見之地自然非物云何非汝見既非物即真汝性又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立又約物我雜亂辨見非物也若見是物則物應有見而有情無情體性錯雜不可分辨故曰不成安立則見非是物又可明也諸世間謂衆生及器通指有情無情也五牒顯結答阿難若汝見時是汝非我見性周遍非汝而誰云何自疑汝之真性性汝不真取我求實牒上以顯真性也是汝非我者明見體不與物雜也若悟見體不與物雜則了知見性廓然清淨周遍法界即真汝性何疑不真而求質於我耶此結答云何得知是我真性之問也性汝者能性於汝如所謂性一切心六明見真體本絶限量二初阿難躡問阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓遍娑婆國退歸精舍秪見伽藍清心戶堂但瞻簷廡世尊此見如是其體本來周遍一界今在室中唯滿一室為復此見縮大為小為當牆宇夾令斷絶我今不知斯義所在願垂弘慈為我敷演此躡承佛神力能見初禪之事為問以所視廣狹而疑見體舒縮蓋未能親證徒以情器量度故也四天宮與日月齊所視之廣故遍娑婆國精舍則狹戶堂又狹矣一界即娑婆也二佛與辨明三初直示佛告阿難一切世間大小內外諸所事業各屬前塵不應説言見有舒縮一切世間則根身器界之類大小內外則一界一室之類諸所事業則舒縮夾絶之類此總舉萬法皆屬前塵與吾靈覺自不相涉是故前塵大小見無舒縮譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在器喻前塵空喻見體器有方圓空無變異既無變異何有舒縮云何為在者見體如如不容情器妄度也阿難若復欲令入無方圓但除器方空體無方不應説言更除虗空方相所在離塵觀性自得本真不勞功用二遣情若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築牆宇能夾見斷穿為小竇寧無續迹是義不然既非可挽定非可縮既非可續定非可斷義既不然無用情計三結顯一切衆生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端遍能含受十方國土迷己為物謂失性隨塵也為物所轉謂因而倒妄也為物所轉者如空隨器變故於是中觀大觀小而終為衆生能轉物者如除器觀空故即心圓明遍含國土而即同如來蓋毛端國土本非小大含容之理不假神變但除情器則廓爾現前也七明見與緣同一妙體二初阿難疑異阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身躡前發問也前即諸物而指曰此精妙明誠汝見性即是此是妙性現在我前與身心異矣而今身心分別有實者言心有分別而見無分別與身分辨成異物也若實我心令我今見見性實我而身非我何殊如來先所難言物能見我唯垂大慈開發未悟在前之見若實我心則彼實我而此非我見在物而不在身是物能見我矣此皆即迷情而難辨也二佛與和融三初委曲辨示四初通破前疑佛告阿難今汝所言見在汝前是義非實二責辨非實二初辨物無是見若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祇陀林遍觀林渠及與殿堂上至日月前對恆河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑通辨萬物無是見者若空若物總舉色空諸法令詳辨也初言見精次言見元後言精見者此見本乎妙精明心故通言精從心首出故曰見元依用指體故曰見精依體指用故曰精見林渠猶林泉也阿難言我今於此重閣講堂遠洎恆河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所説況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性佛言如是如是物無是見故雖大聖不能即物剖辨意須離物矣此結無是見者二辨物無非見佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者牒定前言既無是見當指非見今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實遍見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是先答不知以義未可定也若樹非見何能是樹若即是見樹當名見云何名樹然前斷為無是見者既不中理故復思惟無非見者二義無定佛皆許者以色空等象如虗空華本無所有固不可定指也故下文云此諸物象與此是精元是菩提妙精明體於中本無是非是義三初學罔措於是大衆非無學者聞佛此言茫然不知是義終始一時惶悚失其所守疑佛所答二義無定故失所守四佛慈慰喻如來知其魂慮變懾心生憐愍安慰阿難及諸大衆諸善男子無上法王是真實語如所如説不誑不妄非末伽梨四種不死矯亂論議汝諦思推無忝哀慕魂慮變懾即惶悚失守也真語等者謂上答二義乃稱真之語如如之説非矯論也末伽外道四種矯亂見末卷行陰之文忝辱也二文殊請明佛意為顯見與見緣如虗空華於中本無是非是義故以如語隨問而答然此非有學小智所及故大衆茫然失守而必須文殊請明也是時文殊師利法王子愍諸四衆在大衆中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大衆不悟如來發明二種精見色空是非是義二種者精明見元及前緣色空是非二義也世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮唯願如來大慈發明此諸物象與此見精元是何物於其中間無是非是牒前罔措之意請明也三正示同體三一正定所照佛告文殊及諸大衆十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是自住三摩地即自性首楞正定也聖人住是定中了見萬法唯一圓融清淨寶覺曾無非是此正答所問也見根也見緣境也所想相識也根境識三攝盡萬法夫能了諸緣法元一寶覺無是非是則從前真妄虗實倒心緣影疑異分別之情豁然而蕩矣二顯無是非二一喻明文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊此示一真法性本無是非也如汝文殊者舉本無是非之體也更有文殊是文殊者為無文殊明因有是非遂失本真也故曰我真文殊無是文殊蓋若有是者我則非真矣所謂才有是非紛然失心何以故若有是者則二文殊然我今日非無文殊於中實無是非二相釋成上義也則二者明有是則有非也然我下明雖不立是亦不墮非於當體中實無二相二合顯佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月妙明之見如所謂汝文殊也空塵見緣如所謂是文殊也菩提心如所謂真文殊也色空聞見如所謂二文殊也皆依淨圓真心而起故如第二月當體全虗無容辨詰知不容辨則是非泯矣文殊但一月真中間自無是月非月但造真體是非自亡三結告時衆是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是精真妙覺明性故能令汝出指非指見與塵指妄染妄境也觀見塵而發明如以指喻指終沉妄想不出是非由精真而發明如以非指喻指可出是非得無分別出指非指言是非雙泯也音切胝音知殞于敏切孺而遇切膚音夫腠倉奏切頺杜回切耆音冒皺側救切逮音代殂作胡切携戶圭切綿武延切瞪直證切矒武亘切瞬舒圍切擾而沼切瀛以成切渤蒲沒切上同斂良冉切氛音焚紛音芬簷余廡切廡音武縮所六切挽無遠切築音竹竇音豆確苦角切剖普后切剝北角切惙知劣切矯居夭切鮮音蘚
