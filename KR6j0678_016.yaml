body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二如來開示二初讚許佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝説二正示四一因妄生習二一總標阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分二別明二一內分積情阿難內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液心動於內曰情故情為內分情人之陰氣有欲者也故因諸愛染而起以陰積故能生愛水潤業潤生輪回不斷職皆由此阿難諸愛雖別流結是同潤濕不升自然從墜此名內分諸愛不一皆能感水結惑故曰流結是同水性沉下故情積之業多從淪墜二外分發想阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清心持呪印顧雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命意緣於外曰想故想為外分想人之陽氣有冀者也故因渴仰而發以陽積故能生勝氣如輕清雄毅等事皆勝氣也想能生勝而卵以想生者由染淨異也阿難諸想雖別輕舉是同飛動不沉自然超越此名外分諸想不一皆能輕清飛舉故曰輕舉是同以輕舉故多能超越二從習感業三一標感變之時阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交人之情習好生惡死以生為順以死為變逆順相交謂方死方生之間也一生善惡之業即於是時隨其情想輕重而感變焉二辨感變之理五一純想純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生想體輕舉故純即飛升然此特純善故止於生天若兼修福慧淨願則二交六時感變倍勝二情少想多情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙勝想不純少滯邪情故感此類其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下雖滯邪情而有善願斯感善緣即天龍八部類也三情想均等情想均等不飛不墜生於人間想明斯聰情幽斯鈍人有聰鈍其理如此四情多想少情多想少流入橫生重為毛群輕為羽族此六情四想也情多故淪變帶想故飛舉而重業不能但為毛群橫生即旁首者由行不正故七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫俱舍説大地最下有金水風輪有八寒八熱地獄在三輪之上此文説沉下水火風輪又似地獄在三輪之下疑此所指非地下三輪乃地獄三輪也言水輪火際即寒獄第八也受氣猛火謂受火氣以為身故常被火燒或得水飲亦化為火故曰水能害己九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄情業愈滯故獄報愈沉下洞火輪即八熱獄也入風火交過地謂超寒獄入熱獄也熱獄第八名五無間有間即餘七也五純情純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄説法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄阿鼻此云無間謂受罪苦具身量劫數壽命五者皆無遮間名五無間獄此唯情業最重者墜入至劫壞乃出若兼謗大乘等罪則此劫雖壞更入十方阿鼻無有出期以謗法毀戒令無窮人墮邪見故三結所感以答循造惡業雖則自招衆同分中兼有元地前問地獄為有定處為復自然故答純情以造雖則自招同業所感不無定處元地者各隨元由也三從業分趣下從地獄上至非想文七一地獄趣二一結前起後阿難此等皆是彼諸衆生自業所感造十習因受六交報前略明情想感變此詳明根境構造也十習本於十惑以習成惡業六交因乎六根而交起惡報二總徵別明五一十習因十一淫習云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸暖相現前二習相然故有鐵牀銅柱諸事惡業起於情惑而淫為情惑之最故前後皆首明之十習之業皆先言所感之境次言所報之事淫感火業由惑心熾盛相摩而發也故所感之境見大猛火舒王曰淫習研摩不休自耗其精則火界熾然於其生也尚有痟渴內熱等疾則其死也見大猛火宜矣能所交熾名二習相然故有鐵牀銅柱之報乃應其習業也是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑如來為導師故色目以警之菩薩為行人故深怖以避之色目猶詺目也二貪習二者貪習交計發於相吸吸攬不止如是故有積寒堅冰於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒冰等事貪習感水由愛心計著吸取而發也吸積風為寒風結水為冰故有積寒凍冽之境吒吒寒冰之報即寒冰獄也俱舍云吒波羅等忍寒聲也青赤白蓮寒冰色也是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海貪水能潤業滋惡瘴海能毒性沒身三慢習三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺慢習驕逸由輕凌恃己而發以驕佚馳流故感騰逸奔波之境積致惡毒故有血河灌吞之報慢能滋癡故如飲癡水能致深害故譬巨溺癡水西國水名四瞋習四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵橛劍樹劒輪斧鉞鎗鋸如人䘖冤殺氣飛動二習相擊故有宮割斬斫銼刺捶擊諸事是故十方一切如來色目瞋恚名利刀劒菩薩見瞋如避誅戮心屬火氣屬金瞋者由心作氣而反動其心加之衝擊抵忤則心火轉盛氣金轉剛故曰心熱發火鑄氣為金也斷刑曰宮肉刑曰割五詐習五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二習相延故有杻械枷鎖鞭杖撾棒諸事是故十方一切如來色目姦偽同名讒賊菩薩見詐如畏豺狼詐習依姦智起惡而漸滋蔓故如水浸田草木生長由調引相延故感繩木延引之事讒賊姦詐敗正者也六誑習六者誑習交欺發於相罔誣罔不止飛心造姦如是故有塵土屎尿穢汙不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺誑者以狂言欺人其志誣罔其心飛揚如風鼓塵使人無見故感塵土穢惡之境沒溺騰墜之報七冤習七者冤習交嫌發於䘖恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目冤家名違害鬼菩薩見冤如飲鴆酒冤習含恨陰隱為傷故如陰毒畜惡而感飛石囊撲之境投擲拋撮之報飛石投擲車匣牢柵皆陰隱事也八見習八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍如行路人來往相見二習相交故有勘問權詐考訊推鞫察訪披究照明善惡童子手執文簿辭辨諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄遍執如臨毒壑見習有五一薩迦耶此云身見謂執身有我種種計著二邊見於一切法執斷執常三邪見邪悟錯解撥無因果四見取非果計果如以非想為涅槃之類五戒禁取非因計因如持狗戒為生天因之類此五總名惡見順邪反正故云發於違拒出生相反由其違反故感王吏證執之境權詐推鞫之報路人相見一去一回喻所見違反也是五惡見能陷法身故名見坑能致業苦故名毒壑行人當疾滅之九枉習九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺槌按蹙漉衡度諸事是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹靂於不宜曲而曲之曰枉枉非真情由誣謗發逼壓於人故感報如之排擠挫也押捺亦其義也漉瀝也衡橫也謂迫蹙其體瀝漉其血又於迫隘苦具橫衝而度所謂下透挂網倒懸其頭者皆衡度類也讒能傷入故名讒虎以可驚懾故喻霹靂十訟習十者訟習交喧發於藏覆如是故有鑑見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海訟非官訟公發其覆之謂也此正覆習也此覆彼訟曰交喧故感鑒見照燭之境惡友對驗之報陰賊藏覆發則自害覆罪適足自壓自墜故如戴山履海也十習發於十惑通根本而兼隨隨煩惱二十初曰忿恨惱覆誑諂憍害今詐習即諂也冤即恨也枉即害也訟即覆也略例而已二六交報二一總標云何六報阿難一切衆生六識造業所招惡報從六根出從識造業從根顯報業報相會謂之交二別明六一見報二一依根感報云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘煙入無間獄發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐見覺屬火故感猛火畏見於境恐藏於心六交皆直入無間者就重言耳成論云極善極惡皆無中陰所以直入二隨根轉變如是見火燒聽能為鑊湯洋銅燒息能為黑煙紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界聞聽屬水故燒聽能為鑊湯洋銅鼻嗅主氣故燒息能為黑煙紫𦦨舌主味丸糜味類也身主觸灰炭觸類也心正屬火燒之轉熾故迸漉煽鼓二聞報二一依根感業二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沉沒聞聽屬水故觀聽旋復則水不能溺依之造業則能感波濤開閉猶通塞也愗昏也二隨根轉變如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄注聞發聲故為責罪詰情之事注見能為雷吼者聞波為陰見火為陽陰陽相薄而成雷故也注息為雨霧水隨氣變也注味為膿血水隨味變也注觸為畜鬼水隨形變也注意為電雹意出於心水火交感也一切物理莫不因五行乘陰陽以變化故此隨根轉變之事皆不出此三嗅報二一依根感業三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近亡者神識從地踊出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地因貪惡香作種種業果感毒氣成種種報二隨根轉變如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛砂礰擊碎身體質礙也履通也嗅業所依不離通塞故衝息能為質履也衝見為火炬衝聽為沒溺洋沸則見覺屬火聞聽屬水明矣飢餒乖爽由味隨氣變也綻拆爛壞由體隨氣變也衝思為灰砂依土感也四味報二一依根感業四者味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火燋爛骨髓舌根屬心發語罔人貪味網物故感鐵網熾烈周覆舌業所依不離吸吐吸氣為寒吐氣為熱蓋常理也二隨根轉變如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下舌噉生命使彼承忍故歷嘗發苦使己承忍依見貪昧故能為燃金石依聽發惡故能為利兵刃依嗅恣貪籠取群味故能為大鐵籠觸味傷物故感弓箭以自傷終味思物故感飛鐵以充味五觸報二一依根感業五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血漬二者離觸刀劒觸身心肝屠裂身業多受惡觸多起惡觸故執招大山來合及鐵城火狗等皆惡觸雜感也觸業所依不出離合屠裂即離相也二隨根轉變如是合觸歷觸則能為道為觀為廳為案歷見則能為燒為爇歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙道趣獄路也觀獄王門闕兩觀也廳案治罪之處皆身觸所依也燒爇見觸也撞擊聞觸也括袋息觸也耕鉗舌觸也飛墜思觸也剚射考縛則相因旁舉爾剚插刃於肉也括袋所以收氣也思業飄蕩故感飛墜之事六思報二一依根感業六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍思屬上而飄蕩故見惡風吹壞國土等事思業所依不出迷覺荒奔迷思也知苦覺思也二隨根轉變如是邪思結思則能為方為所結見則能為鑒受證結聽則能為大合石為冰為霜為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰思必有所故結思則為受罪方所見能鑒證故結見則為證罪人事結聽能為大合石等水土交感也車船檻乃息氣乘亂思所變也嘗即舌根聲所自發也大小已下皆言其身乃觸業乘亂思所變也三結由妄造阿難是名地獄十因六果皆是衆生迷妄所造四詳明輕重五一極重若諸衆生惡業同造入阿鼻獄受無量苦經無量劫同於六根具造十因兼境兼根名惡業同造其罪極重故入阿鼻具五無間二次重六根各造及彼所作兼境兼根是人則入八無間獄各造則有先後間歇為次重故入八無間即八熱獄也有心而不及犯則不兼境無心而誤犯則不兼根故作特犯兼二矣三又次身口意三作殺盜淫是人則入十八地獄身口意殺盜淫乃重罪以不遍六不具十故又次前也大獄只有八寒八熱而經有十八鬲子地獄及八萬四千眷屬等獄皆大獄所分四稍輕三業不兼中間或為一殺一盜是人則入三十六地獄三業不兼謂具二闕一也五次輕見見一根單犯一業是人則入一百八地獄上具二闕一此犯一闕二故又輕也見音現明然不兼也五結答所問由是衆生別作別造於世界中入同分地妄想發生非本來有別作同分者如別造極重而同入阿鼻別造次輕而同入百八是也二鬼趣三一標緣起復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形非破律儀無正範也犯菩薩戒無正因也毀佛涅槃無正果也三者不正諸餘皆邪故墮獄罪畢即入鬼趣二明感類此類乃惑習雜相所謂諸餘雜業不必局配十因文義不循若於本因貪物為罪是人罪畢遇物成形名為怪鬼貪色為罪是人罪畢遇風成形名為魃鬼貪物則吝著不釋故附物為怪貪色則惑於妖邪故墮為妖魃魃鬼遇風成形若魅鬼遇畜癘鬼遇衰各隨其本類化理也貪惑為罪是人罪畢遇畜成形名為魅鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼貪惑為魅貪恨為毒固其理也魅精魅也貪憶為罪是人罪畢遇衰成形名為癘鬼貪慠為罪是人罪畢遇氣成形名為餓鬼憶者常懷姦虐故遇災衰處為癘虐鬼慠者虗憍恃氣故乘飢虗氣為餓鬼類貪罔為罪是人罪畢遇幽為形名為魘鬼貪明為罪是人罪畢遇精為形名魍魎鬼貪罔者潛心陰昧遇幽為魘皆陰昧事也貪明者妄意高明故陰附精明成魍魎類貪成為罪是人罪畢遇明為形名役使鬼貪黨為罪是人罪畢遇人為形名傳送鬼貪成者希意曲從故影附明靈為役使鬼即依靈廟為驅使者貪黨者阿附邪侫故遇人成形為傳送鬼即附巫祝而傳吉凶者三結虗妄阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有情業積水故下墜燒乾則情業已盡復乘想業上出皆迷妄之為也圓明覺心本無是事三畜趣三一標緣起復次阿難鬼業既盡則情與想二俱成空方於世間與元負人冤對相值身為畜生酬其宿債獄報情業鬼報想業故鬼業盡則二報俱空復償負業二明感類物怪之鬼物消報盡生於世間多為梟類風魃之鬼風消報盡生於世間多為咎徵一切異類土梟附塊即邪著餘習也魃鬼昔為妖孽故餘習復為咎徵咎徵者凶事前驗如鼯鼠呼人商羊舞水類也畜魅之鬼畜死報盡生於世間多為狐類蟲蠱之鬼蠱滅報盡生於世間多為毒類為魅憑畜故餘習為狐蛇虺蝮蝎皆毒類衰癘之鬼衰窮報盡生於世間多為蛔類受氣之鬼氣消報盡生於世間多為食類癘鬼襲人蟯蛔附人鬼中飢虗畜中充饋綿幽之鬼幽消報盡生於世間多為服類和精之鬼和消報盡生於世間多為應類綿著也著幽魘人故為服類亦綿著於人即蠶蟲牛馬類也和合也以合精餘習能應節序即社燕寒鴈蟋蟀類也明靈之鬼明滅報盡生於世間多為休徵一切諸類依人之鬼人亡報盡生於世間多為循類明而不幽故為休徵即嘉鳳祥麟類也昔依人故馴服於人即貓犬雞豚類也凡諸異物性妙乎神靈邁於人若龜善考祥馬能知道乃至寒鴈蟋蟀之類不假曆數冥知節序皆餘習也各言多者約業習多分言之未必盡然也三結虗妄阿難是等皆以業火乾枯酬其宿債旁為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結四人趣三一明酬業二一反徵其剩復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直為畜正酬酬過其分則為人反徵過分謂非理苦役食噉無度悉皆反徵然則凡所食取宜無過分也二因徵交讎阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢償足自停則無交讎償足不停則交讎不已自非正修正力莫之遏絶二明感類汝今應知彼梟倫者酬足復形生人道中參合頑類彼咎徵者酬足復形生人道中參合愚類彼狐倫者酬足復形生人道中參合狠類彼毒倫者酬足復形生人道中參合庸類彼蛔倫者酬足復形生人道中參合微類彼食倫者酬足復形生人道中參合柔類彼服倫者酬足復形生人道中參合勞類彼應倫者酬足復形生人道中參合文類彼休徵者酬足復形生人道中參合明類彼循倫者酬足復形生人道中參合達類梟以附塊相食故餘習頑嚚不義魃以淫妖迷性故餘習愚純不智狐以畜性自徇故狠戾不率毒以蟲蠱自昏故庸陋不敏蛔以衰氣附物故衰微不齒食倫出於餓噉故柔怯不勇服倫出於綿著故勞役不息應倫出於精明故文物不陋休徵出於靈知故聰明不昏循倫宿涉世事故曉達不昧是等皆非正報乃餘習所偶故云參合後三皆便巧雜伎世智辨聰者非賢達文明之事也三結虗妄阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者邪倒業輪唯正能止故不遇如來為可憐愍五仙趣三一標緣起阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙仙遷也人之形神能遷而不死者也故曰存想固形然終歸敗壞比天為劣比人為優故別開二明感類阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙以藥餌駐一期之壽而不能輕舉名地行餐黃精松柏之類久而身輕名飛行行功行也堅固金石而不休息化道圓成名遊行仙堅固動止而不休息氣精圓成名空行仙煉金石還丹之類化骨易形撮土點石以遊戲人間名遊行乘陰陽運止以調氣固精遺形涉空名空行堅固津液而不休息潤德圓成名天行仙堅固精色而不休息吸粹圓成名通行仙鼓天池咽津液冰雪婥約不交世欲與天無異名天行吞吸精色服虹飲霧粹氣潛通名通行堅固呪禁而不休息術法圓成名道行仙堅固思念而不休息思憶圓成名照行仙能以術法述道自然名道行澄凝精思久能照應名照行或存想頂門而出神繫心臍輪而煉丹皆思憶圓成也堅固交遘而不休息感應圓成名精行仙堅固變化而不休息覺悟圓成名絶行仙內以坎男離女匹配夫妻外即採陰助陽攝衛精氣名精行存想化理心隨邪悟能大變化其行絶世名絶行三結虗妄阿難是等皆於人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣六天趣三初欲界六天二一列明六初四天王天阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄瑩生明命終之後鄰於日月如是一類名四天王天未能離欲且能窒欲使愛水不流則湛性澄瑩故能生初天也六天由修五戒十善而致今但約欲微增勝者欲愛為輪回根本前明淪墜亦始於此此明超騰亦始於此意使初心未能成就禪定智慧且疾斷根本則輪回可出也二三十三天於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天此愛薄於前故報居其上後遞然也淨居謂清淨自居之時未全清淨之味為有微愛故也日月居須彌腰忉利居頂以澄瑩增明故能超之三時分天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天欲心不作故動少靜多也六欲下二名地居天上四名空居天不須日月而常明以蓮華開合分晝夜故名時分四知足天一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天雖靜心愈多亦未免應觸此能少欲未能無心也兜率天有內院外院三災至三禪而此不及者約內院言之精微不接皆內院之事也五樂變化天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天此無心而境自至曰橫陳嚼蠟言味甚簿也諸天皆有報境而此天樂自變化以受用越於下天故名越化六他化自在天無世間心同世行事於行事交了然超越命終之後遍能出超化無化境如是一類名他化自在天了然超越言全無味也化即第五天無化即下天也諸欲樂境不勞自化皆由他化而自在受用名他化自在二結妄阿難如是六天形雖出動心迹尚交自此已還名為欲界雖出塵擾未能絶欲故通名欲界音切橛其月切刺七迹切校音效屎音矢尿乃弔切碾尼展切磑五對切愗莫候切咂音匝矟音朔剚側吏切魃音跋魘於琰切
