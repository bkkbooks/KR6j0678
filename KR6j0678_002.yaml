body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解四藏暗二一徵阿難白佛言世尊我今又作如是思惟是衆生身腑藏在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何復欲計心在內故以見暗為見腑藏二破三一約外見佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑若不對者云何成見先問次難後結可明有五神之藏六化之腑三焦即六腑之一二約內對若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成眼前之境名外見身內之境名內對前以對眼為外不得成內今縱離外見而成內對即是眼能反觀且合能反觀身中則開應反觀己面若不爾者義不成矣三縱破見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛展轉辨明無反觀理也汝眼已知身合非覺者既在虗空自非汝體也若執兩皆有知則成兩體矣破妄之文多涉曲辨者由人者心見失真沉妄之甚一或詰問則狂蕩失據所謂虗妄浮心多諸巧見故佛逆其妄巧曲與辨明也是故應知汝言見暗名見內者無有是處五隨合二一徵阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有亦非內外中間三處此引楞伽經意也謂由阿梨耶識一念之妄則變起根身器界是心生法生也又以境界風動則識浪騰起是法生心生也以心法相生則隨境思惟即是心體心法合處即為心在二破二一牒前起難佛告阿難汝今說言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然若有體者如汝以手目挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面以即思惟體為心特浮想耳故難其體之有無也設若無體則空有其名云何隨合如十九界七塵特空名耳設若有體當何所在令挃身而驗明體實無在也阿難言見是其眼心知非眼為見非義解上難也謂心但能知不可言見曾不悟能見在心徒眼不見也佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死舉門喻能見在心舉死明徒眼不見二詳辨隨合阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體先立四義下逐義詳辨當知真心非一非多非遍非不遍也若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成辨非一體也無在謂無定處也若多體者則成多人何體為汝辨非多體也若遍體者同前所挃辨非遍體也同前者當挃一支四支應覺若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然辨非不遍也四義既非則不可謂隨所合處心隨有也是故應知隨所合處心則隨有無有是處六中間二一徵阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間此引大教而謬解也以為在內則不見腑藏以為在外則身不相知二義不成當在根境之中也二破二一辨定中位佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身先問下辨處猶境也若在身者在邊非中在中同內身有中邊二義在邊則不得為中在中則同前在內應見內矣若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂明中位無定也表標物以表顯也混亂則無所取中也阿難言我所說中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在謂非身處之中乃根塵之中也二正破非中佛言汝心若在根塵之中此之心體為復兼二為不兼二先立義下推破若兼二者物體雜亂物非體知成敵兩立云何為中破兼二不得為中也物根塵也體心體也物非體知者物不同體之有知則根塵與心兩立無中位矣兼二不成非知不知即無體性中何為相破不兼不得為中也不兼根則非知不兼境則非不知二義既非中云何定是故應知當在中間無有是處七無著二一徵阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不佛意顯心本無在不應有著今阿難又著於無著正攀緣妄情也二破佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同於龜毛兔角云何不著有不著者不可名無牒上難問意明才有覺知不能無著也為在為無者問汝心不著而彼物象為存在耶為空無耶若彼空無則同龜毛云何可著而說不著若有不著者則為有物故曰不可名無此皆牒難下乃結破無相則無非無即相相有則在云何無著物果無相則同龜毛物果非無即自有相知相有則心有在云何得為無著也是故應知一切無著名覺知心無有是處結破也上七徵破曲盡計執妄情既遣妄境自無而真心真見可明矣二正決擇真心真見二初擇真心二初阿難哀請爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣因前徵發乃知迷妄而責躬請教求詣真際所敘之意皆警後流也真際真心實際也唯願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大衆傾渴翹佇欽聞示誨心鑑如水非止不明故求奢摩他路以詣真際真際既顯妄垢自無故令闡提隳彌戾車也一闡提義翻斷善根彌戾車此云樂垢穢人隳壞也二世尊答示三初光瑞開發爾時世尊從其面門放種種光其光晃曜如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽將顯本明故先現此瑞言面門放種種光即口眼耳鼻眉間之光並放示此本明於諸根門無所不現也以無所不現故齊彰並照如百千日普佛界即法界也六震者表將破六識無明感結妄境也微塵國土一時開現者本明洞照妄塵不隔也十方世界合成一界者智境圓現情量不礙也菩薩聽衆皆住本國者心量本周心聞本洞也了茲光瑞則菩提涅槃元清淨體得矣二總示所迷佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成嘉饌縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣衆生業種成聚行人不成正果皆由不知二本錯亂修習故須決擇也業種者顛倒妄惑也惡叉果一枝三子生必同科喻惑業苦三生必同聚也攀緣心即前七處妄認者清淨體即今正與決擇者不染煩惱名菩提不涉生死名涅槃不染不涉故號元清淨體識精陀那性識也元明本覺妙明也根身器界一切緣法依此而生而人者認緣失真故云緣所遺者由遺此故無明不覺枉入諸趣言元體元明又言本明者自本而出曰元直指當體曰本三正與決擇九初舉拳發問阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屆五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳曜我心目佛言汝將誰見阿難言我與大衆同將眼見佛告阿難汝今答我如來屈指為光明拳曜汝心目汝目可見以何為心當我拳曜佛五指端各有輪相二循妄以答阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心金拳舉處直下要識本明塵相未除依舊認賊為子三蒙叱驚愕佛言咄阿難此非汝心阿難矍然避坐合掌起立白佛此非我心當名何等矍驚愕貌也四斥示非真佛告阿難此是前塵虗妄相想惑汝真性由汝無始至于今生認賊為子失汝元常故受轉轉五阿難罔措阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來說此非心我實驚怖兼此大衆無不疑惑唯垂大悲開示未悟無始妄認乍聞非斥故失措驚怖而重請開示六示有真心爾時世尊開示阿難及諸大衆欲令心入無生法忍於師子座摩阿難頂而告之言如來常說諸法所生唯心所現一切因果世界微塵因心成體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體因其怖謂無心故舉常所說引物以證示有真心使知所措也心入無生法忍者令悟實相不生滅心也三界唯心萬法唯識故曰諸法所生唯心所現一切因果指十界正報也世界微塵指十界依報也既無不因心成體安得謂之無心同土木哉以本自無染曰清淨染而不染曰妙淨一切妄心皆受性於此七辨斥妄執若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性分別覺觀即能推心也此心離塵無性不應執以為真如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽間猶為法塵分別影事此依六塵辨無自性也覺知滅則意幽間然彼幽間者猶是法塵影事亦無自性也我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍令細揣摩使知非真也法身即真心也八阿難自失即時阿難與諸大衆默然自失每執妄心乍蒙辨斥無所據依所以自失九結成妄誤佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果四禪四空及二乘滅盡定為九從一禪入一禪次第而修上擇真心竟二擇真見心為體見為用心為法源見為道眼故次第決擇以為密因也文二初阿難哀請二初感慨前失阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝感佛所發慨前之失也世尊三昧迦葉不知故不可相惠當躬修於身自證於心迷悟在己不容相代也窮子捨父譬失本心也今日乃知雖有多聞若不修行與不聞等如人說食終不能飽學道之要從聞思修入三摩地徒聞不修卒無以致故與不聞等猶說食也後世末學虗驕多聞輕喪行實失真背道不自知悔者多矣阿難悲悔實有警發也二重請開示世尊我等今者二障所纏良由不知寂常心性唯願如來哀愍窮露發妙明心開我道眼重述迷因求開示也二障即煩惱所知也所知礙正知見煩惱續諸生死而為妄纏若知寂常則煩惱不起生死莫變而妄纏自釋矣道眼即真見也由妙明心而發二世尊答示三初光瑞開發即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆將明真見而從胸卍字放寶光者表由寶明妙心發正知見也佛胸有卍字表吉祥萬德所集其光晃然明昱然盛有百千色亦表妙心照用具足萬德也光遍佛界者示清淨本然也遍灌佛頂表極果所同也旋及大衆示群靈共有也此即妙心道眼之真光在聖不增處凡不減但隨量應現耳二許從所請告阿難言吾今為汝建大法幢亦令十方一切衆生獲妙微密性淨明心得清淨眼幢表摧邪立正也下明妙心淨眼使摧伏邪異得正知見是謂建大法幢邪異既摧知見既正則妙心可獲淨眼可得矣生佛等有而不可測知曰妙微密垢不能染暗不能昏曰性淨明見離眚病廓然照了曰清淨眼三正與決擇四初問答立義阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相閻浮檀樹果汁入水沙石成金赩赤焰也佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類眼根例拳義實不類而阿難示同未悟故答言類二正擇真見佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損見暗即見矣是知盲非無見特無眼耳阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別如是世尊此暗中人與彼群盲二黑校量曾無有異二暗無別則暗非由根特塵暗耳阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見足知見在心不在眼也若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼牒上結明見不由眼也知見不由眼則直悟見性超越形纍得清淨眼矣三阿難未諭阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨稍明心見故口已默然尚有餘疑故心未開悟四遣拂客塵初四追問發起爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道於鹿園中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果阿難所以心未開悟者尚為客塵迷障故也特為遣拂夫客塵為障大則不成菩提小則不成無學聖慈深愍故追問鹿苑之緣使衆開悟也舒掌意見後文五比丘者憍陳如摩訶男頞婆提婆敷也初於雪山侍佛後於鹿苑習外道法佛初度之二憍陳明義時憍陳那起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是憍陳那此云解最初悟解得名也客塵之喻有通有別通喻煩惱所知二障分別俱生二惑隨境生滅非真常性皆客也染汙妙明汩亂澄寂皆塵也別則客喻分別之粗塵喻俱生之細以生滅不停暫托五陰蘧廬而止故譬行客投寄旅亭起惑造業去故趣新故譬食宿事畢俶裝前途真性常寂初無是事故譬主人無攸往也粗障易遣細惑難明必由性天澄霽智日舒光乘五陰隙照本空性方覺於中妄自擾動此則與身俱生與心同事細微幽隱故譬幽隙之塵也旅亭之客遣之則易幽隙之塵拂之且難直須破開陰隙使豁然洞達然後散滅所以俱生煩惱至五陰盡方得蕩絶也三釋尊煩相二初依境示粗即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是粗惑隨境起滅故以佛手喻對心之境也初問開合明搖動之塵次問動靜明不住之客皆在境不在心故曰性非開合性無靜住二即身示細如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盻又放一光在阿難左阿難又則回首左盻佛告阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是細惑與身俱生故即阿難己頭喻對性之相也亦明搖動之塵不住之客皆在相不在性故曰性無有止誰為搖動不問不住者躡前故略之四結責警衆於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉因阿難而告衆責其認客塵遺自性也前獨明心此兼明境心境萬法皆有本寂之體自本之外皆為客塵如手之開合頭之動搖及其止也本體自寂他無所有則凡諸妄動本不可得而汝衆生以動為身以動為境是徒認客塵遺失真性顛倒行事此輪回流轉之召也言是中自取者真性之中本無流動咸其自取爾欲其即迷處而悟也噫群迷本於愛染因于心目隨逐客塵自取流轉久矣真慈善救縱橫激發亦至矣幾能即迷處而悟哉音釋竅苦弔切挃真栗切混乎本切隳許規切戾郎計切翹渠遙切枉紆往切拳巨員切咄當沒切矍居縛切縷力主切吝良刃切揣初委切逃徒刀切赩許力切詢先偷切虧去為切綱無兩切旅力舉切俶昌六切攸以周切霽子計切陽音揚隙綺戟切彌典切盻匹莧切
