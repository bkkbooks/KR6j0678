body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二色界十八天雖離欲染尚有色質故名色界通名梵世為已離欲染也通號四禪為已離散動也欲天但十善感生此天兼禪定感生然特有漏禪觀六事行耳六行者厭欲界是苦是麤是障欣色界是淨是妙是離此則凡夫伏惑超世間道也文二一列明四一初禪三天四一梵眾天阿難世間一切所修心人不假禪那無有智慧但能執身不行婬欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵眾天不假禪那等者言雖非正修真三摩地無正智慧但修六行伏欲使愛染不生則不留欲界麤惑不染淨報現前故即生梵世初名梵眾則眾庶而已次名梵輔乃大梵宰輔而終於大梵其進有序二梵輔天欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天初天但能執身伏欲此天又得定共戒以順律儀行梵德故超之也戒定相應名定共戒三大梵天身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵眾為大梵王如是一類名大梵天由前淨心威儀戒行而進至於妙圓清淨又加以明悟超達則盛德之至故為梵王四結阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪莫非流也有無明流生死流欲流勝流四果流涅槃流皆各隨流類而趨也欲流則趨於生死雖至六天未足為勝此天已出欲流背生死趨勝淨故四禪皆稱勝流也已離欲界八苦故曰苦惱不逼已離散動欲心故曰諸漏不動俱舍云此名離生喜樂地謂離欲界雜惡生得輕安樂也二二禪三天四一少光天阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天此躡大梵之行升進具戒定慧故曰圓滿以圓滿故能澄凝其心不隨境動而寂湛生光然此初能脫粘復湛其光尚劣故名少光二無量光天光光相然照耀無盡映十方界徧成琉璃如是一類名無量光天定力轉明妙光送發境隨光淨徧成琉璃三光音天吸持圓光成就教體發化清淨應用無盡如是一類名光音天諸世界中教體不同故娑婆以文字香積無文字說但以眾香此天以圓光成音而發宣化法故名光音四結阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中麤漏已伏名為二禪二禪離憂得極喜樂故云憂懸不逼初禪方得漏心不動而未能伏此天已伏麤漏則業漸劣行漸勝也俱舍云此名定生喜樂地謂有定水潤業憂懸不逼也三三禪三天四一少淨天阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天由上圓光教體披露妙理發成精行離前喜動而生淨樂是樂非境乃出乎淨性恬怕寂靜名寂滅樂而淨力猶劣則能通而已未能成也以猶劣故名少淨二無量淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天淨空者離諸喜動不緣物境之定相也由是充擴使淨相無際協乎妙性故身心輕安而性樂成矣以無際故名無量淨三遍淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名徧淨天淨空無際故世界身心一切圓淨淨德成就則性樂歸託於是矣以一切圓淨故名徧淨四結阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪具精行性樂名大隨順故安隱無量也歡喜畢具者此名離喜妙樂地謂心雖離喜而喜樂自具也四四禪九天四禪報境但有三天其第四無想乃第三廣果別開凡夫報境此四之上有五不還天乃聖賢別修靜慮資廣果故業而生與凡夫不同故又別列文二一四根本天前之禪行但是自利未能利他至四禪乃兼修慈悲喜捨利他之心名四無量善無漏觀慧諸禪三昧悉從此出故名根本文五一福生天阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨麤重相滅淨福性生如是一類名福生天前雖逼苦已盡得無量樂然樂不終樂壞苦必隨此天悟此故苦樂頓捨以捨苦樂名麤重相滅捨念清淨故淨福性生二福愛天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天苦樂二忘故捨心圓融心無所累故勝解清淨繇是福無遮礙而得妙隨順自有漏禪定而發無漏行至於究竟故曰窮未來際定福如此為可愛樂故名福愛三廣果天阿難從是天中有二岐路若於先心無量淨光福德圓明修證而住如是一類名廣果天從福愛分二岐也一直往道趣廣果一迂避道趍無想若於先心不帶異執直修禪定使自無量光天至福愛所修福德圓明而住此天定福彌廣故名廣果四無想天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天先心雖能伏惑修禪而涉妄帶異以有心為生滅以無想為涅槃於是雙厭苦樂專研捨心以趍無想由物洎身以至心想一切皆捨名圓窮捨道心慮灰凝即無想定也以是感報生無想天壽五百劫俱舍說初生此天未全無想經半劫始無及報將盡復經半劫有想然後報謝五結阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪想念之心麤曰尋細曰伺初禪二天兼之大梵無尋唯伺二禪無尋伺有喜樂三禪離喜樂有出入息尋伺感火喜樂感水出入息感風四禪并離之不為三災所動名不動地然彼器非真常情俱生滅雖非無為真境而有為功用至此已純熟矣二五不還天三一總敘阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心眾同分中安立居處第三果人斷欲界惑盡即生此天不復欲界受生故名不還亦名五淨居謂離欲淨身所居也習氣種子惑也與現行皆滅故云俱盡此指欲界無續生業也苦樂雙亡兼指四禪已下無續業也故云下無卜居此五天自四禪別立通名捨念清淨地故曰捨心同分二別列五一無煩天阿難苦樂兩滅鬬心不交如是一類名無煩天前於苦樂有捨有厭則心與境鬪不能無煩唯心境兩釋煩惱斯斷二無熱天機括獨行研交無地如是一類名無熱天盛熱曰煩微煩曰熱上雖鬬心不交疑若猶有交地方滅麤相得無煩而已此復增勝心機無對研交無地能滅緣影故得無熱也三善見天十方世界妙見圓澄更無塵像一切沉垢如是一類名善見天能滅緣影故妙見圓澄而染心塵像累性沉垢於是皆無也圓見十方故名善見四善現天精見現前陶鑄無礙如是一類名善現天精見智照也向滯塵垢不能發化今既澄圓猶如明鏡隨緣顯現名陶鑄無礙五色究竟天究竟群幾窮色性性入無邊際如是一類名色究竟天幾者色之微性者相之本未能究了則局於色相自為限礙此能究而窮之故出乎形礙入無邊際名色究竟三結勝阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間麤人所不能見下天修有漏凡定此天修無漏聖業麤細有異故不能見二總結阿難是十八天獨行無交未盡形累自此已還名為色界已離欲染故獨行無交尚有色質故未盡形累三無色界四天無業果色有定果色依正皆然乃滅身歸無定性聲聞所居或無想外道別報或捨厭天人雜處其類不一皆無色蘊文四一分岐超出復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為迴心大阿羅漢色究竟天居有色頂與無色隣名色邊際二岐一出三界即此科也一入無色即次科也四禪皆依捨念修定此言捨心指有頂因心也因心能發無漏智慧斷盡塵惑至於圓明即出三界不住小果入菩薩乘是名回心二隨定趣入此有四天皆依偏空修進初厭色依空二厭空依識三色空識等都滅而依識性四依識性以滅窮研而不得真滅是皆有為增上善果未出輪迴不成聖道文四一空處若在捨心捨厭成就覺身為礙消礙入空如是一類名為空處此專依捨不修智慧厭已形礙竪修空觀滅身歸無即厭色依空者也名空處定故報生空處二識處諸礙既消無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處諸礙既消而無則不依於色無礙之無亦滅則不依於空唯留阿賴末那即厭空依識者也名識處定故報生識處賴耶第八識也末那第七識也身根既消無復六識故唯二者獨留而末那所緣色空識三此位厭色空而依識則色空麤緣已無故唯全半分微細也三無所有處空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處前位能亡空色而未滅識心此則都滅故十方寂然逈無所往以寂無攸往故名無所有然此雖亡識心未亡識性今之行人見性不深多滯於此雖能洞了色空灰滅心慮逮無所有而終於識性幽幽綿綿不能自脫生死窟穴實存乎此四非想非非想處識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處此等窮空不盡空理從不還天聖道窮者如是一類名不迴心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉識性者識心幽本也不動者寂無攸往也既能不動復窮研使滅然依識滅之竟非真滅是強於無盡中發明盡性所以似存不存似盡不盡似存不存故非想也似盡不盡又非非想也此又幽幽綿綿至微之相也以綿微不脫故云不盡空理而聲聞依此以為究竟終成鈍果外道依此無所歸宿終迷有漏也修出世心至此終極麤業已無唯識性為滯若奮然脫此斯出三界矣諸天行位皆是三摩漸次不徒說示其行相相躡相資同前聖位但此示凡淺升進耳若深智體之亦可頓證也三通辯凡聖阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩地漸次增進迴向聖倫所修行路通指欲色無色天也其眾乃隨業感報未出輪迴其王乃隨行權應寄位升進華嚴謂初地菩薩多作閻浮提王二地輪王乃至六欲三梵天王是也此竪論已終故通結指四結名顯妄二一結名阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界身心滅盡者無色蘊及麤識也二顯妄此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特伽羅各從其類三界由妄發生七趣由妄取著補特伽羅即妄取之幽本也七脩羅趣復次阿難是三界中復有四種阿脩羅類若於鬼道以護法力乘通入空此阿脩羅從卵而生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此阿脩羅從胎而出人趣所攝有脩羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿脩羅因變化有天趣所攝阿難別有一分下劣脩羅生大海心沉水穴口旦遊虗空暮歸水宿此阿脩羅因濕氣有畜生趣攝脩羅此云非天福力等天而無天行為多瞋故也隨業輕重有四生之異水穴即尾閭也四通結總答四一通結七趣阿難如是地獄餓鬼畜生人及神仙天洎脩羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒精研細窮也夢識昏沉故妄隨七趣覺心妙圓則了無根緒二總答前問阿難此等眾生不識本心受此輪迴經無量劫不得真淨皆由隨順殺盜婬故反此三種又則出生無殺盜婬有名鬼倫無名天趣有無相傾起輪迴性若得妙發三摩地者則妙常寂有無二無無二亦滅尚無不殺不偷不婬云何更隨殺盜婬事前問妙心圓徧何有獄鬼人天等道故此結示由殺盜婬三為根本有是業則名鬼倫言必墜也無是業則名天趣言必升也出生無殺盜婬即天趣也七趣舉二以善惡通攝也因有而墜因無而升故曰有無相傾起輪迴性若得正定則妙性常寂無復輪迴矣有無二無言相傾業斷也無二亦滅言分別情忘也業斷情忘則三種妄本名迹雙泯矣故欲斷妄輪須修正定也阿難不斷三業各各有私因各各私眾私同分非無定處自妄發生生妄無因無可尋究前問地獄為有定處為無定處彼彼發業各各私受故此牒答三業即殺婬也三勸斷三業汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗偽如來說為可哀憐者汝妄自造非菩提咎殺盜婬為惑業之本故名三惑上明諸趣戒備失錯而終於勸除三惑乃戒備真要也四結示正說作是說者名為正說若他說者即魔王說二詳辨魔境深防邪誤魔羅此云殺者亦云奪者謂能殺慧命奪善法開之有五曰五陰魔煩惱魔死魔天魔鬼魔合之唯陰魔天魔而已陰魔即生死煩惱依五陰而起者也天魔因修邪定好害正道者也未發心者常與隨順則無寇敵唯正修者違而不順偏致惱害故須辨識也文二初召告宣示三初召告即時如來將罷法座於師子牀攬七寶几迴紫金山再來凭倚普告大眾及阿難言汝等有學緣覺聲聞今日迴心趣大菩提無上妙覺吾今已說真修行法汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄汝應諦聽吾今為汝子細分別前法既終當機無問故將罷法座而又攬寶几回金容無問自說者真止觀中微細魔事非一切智莫能辨識能隳寶覺破法王家故須特告乃最後深慈也四禪無聞者智論說比丘無多聞慧但勤小行得生四禪便謂已證阿羅漢及乎天報將畢見有生處遂謗佛妄說羅漢不受後有因此墜墮乃邪誤之咎也阿難起立并其會中同有學者歡喜頂禮伏聽慈誨二正示四初敘魔所起佛告阿難及諸大眾汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發徧迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立覺圓心體所謂真元由迷理背真化迷立妄成有漏界為魔所依化迷者隨迷轉變也當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶空生大覺中如海一漚發又喻片雲以明世界虗幻微芒易以消殞也汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂真元之體本自廓然虗空國土皆是迷頑妄想安立發真不迷則無安立者故自殞裂也或曰有漏空界乃眾生同感云何一人而能消殞矧古今發真者眾而空界依然安在其消殞耶曰同業所感不離晦昧發真返明故可消殞然眾生不可盡世界不可盡故雖一人發真而眾復感結所以依然使同業之人同能發真則山河器界應念化成無上知覺而為淨妙佛土矣汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚慴凡夫昏暗不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝魔以晦昧為依今修禪飾定妙心精明與菩薩羅漢㳷合故能振裂魔界遂致惱害也凡夫天魔王天也惟未得漏盡通也二悟則無惑然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅冰煖氣漸鄰不日消殞妙覺真體無動無壞正力所鑠邪氣自消徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無柰汝何陰消入明則彼群邪咸受幽氣明能破暗近自消殞如何敢留擾亂禪定徒恃神力言諸魔也五陰主人指其心也陰消入明指發真者三迷則遭害若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中秪毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救登伽眇劣只毀戒體諸魔熾惡能隳寶覺固宜深防也宰臣籍沒喻幾於覺位而淪墜惡趣四隨陰詳辨五一色陰三初示陰相阿難當知汝坐道場消落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩地如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇消落諸念者以湛旋其虗妄生滅也離念精明者得元明覺無生滅性也湛寂故動靜不移離念故憶忘如一定力雖爾而色陰未破故如明目處暗雖精性妙淨而心未發光此色陰之相也陰以蔽覆為義區局性真故曰區宇若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本五陰盡相非滅身歸無乃觀力洞照不為迷礙而已故譬若目明朗則十方洞開也最初一念空見不分名劫濁乃色陰之體也故色陰盡則超之色陰始因父母己三妄倫交結故曰堅固妄想為本五種妄本經末自釋二辨現境十一身能出礙阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受群邪此中一色陰定中也妙體本融由妄質成礙故精窮妙明則四大不織而身能出礙也然此特定力所逼使精明流溢暫而不常故非聖證二體拾蟯蛔阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受群邪真精妙明流溢前境則外無所隔流溢形體則內無所障故能身內拾出蟯蛔此亦暫爾三空聞密義又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞說法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受群邪魂魄意志神五藏主也執受第八識為七識之總身為五根之總既為總統故無所涉也前之精研初能外虗次能內徹此復內外精研俱虗徹故五神七識皆失故常迭互相涉故夙昔聞熏自能發揮而忽有所聞也今夫刻意凝神討論之極則奇文麗藻未嘗經意者往往煥然得於夢寐則精研激發神者偶現類可知也四默現佛境又以此心澄露皎徹內光發明十方徧作閻浮檀色一切種類化為如來于時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受群邪淨穢之境常隨心感故澄徹之極則心魂染於靈悟佛境現于心光此同心存佛國聖境冥現也五空色如寶又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時徧滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受群邪精研妙用抑伏雜想制心勝托力用過越故妙明逼極煥散而現也六暗室如晝又以此心研究澄徹精光不亂忽於夜合在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受群邪人固有不明自發暗不能昏者惟細微定心澄使不亂而後能現暗物不除言皆實境不隨定變也七身無所覺又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受群邪定力虗融則五塵併消四大排遣純覺遺身故無傷觸定力所持故火不能燒也世之端居喪我者尚能使形槁木而心死灰況真定之力哉八見能洞觀又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明徧滿又見恒沙諸佛如來徧滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受群邪厭麤濁之質礙欣淨妙之虗融名成就清淨凝想日深久而自化故能洞觀得無障礙也九夜或隔見又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受群邪研心窮遠逼迫精神遺身而出冥有所至故能見聞遠方事也上皆未離色陰徒因定力而能出礙見聞遠及若色陰盡則十方洞開無復幽暗六通縱任無為山壁由之直度固無疑矣十漸發魔事又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端說法通達妙義非為聖證不作聖心魔事消歇若作聖解即受群邪所見知識乃魔變現也前九但明定力獨此乃明魔事者定力未成不能動魔研究精極乃漸發魔事也故下文魔事愈甚三結勸深防阿難如是十種禪那現境皆是色陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道音切貶筆斂切冗而隴切勗許玉切凭皮證切坼丑格切妖於嬌切僉七兼切眇眉沼切籍疾易切溢音逸蟯音饒蛔音回抑音憶
