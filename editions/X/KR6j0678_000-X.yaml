front:
  text: 首楞嚴經要解序前住福州上生禪院嗣祖沙門及南撰像季已還道術既裂明心之士妄認緣塵為物所轉義學之徒虗驕多聞不全道力奇才茂器皆流為蒸砂迷客說食飢夫首楞嚴王懸知其然誕敷祕典力救倒妄淘汰啟迪諄諄之慈靡所不至而末世初機罕能究盡溫陵環師一生掩關與世異好獨陪黃卷聖賢冥搜博訪藉其筌筏以探如來藏游徧知海而造乎一切畢竟之地思與同志共因為是解昔月蓋比丘甞問藥王如來法供養義藥王告言諸佛所說難信深經清淨無染能令眾生成最正覺離眾魔事若於是經方便解說依義不依語依智不依識依了義不依不了義依法不依人直使無明生死畢竟滅盡而無滅盡相是名最上法之供養月蓋蒙教通達妙道得無礙辯即於藥王所轉法輪隨順分布化百萬億人於無上覺立不退轉環師既達妙道仰睎月蓋於釋迦如來所轉法輪最初華嚴最後法華及此楞嚴無上寶印皆以方便徤相分別逈脫語言離心意識唯義所在曾不依人覺眚見病廓無纖翳於清淨經能不染污我願以此流布無窮其所化人何啻億萬直如一燈然百千燈使冥者皆明而明終不盡故述序引翼贊流通於塵墨劫作法供養建炎改元中秋日吉善集堂序
