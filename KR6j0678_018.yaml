body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二受陰三初示陰相阿難彼善男子修三摩提奢靡他中色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇受以領納前境為義已破色陰內外虗融故見諸佛心如鏡現像諸佛心即我妙覺明心也如鏡現像謂清淨虗凝了非形礙也雖具妙體而未能運用蓋為受所覆故如魘寐人支體宛具六根明了而不能運動此受陰之相也若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本色陰盡者已離形礙然為受所魘而未能用故受陰消歇即能離身反觀去住無礙也妄起見覺汩擾湛性名見濁即受陰之體也故受陰盡即超之因違順之幻境生損益之妄受則受陰無體虗有所明故曰虗明妄想為本二辨現境十一抑伏生悲阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自消歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜此中受陰定中也既破色陰無復幽黯故得大光耀知受陰為咎故內自抑伏以破之抑伏大過失於慈柔故多悲愍以致悲魔附焉二感激生勇阿難又彼定中諸善男子見色陰消受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越悟則無咎非為聖證覺了不迷久自消歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜色盡受現為定之勝相因喜成功故感激勇動以為佛果可齊功行易致陵率之過故狂魔附焉今夫以少為足驕狂犯分自視無前者皆陵率之過也三慧劣迷憶又彼定中諸善男子見色陰消受陰明白前無新證歸失故居智力衰微入中隳地逈無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜凡修觀行須定慧等持乃能無失今此定強智微而受陰未盡故進無新證色陰已消故退失故居進退之間杳無所依名中隳地以無依無見故枯渴沉憶而憶魔附焉憶心妄系故如有撮懸也四定劣失審又彼定中諸善男子見色陰消受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足此名用心亡失恆審溺於知見悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜前以定強智微此又慧力過定皆互有所失故欲等持也大意如科五失守生憂又彼定中諸善男子見色陰消受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵牀如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劒自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜進退失守故心生艱險以成邪憂自致患害也六妄著生喜又彼定中諸善男子見色陰消受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路旁自歌自舞自謂已得無礙解脫失於正受當從淪墜定力暫爾無慧自持故妄著成咎七見勝生慢又彼定中諸善男子見色陰消受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是㲲華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失於正受當從淪墜慢名有七恃己凌他名我慢同德相慠名慢於同爭勝名過慢於勝爭勝名慢過慢未得謂得名增上慢以劣自矜名卑劣慢不禮塔廟等即邪慢也今之妄人不禮不誦皆慢魔也㲲華寶巾類也八得少為足又彼定中諸善男子見色陰消受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失於正受當從淪墜以色消為精明以精明為圓悟遂以為得大隨順而輕清自在皆得少為足無聞之儔也九執空撥無又彼定中諸善男子見色陰消受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜因得虗明誤執斷空成諸邪咎凡為此者皆空魔也十綿味發愛又彼定中諸善男子見色陰消受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證若作聖解則有欲魔入其心腑一向説欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失於正受當從淪墜愛心多因順起故定境順心即邪愛成咎三結勸深防阿難如是十種禪那現境皆是受陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道諸陰結文皆云保持覆護等即深防邪誤助道之意也三想陰五初示陰相阿難彼善男子修三摩地受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇想者心慮浮相識情妄習能覆妙明障聖道故雖得受陰盡其心離身去住自由已為成就聖位得意生身之因然尚為想陰所覆故譬熟寐寱言也雖未即得而因已成就故譬無別所知而已成音韻也如是因相惟想盡者能知故譬不寐者咸悟其語此想陰之相也若動念盡浮想消除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本浮動塵消故無覺明垢無動則生滅想亡覺淨則始終念滅故一倫生死首尾圓照也憶識誦習發知現塵名煩惱濁即想陰之體也故想盡則超之想能融變使心隨境使境隨心如想酢梅能通質礙故名融通妄想二辨現境十一想愛善巧三一定力過失阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧得受陰盡曰虗妙已無受魔曰不遭圓定等者想陰定中也愛圓明求善巧者因其虗妙生愛思於圓明之體以發漚和之用也二天魔得便爾時天魔候得其便飛精附人口説經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座説法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲變現教化示漚和善巧也附人附他人也其人所附人也彼人是人修定人也愚迷有定無慧也三鬼魔兼附口中好言災祥變異或言如來某處出世或言劫火或説刀兵恐怖於人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄十段皆初舉天魔次明鬼魔而舊科不分今按經分之前總敘曰奢摩他中微細魔事或汝陰魔或復天魔或著鬼神或遭魑魅後總結曰是十種魔或附人體或自現形魔師淫淫相傳邪精魅其心腑如受陰中舉悲等十類即陰魔也想陰初舉十類即天魔也次舉兼附即鬼神魑魅也初文皆云潛行貪欲即魔師淫淫相傳也次文皆云口中好言即邪精魅其心腑也怪鬼魃鬼等皆前所舉者二想愛經歷三一定力過失阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷愛遊歷異境也二天魔得便爾時天魔候得其便飛精附人口説經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座説法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲三鬼魔兼附口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智消滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄三想愛契合三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合愛綿㳷者欲密契妙理也二天魔得便爾時天魔候得其便飛精附人口説經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座説法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口説偈或自誦經各各歡娛得未曾有是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲希契合故魔與開悟自開悟下皆密契事也綿愛謂心生愛著也三鬼魔兼附口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄言男女佛意彰媟欲疑誤行人也四想愛辨析三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析愛窮萬化之本故爽其心以辨析二天魔得便爾時天魔候得其便飛精附人口説經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座説法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲將佛涅槃等者以肉身為果德以幻生為常住而撥無淨土報體皆因其辨析化元而妄為混融之説也三鬼魔兼附口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄以穢染為真淨亦意引媟欲也五想愛冥感三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感欲希功行效驗也二天魔得便爾時天魔候得其便飛精附人口説經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座説法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛粘如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲化百千歲之形假前世知識以現冥感也三鬼魔兼附口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此名癘鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此皆現冥感也舉光明天將引入魔境也六想愛靜謐三一定力過失又善子受受陰虗妙不遭邪慮圓定發明三摩地中心愛深入尅己辛勤樂處陰寂貪求靜謐愛深入幽靜以澄養通力也二天魔得便爾時天魔候得其便飛精附人口説經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座説法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌邪定能具五通本業宿業也畜生後報也此二宿命通也知肇他心通也訐露眼耳通也發人私事曰訐露三鬼魔兼附口中好言未然禍福及至其時毫髮無失此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄七想愛宿命三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命好知潛匿異事及宿命也二天魔得便爾時天魔候得其便飛精附人口説經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座説法是人無端於説法處得大寶珠其魔或時化為畜生口䘖其珠及雜珍寶簡䇿符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌寶珠簡册等皆潛匿異事三鬼魔兼附口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄八想愛神力三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力化元萬化之本也欲乘之以發神變二天魔得便爾時天魔候得其便飛精附人口説經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座説法是人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙唯於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌以愛神變故現撮火履水等事若真神變則不懼刀兵三魑魅兼附口中常説神通自在或復令人旁見佛土鬼力惑人非有真實讚歎行淫不毀粗行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄猥媟淫僻事也九想愛深空三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空欲入滅定以趣空寂也二天魔得便爾時天魔候得其便飛精附人口説經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座説法於大衆內其形忽空衆無所見還從虗空突然而出存沒自在或現其身洞如琉璃或垂手足作栴檀氣或大小便如厚石蜜誹毀戒律輕賤出家因其好空故依空眩惑三精怪兼附口中常説無因無果一死永滅無復後身及諸凡聖此説皆乘其空見而發也近世邪宗妄謂參須實參見須實見遂以因果後身天堂地獄非親見者一皆撥無故得其説者咸謂善惡渺茫浮生不再於是忘戒撿恣淫樂飲噉昏荒以自斷送僥幸顯處掊尅侵虐真謂無天堂地獄矣愚每痛之因箋釋及此感發奮筆冀悟魔説無自陷溺也雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄日月薄蝕精氣流注能為金玉之類十想愛長壽三一定力過失又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住三界惑盡方離分段生死得變易生死今功未成妄希即惑矣研幾謂研窮幾微以深求也細相云者欲變粗為細求久住世也二天魔得便爾時天魔候得其便飛精附人口説經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座説法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此信心疑佛現前萬里瞬息乃得變易者之事三魔眷兼附口中常説十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞汝當先覺不入輪回迷惑不知墮無間獄陀羅尼經有遮文茶天毗舍童子即毗舍遮鬼隸四天王已發心則護人未發心則害人以彼定力虗明為利故食其精氣或不因師者不因魔附之師而親見魔現也口兼獨言間出異語也三總會詳示阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺讚歎淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑近則九生多逾百世令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄涅槃經曰末世魔屬現比丘羅漢等像混壞正法非毀戒律其意同此四敕令弘宣汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩始以阿難起教終復囑令弘宣足知大教源流浚發遐被無非阿難之力則示遭魔事徵心辨見皆為末法起大慈悲令不著魔得正知見也當知昔雖四派示滅今之法化常存與夫在處影響無非留願之身也五結勸深防阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道音切撮此活切寱音藝鋭以芮切謐音密訐居謁切䇿音册牘音讀肥父非切猥烏罪切媟音泄薄音博蝕音食幾音機
