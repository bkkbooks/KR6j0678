body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解四令除妄本此證果漸次也前既令識妄因此復令除妄本者知賊所在即須討除使陰仇殄蕩性宇晏清然優遊趣證得無艱險文二初牒舉本因阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想十二顛倒即動顛倒欲顛倒至殺顛倒也以是妄擾真心而成八萬四千亂想二正令除妄二初總告三法汝今修證佛三摩地於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進達其現業五辛為助淫殺為正緣斷則違二詳明三法三一除助因云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切衆生皆依食住阿難一切衆生食甘故生食毒故死是諸衆生求三摩地當斷世間五種辛菜四食者人間段食謂所餐必有分段鬼神觸食但歆觸而飽禪天則思食食至或但思之則飽識天識食既無形色但以識想此直明衆生皆依食住而因食誡斷五辛不必他引也五辛一大蒜二茖葱三慈葱四蘭葱五興蕖五者葷穢內發淫恚外引邪魅故名助因俗齊不茹況真修者是五種辛熟食發淫生噉增恚如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其脣吻常與鬼住福德日消長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難修菩提者永斷五辛是則名為第一增進修行漸次二刳正性云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無噉生氣阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊欲刳淫殺正性必持戒律不飲酒防亂之至也不晱生防殺之至也律中五果皆須火淨示不噉生氣也淫如毒蛇怨賊者能害法身殺慧命故先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起執身使無犯也執心使無思犯也禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債淫殺相襲偷劫相負由無禁遏故禁戒成就二業永無是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險業性刳盡則妙性圓明是則名為第二增進修行漸次三違現業云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸流逸奔塵起現前業由戒禁制得不流逸斯能違遠因不流逸旋元自歸塵既不緣根無所偶返流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍流則分湛合塵故不流則旋元無偶遂能反六用之擾全一真之湛譬之川水反流全一斯自淵澄湛性淵澄故國土身心妙圓清淨與如來合故一切如來密圓之心淨妙之性皆現其中也華嚴十忍第三曰無生法忍謂不見有少法生不見有少法滅離諸情垢無作無願安住是道名之曰忍言法忍者揀異二乘伏忍也從是漸修隨所發行安立聖位是則名為第三增進修行漸次業淨性明乃可發行升進聖位五十七位各隨行相立名使觀其名義知所修進也五歷示聖位十一一乾慧地阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓瑩十方界乾有其慧名乾慧地欲愛潤惑根境造業生死相續唯此而已故欲枯境謝則殘質不續無所汩雜故執心虗明純是智慧然初入位未與如來法流水接則乾有其慧而已聖位始於十住而以信為初因又於信前立乾慧地前立四加妙前立金剛乾慧者此三為轉位關要升進方便初從凡發迹慧性不圓不能入信成賢賢行既成不加功用不能登地成聖聖位既終非金剛慧斷最後細惑蕩前位緣影不能造妙成佛故也二十信聖位以信為初因者純真無妄之謂信又相應之謂信必先審中中圓妙之道令純真無妄然後發行使心法相應則等妙雖懸可以徑造也文十一信心欲習初乾未與如來法流水接即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住捨欲愛超乾慧猶在凡地未入法流故須於如來薩婆若海中中流入無所偏滯則圓妙之性於是開敷然猶餘妄習非真妙圓又須從真妙圓重發真妙而常住妙信使一切妄想滅盡無餘中中之道純真無妄故名信心住餘皆由此增進更無別法但隨位依真妙性淨治惑習單復練磨使纖塵不立即登妙覺也二念心真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住心真而明則一切圓通而陰等不礙故能洞照宿習憶治無遺三精進心妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心妙圓通性既純既真則妄習皆化唯一精明而進乎真淨行無雜糅故名精進四慧心心精現前純以智慧名慧心住妄習既盡故心精現前而進趣云為純智無習矣五定心執持智明周遍寂湛寂妙常凝名定心住慧既純明須定以持之使周遍寂湛寂妙之體常凝不變乃名定心六不退心定光發明明性深入唯進無退名不退心以定持慧至於寂湛故性光發明而深入於道七護法心心進安然保持不失十方如來氣分交接名護法心既能深入又能保持使道同十方氣合如來是謂護法八回向心覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重得相入名回向心由護法心進合如來得妙覺明護持不失故能妙回向回佛慈光則回果向因也向佛安住則回因向果也因果交參體用互攝故譬雙鏡云云九戒心心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住由回佛心光而得之於我故曰獲佛常凝無上妙淨常凝則對境無動妙淨則涉塵不染而戒心成矣十願心住戒自在能遊十方所去隨願名願心住對境無動涉塵不染是謂住戒自在無動無染則無適不可故能遊十方所去隨願也修行之初必枯絶欲愛使心性虗明然後能入法流開妙圓性真性明圓細習乃現遂發行治之使純智無習又持之以定使寂湛發光深入於道護持不失斯能回佛慈光獲佛淨戒而涉塵不染所去隨願此十信之序也三十住從信趨入生如來家依無住智永不退還名住文十一發心住阿難是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住真方便妙慧也此十心十信也十心頓發圓成一心住佛智地名發心住聖位以十信為初因以十住十行十願十地為漸次而終於等妙皆相躡而設欲令行人從信趨入住佛智地而依智起行濟行以願由是超三賢入十聖登等妙此修證之序也二治地住心中發明如淨琉璃內現精金以前妙心履以成地名治地住心中發明內外精瑩牒心精發暉義也履是妙心以為真基名曰治地如將築室必先治地乃可興作也三修行住心地涉知俱得明了遊履十方得無留礙名修行住由內外精瑩治成心地故所涉所知俱得明了則任運修進得無留礙四生貴住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住妙行密契則妙理冥感將生佛家為法王族故名生貴中陰諭冥感之理也現陰已謝後陰未生之中名曰中陰五方便具足住既遊道胎親奉覺胤如胎已成人相不缺名方便具足住同妙行之氣分冥妙理之中陰是遊道胎奉覺胤也道胎既成故妙相不缺而修行方便具矣六正心住容貌如佛心相亦同名正心住容止外同心相內異非正心也七不退住身心合成日益增長名不退住同佛之德有進無退八童真住十身靈相一時具足名童真住具體而微故以童稱十身者菩提身願身化身力身莊嚴身威勢身意生身福身法身智身也九法王子住形成出胎親為佛子名法王子住自發心至生貴名入聖胎自方便具足至童真名長養聖胎至此長養功終故喻出胎王子十灌頂住表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住國大王天子也嫡嗣曰太子剎利王諸王也嫡嗣曰世子將付國位取大海水灌頂表為王當承用衆智今此位衆德潛備堪任佛事故表以成人陳列灌頂也言以國事分委則非正付國位特表成人而已蓋此方極十住若十地行滿乃堪正付故華嚴十地菩薩受佛職位比輪王太子受職夫發心必治地治地乃修行修行然後生如來家而具覺相同佛心長道體圓十身為佛子任佛事此十住始終之序也四十行既依普智住佛所住遂能繁興妙行自利利人文十一歡喜行阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行具佛妙德故能十方隨順無適不可自他利備機應俱喜名歡喜行二饒益行善能利益一切衆生名饒益行善推妙德益以利人三無嗔行自覺覺他得無違拒名無嗔恨行嗔恨生於違拒四無盡行種類出生窮未來際三世平等十方通達名無盡行觸類而長隨機而應利行無盡五離癡亂行一切合同種種法門得無差誤名離癡亂行於法不了曰癡於行紛錯曰亂今能一合於法得無差誤故離癡亂六善現行則於同中顯現群異一一異相各各見同名善現行由無癡亂故能於種種法門互現隨應圓融自在所謂善現七無著行如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行此由善現行充擴圓融也塵中現剎名現界不壞塵相名現塵八尊重行種種現前咸是第一波羅蜜多名尊重行種種所現皆是般若性德無作妙力自在成就故名尊重金剛稱第一波羅蜜即般若也九善法行如是圓融能成十方諸佛軌則名善法行十方諸佛以是成道以是利生十真實行一一皆是清淨無漏一真無為性本然故名真實行總括前行無非真性本然妙用相雖萬殊體唯一真故名真實如是十行乃至後位不離前法而皆相躡別設者一使行人隨位增進開擴性覺淨治惑障而成熟佛果也五十回向亦名十願前十住十行出俗心多大悲行劣此須濟以悲願處俗利生回真向俗回智向悲使真俗圓融智悲不二是名回向修進妙行至此備矣文十一救護衆生離衆生相回向阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅諸度相向無為心向涅槃路名救護一切衆生離衆生相回向滿足神通至遠諸留患牒前現塵現界不相留礙等事謂此行滿足當修回向行也回向之行悲願最深故職在度生然見有可度即涉有為背涅槃路故須滅除度相回向無為心向涅槃路也二不壞回向壞其可壞遠離諸離名不壞回向壞其可壞謂遠離一切虗妄境界也遠離諸離謂離遠離幻亦復遠離也得無所離即除諸幻而證不壞矣三等一切佛回向本覺湛然覺齊佛覺名等一切佛回向無壞不壞無離不離乃湛然齊佛四至一切處回向精真發明地如佛地名至一切處回向覺湛故精真發明地如佛地前覺等一切則真如體遍也此地至一切則真如界遍也五無盡功德藏回向世界如來互相涉入得無罣礙名無盡功德藏回向真界真體二俱圓遍故涉入無礙任運發輝德用無盡六隨順平等善根回向於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向同佛地即前地如佛地也於一切處各起淨因取涅槃道是謂平等善根七隨順等觀衆生回向真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向平等善根性真圓融周遍法界故十方衆生皆我本性我善既成故能成就一切衆生善根無有遺失無有高下名隨順等觀八真如相回向即一切法離一切相唯即與離二無所著名真如相回向如故即真故離有即有離是假真如二無所著乃真真如也九無縛解脫回向真得所如十方無礙名無縛解脫回向依假真如則不無滯礙是有縛解脫唯真得所如故一切無礙乃名無縛解脫十法界無量回向性德圓成法界量滅名法界無量回向初證性德以為齊佛以為如佛以為至一切處等皆存量見則法界性未離有量及乎性德圓成乃滅量見乃得無量此總治前位限量情見也此性圓成可超三賢入十聖矣六四加行三賢位極當於此際復加功行即入聖位文二一牒前總標阿難是善男子盡是清淨四十一心次成四種妙圓加行四十一心者乾慧一信住行向各十小乘通教皆有四加而非妙非圓故此特稱妙圓加行二詳開行位四一暖位即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地佛覺果覺也前雖能齊未能正證今極賢位將趨聖果即須用佛果覺為己因心復加功行以求正證火喻果覺木喻因心鑽喻加行初入因位未即得果故譬鑽火方得暖相二頂位又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地前以佛覺為己心此以己心成佛行則因心果覺已鄰極矣故譬如登高山身入虗空但因果未融心迹尚滯故云下有微礙然已到頂地少需㩳進則微礙除矣三忍地心佛二同善得中道如忍事人非懷非出名為忍地己心佛覺融為一體曰二同因果兩忘二邊不立曰中道此中道果覺將證未證故如忍事人非懷非出四世第一地數量消滅迷覺中道二無所目名世第一地前位謂之二同則已墮數量見有中邊則強分迷覺此俱泯滅而名亦不立脫世情量超於三賢故名世第一若進十聖極乎妙覺乃出世第一也七十地蘊積前法至於成實一切佛法依此發生故謂之地也自十信已還位皆躡跡相資直趨妙覺於中不無斷證是皆不斷而斷不證而證或說每地斷一障二愚修一波羅蜜名相煩紊辭義迂闊故今略之直取躡迹相資之義而釋庶修進者煥然易悟耳文十一歡喜地阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地向雖覺齊佛覺未能盡佛菩提境界今由加行妙圓故善能通達而盡之矣由是法喜復增故復名歡喜二離垢地異性入同同性亦滅名離垢地通大菩提盡佛境界則一切障礙即究竟覺衆生國土同一法性是異性入同也然見異見同還是情垢至於同性亦滅乃名離垢三發光地淨極明生名發光地情見之垢淨則妙覺之明生四焰慧地明極覺滿名焰慧地明極覺滿如大火聚一切緣影悉皆爍絶故名焰慧五難勝地一切同異所不能至名難勝地前雖異性入同同性亦滅猶有能至之境此以焰慧爍絶故一切同異所不能至至尚不能孰能勝哉六現前地無為真如性淨明露名現前地人莫不有真如淨性蓋常為一切同異之所掩蔽故同異不至則明露現前七遠行地盡真如際名遠行地真如現前分證則局盡際乃遠逈超極造故名遠行八不動地一真如心名不動地既盡其際乃全得其體一真凝常故名不動九善慧地發真如用名善慧地既得真體斯發真用凡所照應無所不真無所不如故名善慧阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位此結前顯後也聖位總束有五一資糧三賢也二加行四加也三通達初地也四修習即此也五無學妙覺也自初發信至超賢入聖皆修習之事而此位已超八地無功用道智悲並圓則修習之功終畢於此故名修習以結十地之因也次後乃十地之果無復修習矣華嚴十地以金剛藏表因解脫月表果亦以因地有修果地無修也問後位既無修習復有斷障之事何耶曰此明智悲功終得十地果而已若論斷障則等覺之位猶是修習故至妙覺乃名無學十法雲地慈陰妙雲覆涅槃海名法雲地慈陰妙雲十地果德也涅槃海妙覺果海也十地果滿智悲功圓無復自利純是利他故大悲之陰充遍法界無心無緣而應彼心緣施作利潤而本寂無作稱合如來大寂滅海故云覆也八等覺位如來逆流如是菩薩順行而至覺際入交名為等覺十地菩薩混俗利生與如來同但所趨逆順與如來異蓋如來逆生死流出同萬物菩薩順涅槃流入趨妙覺已至覺際故名入交與佛無間故名等覺即解脫道前無間道也此雖齊等未極於妙蓋能順能入而已須於大寂滅海逆流而出妙同萬物乃名妙覺也九金剛慧阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地此名等覺後心妙覺伏道妙覺之道無別行相但從初乾慧至等覺已復起金剛心從初重歷諸位破斷微細緣影最後無明使纖塵不立乃可入妙為其復從初位以始故名金剛心中初乾慧地識陰盡者能入菩薩金剛乾慧即此也前名乾慧以未與如來法流水接此名乾慧以未與如來妙莊嚴海接名雖乍同義乃逈別十妙覺如是重重單復十二方盡妙覺成無上道圓覺有單復圓修之義今此獨由信心以歷諸位曰單兼金剛心重歷諸位曰復十二者乾信住行向暖頂忍世地金等是也十二為因妙覺為果故單復十二方盡妙覺成無上道是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入此教其用金剛心成就妙覺之方也種種地十二位也十喻者幻人陽𦦨水月空華谷響乾城夢影像化也了法如此則頓忘情解纖塵不立故曰清淨修證奢摩他毗婆舍那云止觀言如來者揀異小乘十一總結功用阿難如是皆以三增進故善能成就五十五位真菩提路作是觀者名為正觀若他觀者名為邪觀三增進三漸次也聖位皆資之以成就也信住行向地為五十并乾慧四加等妙有五十七位獨指五十五為菩提路者等妙乃菩提之果由是路以趣證也或指金剛觀察及止觀為三增進四結經分正宗未終而遽結經者自初示密因次開修證而卒乎極果則經之正範畢矣故於此結也後之二科戒備失錯深防邪誤特助道而已故於後別列乃正助之辨也文二一請問經名爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持二如來標示五一標藏心法眼佛告文殊師利是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼大佛頂白傘蓋無上寶印者體極含覆超情離見即如來藏之心印也證佛心要必契於此十方如來清淨海眼者照窮剎海淨絶纖塵即爍迦羅之法眼也開佛知見必資於此實大事因緣非小智之法故以文殊請問二明濟度妙力亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海阿難為親摩登為因舉斯二者明有緣皆度也無上正覺由此經得一切智海由此經入三明果人同修亦名如來密因修證了義如來正果藉此為因權乘修證皆不了義四明衆德大備亦名大方廣妙蓮華王十方佛母陀羅尼呪體極無外方正平等周遍含容名大方廣因果同彰染淨不滯於法自在名妙蓮華王出生十方一切諸佛總一切法持無量義名十方佛母陀羅尼呪五明因人同證亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持菩薩由此受佛職位故名灌頂章句五助道分二一別明諸趣戒備失錯文云令持戒者謹潔無犯不入邪見即戒備意也文二初阿難繼請二初結前讚謝說是語已即時阿難及諸大衆得蒙如來開示密印般怛羅義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱此結敘時衆獲益下乃讚謝也開示密印至增上妙理通指前經奧義也印證藏心清淨含覆一切決了是謂密印般怛羅了義也以明心見性為因以等妙極證為果纖塵不立情解兩忘心慮灰凝細惑頓斷是謂禪那修進增上妙理也修道所斷俱生細惑大乘入地永伏至佛地方斷小乘於三界分九地地各九品初果斷欲界前六品而證二果斷後三品而證三果斷上二界各九品而證無學今此增上頓斷故言三界六品其餘三品必須佛地方斷雖三果能斷九品特分斷漸伏而已即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沉惑令我今日身心快然得大饒益正讚謝也俱生幽隱故曰沉惑二正請後法三一正問世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道前說真淨妙心本來圓遍則法界一真萬動一體宜無諸趣之異其如方今現有乃常情所疑故或執諸趣而迷妙圓之體或執妙圓而撥諸趣之業以致失錯墮落故特請問冀行人詳明而知所戒備也世尊此道為復本來自有為是衆生妄習生起自妄發生非本來有二引事世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷人阿鼻地獄此諸地獄為有定處為復自然彼彼發業各私受不斷三業各各有私衆同分中非無定處也琉璃匿王太子廢父自立挾宿嫌誅釋種佛記其七日當入地獄王泛海以避水中自然燒滅善星比丘能說十二部經獲四禪果因狎邪友妄言無佛無法無有涅槃故生陷無間此皆謬執妙圓撥無業趣者也三結請惟垂大慈發開童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯音切胤羊晉切鑽祖官切復音福
