body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解四敕選三初告敕文殊於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就歸元證性雖無差別隨方應機脫有難易故須假大智選擇也二奉命選擇二初緝綴文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神說偈對佛二正文二初總敘四一標本覺海性澄圓圓澄覺元妙覺湛性海本自澄圓標圓體也圓澄之覺妙乎萬物標圓用也此人人本來圓通者也二敘妄元明照生所所立照性亡迷妄有虗空依空立世界想澄成國土知覺乃衆生從元妙中忽起妄明曰元明妄有所照曰生所所謂覺非所明因明立所也所明既立則照性隱矣亡非無也入亡而已性真既隱空覺遂分根器二界遂因迷頑妄想安立故妄想凝結則成無情國土妄識知覺則成有情衆生則彼澄妙者遂莫得而圓莫得而通矣三融通空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有牒上以明迷澄圓而成根器融根器則歸澄圓也大覺海中本絶空有由迷風飄鼓妄發空漚而諸有生焉迷風既息則空漚亦滅所依諸有遂不可得而空覺圓融復歸元妙矣諸三有指微塵國中三有也四料揀歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同倫二十五聖同一圓通所謂無二所謂多門在夫聖性逆順皆通不容料揀其如初心遲速異宜故須選擇也二別選五一揀六塵色想結成塵精了不能徹如何不明徹於是獲圓通音聲雜語言但伊名句味一非含一切云何獲圓通香以合中知離則元無有不恆其所覺云何獲圓通味性非本然要以味時有其覺不恆一云何獲圓通觸以所觸明無所不明觸合離性非定云何獲圓通法稱為內塵憑塵必有所能所非遍涉云何獲圓通憍陳那大迦葉等各因六塵悟圓而此皆揀去者彼所謂聖性無不通此所謂初心不同倫則凡所不取皆以不宜初心意取耳根獨宜也今揀六塵以色能起想結塵使精性不徹聲唯局名句味不該不遍味意味也伊猶惟也香味觸如文法塵非相獨意能緣內潛意根故稱內塵二揀六根見性雖洞然明前不明後四維虧一半云何獲圓通鼻息出入通現前無交氣支離匪涉入云何獲圓通舌非入無端因味生覺了味亡了無有云何獲圓通身與所觸同各非圓覺觀涯量不冥會云何獲圓通知根雜亂思湛了終無見想念不可脫云何獲圓通鼻闕中交故云支離舌不因味而能覺了乃為無端身與所觸各成涯異是不冥會也三揀六識識見雜三和詰本稱非相自體先無定云何獲圓通心聞洞十方生于大因力初心不能入云何獲圓通鼻想本權機秪令攝心住住成心所住云何獲圓通說法弄音文開悟先成者名句非無漏云何獲圓通持犯但束身非身無所束元非遍一切云何獲圓通神通本宿因何關法分別念緣非離物云何獲圓通三和根境識也眼識因三者和合窮之本自無體故曰非相普賢菩薩用心聞故能知他方沙界外事此由修法界行大因所生非初心能入也孫陀散亂佛欲攝住其心令觀鼻端此特權機而已蓋真心無住有住則妄也富那說法由舌識發開悟先成則不宜初心波離持戒使無所犯但撿束一身而已是不該不遍也目連神通緣念如意然本乎宿熏非關意識而且有念有緣非圓通也法分別即意識也四揀七大若以地性觀堅礙非通達有為非聖性云何獲圓通若以水性觀想念非真實如如非覺觀云何獲圓通若以火性觀厭有非真離非初心方便云何獲圓通若以風性觀動寂非無對對非無上覺云何獲圓通若以空性觀昏鈍先非覺無覺異菩提云何獲圓通若以識性觀觀識非常住存心乃虗妄云何獲圓通諸行是無常念性元生滅因果今殊感云何獲圓通持地平填尚涉有為非實聖性月光水觀未離想念難契如如蓋如如之理非覺觀之法故也烏芻瑟摩聞說欲火而生厭離是厭有也琉璃光觀風性動則與寂對有對非覺也晦昧為空故空昏鈍彌勒修唯識觀而所觀之識念念生滅存心觀之已妄況獲圓通耶勢至修念佛行而念性即生滅法依生滅因求常住果是殊感也五選耳根七一敘己見我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入聖人設教隨方不同或有佛土以佛光明而作佛事或有佛土以佛菩提樹而作佛事乃至或以園林臺觀或以虗空或以寂無說示如香積佛國無文字說但以衆香令諸天人得入律行而此方教體必藉音聞欲取正定必由聞入者各隨機緣故也蓋彼諸佛土無非利智故機緣默契出乎言象而堪忍衆生迷本循聲昏惑障重必須聞熏聞修以消塵除障然後可入然以聞為入者特得其門而已必期於遺聞反聞然後為至也夫至於遺聞反聞則佛光明菩提樹乃至寂無說示處皆可入矣曹溪少室固以是為佛事也二歎觀音離苦得解脫良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住初聯總歎觀世言音脫苦與樂也於沙劫入塵國歎三十二應也得自在施無畏歎四不思議十四無畏也妙音觀音歎隨德之名也梵音潮音歎隨名之實也以說法不滯為妙音尋聲救苦為觀音音性無著為梵音應不失時為潮音末聯總結衆德能救世間苦能與出世樂也三明真選三一圓真我今啓如來如觀音所說譬如人靜居十方俱擊鼓十處一時聞此則圓真實觀音所說即從耳門圓照得真圓通等事今頌其圓照真體也二通真目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實初斥眼鼻舌身意不得真通隔垣下獨取耳通之真也三常真音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實動靜有無皆屬聲塵耳根圓離不隨生滅是則常性之真也無聲號無聞指阿難聞鐘事也縱令在夢想不為不思無覺觀出思惟身心不能及讚顯常性也五根皆待意思有無不常惟耳在夢能聞杵音是不為不思而無也其為覺觀乃出乎思惟勝餘根矣四明契機今此娑婆國聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄聲論者依聲論明本聞自性以覺迷本循聲妄取淪替者如阿難者徒事強記誤落邪思豈非循聲之咎耶使能旋倒反聞則無妄淪矣娑婆學者多徒事強記落邪淪妄不知反本故托阿難以警之五宣告阿難七一令諦聽阿難汝諦聽我承佛威力宣說金剛王如幻不思議佛母真三昧金剛如幻三昧即觀音如來所授如幻聞熏聞修金剛三昧也三世諸佛皆從此出故名佛母二令反聞汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞佛佛謂佛之佛性也聞聞謂我之聞性也阿難護持諸佛祕藏而空畜多聞不能反悟故責其空持佛佛不自聞聞意使從聞思修入三摩地者務在反聞自性也三令脫塵聞非自然生因聲有名字旋聞與聲脫能脫欲誰名一根既返源六根成解脫聞耳根也聲耳境也根因境有皆則妄塵故應旋而脫之而無能脫者斯返真源一源返真六皆脫妄矣四獲淨覺見聞如幻翳三界若空華聞復翳根除塵消覺圓淨見聞幻翳通指妄根也三界空華通指妄境也以皆妄故聞復即翳除塵消則覺淨所以一返源而六解脫也五示解脫相三一法淨極光通達寂照含虗空却來觀世間猶如夢中事摩登伽在夢誰能留汝形淨極光達寂照含虗根解脫也却觀世間猶如夢事境解脫也然則摩登正為夢境了不可得誰能留汝使不解脫哉二喻如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性幻師妄性也一機妄識也性由識動故息機歸寂則諸幻無性而各解脫也三合六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念消成圓明淨妙餘塵尚諸學明極即如來一精明識精也六根因之與塵和合而幻作諸妄故一處休復六皆不成而想塵識垢應念消亡得妙圓通矣細惑未盡曰餘塵分證未滿曰諸學惑淨明極即如來矣六結益大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是能旋倒妄反聞自性必資此性成無上道此圓通法門實效也性成如所謂性一切心也七策進此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音涅槃門者出生死證真常之要道也三世果人莫不由此故未來學人當依是法六印定所選誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事捨塵勞非是長修學淺深同說法成就不生不滅涅槃妙心唯耳根為最餘則佛之威神加被令即己事而捨塵勞非始終長修淺深同說之法也欲其長修同說無如觀音法門矣如那律失明而旋見畢陵觸刺而遺身烏芻厭欲而登覺持地待佛而消塵皆即己事而已七結讚勸學頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者真實心如是結讚聞熏三昧真如來藏無漏法門勸使未來依此修證可超餘三昧真實心要如是而已三時衆獲益於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨性比丘尼聞說偈已成阿羅漢無量衆生皆發無等等阿耨多羅三藐三菩提心圓通妙門言下頓開諸佛正果由斯可冀故觀佛菩提及大涅槃身心了然特少進趣耳故譬遠遊未歸明了道路也普會天人皆獲本心乃至得法眼淨者亦悟本聞而消塵旋明故也性比丘尼成阿羅漢者妙性圓通而諸漏永盡也無等等者謂物無與等而能與物為等此得妙圓通上同下合之德也無量衆生皆發是心者因聞是道而希慕願樂也三攝持軌則二初阿難請問阿難整衣服於大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來說如是言自未得度先度人者菩薩發心自覺己圓能覺他者如來應世我雖未度願度末劫一切衆生世尊此諸衆生去佛漸遠邪師說法如恆河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈心迹圓明者前解根結超越器界迹圓明也此悟圓通塵消覺淨心圓明也於是悲昔之迷欣今之悟將以是法應世度生而恐末劫多難邪魔妄作易退覺心難入正定故請攝心遠魔安立道場清淨軌則也二佛慈開示二初讚許爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沉溺汝今諦聽當為汝說阿難大衆唯然奉教二正示二初內攝軌則二初總示三學佛告阿難汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學三藏之中毗奈耶律藏也則大小乘戒通稱也小乘稟法為戒粗治其末大乘攝心為戒細絶其本法戒則無犯而已心戒則無思犯也夫能攝心則定由是生慧由是發三者圓明則諸漏永盡故名三無漏學攝持軌則莫尚乎此二別示四重四重即十戒之初四波羅夷為根本重罪文四一淫六一持則出纏阿難云何攝心我名為戒若諸世界六道衆生其心不淫則不隨其生死相續衆生皆因淫欲而正性命故纏生死若欲愛乾枯則殘質不續矣言其心不淫其心不偷皆使無思犯也二犯則墜墮汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道魔亦多智修禪為不斷淫故不成聖道帶淫修禪必落此類三預令戒備我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路末世衆生無正法眼多被魔惑預須戒備勿遭誘攝也但貪欲愛不顧陷墜名愛見坑四令宣明誨汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨諸經殺戒居首為設化以慈悲為本此經淫戒居首為真修以離欲為本蓋欲氣粗濁染汙妙明欲習狂迷易失正受續生死喪真常莫甚於此故須首戒而為第一清淨明誨也觀阿難起教示遭邪染而厥初發心先厭欲濁至於三漸次中一一首懲然後身心妙圓獲大安隱十信初心由欲愛乾枯而慧性圓明遂階等妙諸世間人由心不流逸而澄瑩生明漸乎六天是故真修內攝必先離欲也五重彰過失二一喻明是故阿難若不斷淫修禪定者如蒸沙石欲其成飯經百千劫秪名熱沙何以故此非飯本沙石成故本質不美求冀謾勞二結顯汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證所謂以金為器器器皆金以土為器器器皆土則因行不可不慎也六勸令必斷必使淫機身心俱斷斷性亦無於佛菩提斯可希冀機者淫心所自發斷性不無觸機則發矣如我此說名為佛說不如此說即波旬說令信正言也波旬魔名二殺九一持則出纏阿難又諸世界六道衆生其心不殺則不隨其生死相續汝負我命我還汝債所以相續二犯則墜墮汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道帶殺修禪必墮神類三預令誡備我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路預須戒備勿遭誘說四令曉權宜阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸濕加以沙石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度之後食衆生肉名為釋子佛化初行隨事漸制權許五淨耳不見不聞不疑自死鳥殘名五神力所化本無命根名淨此乃小乘權宜若真慈真脫皆在所斷故梵網初演涅槃終談莫不切禁也此列五淨而他經或三或七涅槃或九者特開合耳婆羅門淨行通稱也五示惡根本汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沉生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界根本不善終莫成善似三摩地者似則非真為根本妄故六令宣明誨汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨七重彰過失二一喻明是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此等名為欲隱彌露修禪避罪反乃行殺塞耳避人反乃高聲是欲隱彌露也二結顯清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食不誤踐不故仁慈之至猶及草木況食衆生八廣明緣對若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地東方不無裘毳西土不無絲帛各以多分言也劫初之人體有飛光足若御雲由乎食地肥啖香稻故其體堅重足不離地九勸令必斷必使身心於諸衆生若身身分身心二塗不服不食我說是人真解脫者如我此說名為佛說不如此說即波旬說身血肉髓腦也身分裘毳乳酪也身服食心貪求故曰二塗必須併斷也清淨明誨於諸惡緣禁切若此而今人多取牛乳助齊大嚼恣噉不避葷穢是誠何心哉靜揣其來乃腥臊交所發膿血雜亂餘液是欲惡之精脂肉之腴出於糞穢形軀為不淨之至也噉其精則真味欲惡食其腴又何異脂肉清淨真脫者固如是耶五辛菜屬尚不可食較斯過惡倍篩無算速宜除之勿貪爽口腴腸而公違淨誨也或曰昔者大覺受牧女之獻聽阿難之求又何謂耶曰此小乘權宜為枯餒疾患者設耳乃草座應機之事濁世現行之法七寶樹下金剛體中有是事哉不以大乘了義為正而泥權宜不了之說則不唯取乳助齊當執五淨假名而於淨筵法席加籩列爼為大羅剎矣三盜八一持則出纏阿難又復世界六道衆生其心不偷則不隨其生死相續不與而取皆為偷盜分越所酬猶徵其剩況乃盜取得無反徵此所以生死相續二犯則墜墮汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等群邪亦有徒衆各各自謂成無上道邪道奸欺故偷必墮落三預令誡備我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散須防誘攝也四責其貪竊我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄方法也僧祇律云乞食謂之分衛謂分施衆僧衛護道力肇法師云乞食略有四意一為福利群生二為折伏憍慢三為知身有苦四為除去滯著今經令其捨貪不自熟食即除去滯著也成菩提道即衛護道力福利群生也知身為儻寄知世為旅泊無事畜藏無所顧戀皆所謂循方也不能循方而貪叨造業是敗法毀則故號賊人雖服佛之服而不淨活命是假我衣服裨附佛法以貪販利養而已五教令懺捨若我滅後其有比丘發心決定修三摩地能於如來形像之前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異身為業本漏緣無始已來為之貪求為之積債今能捨之作無上業故能酬宿債脫諸漏也蓋一切難捨無過己身難捨能捨則自餘貪愛決能棄捨故曰是人於法已決定心苟能捨身而心不決捨則徒增業苦無益於道故下云必使身心二俱捐捨也佛為宿詬比丘可食馬麥故證果後於毗蘭邑食之示宿債必酬也六令宣明誨汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨七重彰過失是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復道器不完道果終漏八勸令必捨若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與衆生共不將如來不了義說回為己解以誤初學佛印是人得真三昧如我所說名為佛說不如此說即波旬說衣鉢不畜視毀如讚此於利害二途身心俱捨也身肉骨血與衆生共則不私其身不顧其生又捨之至也行能至此則其心不偷可知矣阿含稱所畜物可以資身進道薩婆多論許百物各可畜一皆不了義也四妄六一犯則墮失阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養於四果十地未得謂得名大妄語貪其供養求己尊勝名愛魔妄起邪見謂已齊聖名見魔皆大妄也是一顛迦消滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧一顛迦即一闡提也貝多羅樹以刀斷則不復活喻大妄人永絶善根三苦三塗也二舉真顯妄我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言未學唯除命終陰有遺付云何是人惑亂衆生成大妄語真聖應迹終自韜晦不以密因輕告未學三令宜明誨汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨四重彰過失是故阿難若不斷其大妄語者如刻人糞為旃檀形欲求香氣無有是處挾妄修禪質終不美五深責虗誑我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就牒未得謂得求己尊勝之事而深責也淨名曰直心是道場無虗假故四儀行住坐臥也左傳噬臍謂終莫能及也今之自稱得上人法而妄竊法王者多矣宜以經言為誡六勸令真實若諸比丘心如直絃一切真實入三摩地永無魔事我印是人成就菩薩無上知覺上以紆曲故終莫成就此能絃直故印其成就如我所說名為佛說不如此說即波旬說上文總明四重戒也初標三學而終止四戒者定慧已備前文音切毳初稅切誕音但靴許爪切詃古犬切姦古顏切耗許到切裨音𢍉揖伊入切巵音支捶之纍切詈力智切泄思列切誅音株噬音逝絃胡田切
