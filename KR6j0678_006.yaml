body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解十一廣舉七大圓示藏性前近取諸身顯如來藏故依陰入處界四科以明雖悟一身未融萬法根境尚異見性不圓此復遠取諸物圓示藏性故依地水火風空見識七大以明使悟物我同根是非一體法法圓成塵塵周遍法界頌云若人欲識真空理身內真如還徧外情與無情共一體處處皆同真法界此七大之旨也謂之大者以性圓周遍含吐十方為義所以有七者萬法生成不離四大而依空建立因見有覺因識有知故也前五無情所具後二有情兼之今舉其七則萬法該矣七大皆因識變故總之以識識則性覺之中妄為明覺者也所妄既立生彼妄能故有七大然彼大性先非水火亦非空識全一如來藏體循業發現而已七大既爾萬法皆然凡我依正先非根身亦非器界皆即循業之相性真圓融初無生滅所以阿難蒙佛開示身心蕩然得無罣礙了知世間諸所有物皆即妙心含褁十方反觀幻身起滅無從獲本妙心常住不滅第二大料文終於此實發明要旨修證密因也文二初阿難發起阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬唯垂哀愍開示眾生中道了義無戲論法此依權教問難由四大發起七大因緣自然之義二世尊垂答三初愍告爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍多聞如說藥諦義如真藥二許答汝今諦聽吾當為汝分別開示亦令當來修大乘者通達實相阿難默然承佛聖旨知七大本如來藏是謂通達實相三正答二一總答阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息權教雖說和合都無實義葢彼大性果非和合則如虗空不和諸色殆不然也若果和合則同彼萬變相成相續展轉虗妄又不然也旋火之輪無有實體喻虗妄相成相續之相也阿難如水成冰冰還成水直示大性非和不和之理而起後文故復召告也夫水何合而成冰冰何和而成水七大之性不因和合循業發現如此而已二別答七一地大三一標本汝觀地性麤為大地細為微塵至鄰虗塵折彼極微色邊際相七分所成更析鄰虗即實空性此標色雖可析空非可合將顯地性非和合也塵之細者曰微細之又細曰極微微之又微曰鄰虗極微之塵猶有微色故名色邊際相析極微為七分則微色殆虗故名鄰虗二辯明阿難若此鄰虗析成虗空當知虗空出生色相先立理下辯明汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵析入空者用幾色相合成虗空此明諸變化相非和合法若色合時合色非空若空合時合空非色色猶可析空云何合色合則不應名空空合則不應析色知空非和合則色非和合矣三結顯汝元不知如來藏中性色真空性空真色清淨本然周徧法界隨眾生心應所知量循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義如來藏性萬法一如而循發似異遂有七大之名特體用異稱耳真空者一如之體也故七大皆言真空七大即循業之用也故曰性空真色乃至性空真識體用不二故相依互舉不離妙性故一一言性也不垢不淨曰清淨非和不和曰本然無乎不在曰周徧既非垢淨和合而能成七大萬法者但隨心應量循業發現而已後云汝以空明則有空現地水火風各各發明則各各現此隨心應量之事也背覺合塵故發塵勞滅塵合覺故發真如此循業發現之事也至於十界依正之相萬形纖悉之理莫非隨應循發者也然此觀相元妄無可指陳觀性元真唯妙覺明理絕情謂不容妄度故但有言說都無實義所以第一義諦擬心則差動念則乖惟居一切時不起妄念不用識心分別計度然後相應也餘六同此二火大三一標本阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火火無自體寓物成形故曰無我陽燧鑄銅為之似鏡而凹二辯明阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然于艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生眾名和合詰之各有本根真和合也火名和合詰之各無本根非和合矣優樓頻螺云木瓜林迦葉波云龜氏瞿曇云地最勝亦云日種汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有三物相遼火無方所凡所測度皆妄計也三結顯汝猶不知如來藏中性火真空性空真火清淨本然周遍法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義三水大三一標本阿難水性不定流息無恒如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水此水為復從珠中出空中自有為從月來求則流否則息所謂流息無常也迦毗羅等四皆外道善幻術太陰精月中之水也月望前曰白亭午曰晝方諸取水之珠即陰燧也二辯明阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降不流等者林木不吐流則知水非月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行水非月來又非珠出不從空生即本然周遍非和合矣汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有例火大文三結顯汝尚不知如來藏中性水真空性空真水清淨本然周遍法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義初言汝元不知次言猶言尚言宛言全言曾而終又言元者初言本元自迷所以不知暨再與明猶且未諭故次言猶也後復與明而益不知故言尚轉不知故言宛渾不知故言全甚不知故言曾終不知故復言元也初意恕之終意責之輕重有序矣四風大三一標本阿難風性無體動靜不常汝常整衣入於大眾僧伽梨角動及傍人則有微風拂彼人面此風為復出袈裟角發於虗空生彼人面拂衣則動垂衣則靜所謂動靜不常僧伽梨法衣也二辯明阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地辯非衣出也若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出辯非空生也虗空當滅者謂無風時亦應無空若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂辯非生彼面也風非衣出又非空生非生彼面了無所從非和合矣汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有三者不參二性相隔求風所從杳莫可究信謂本然周徧循業發現也風性或作風心誤也三結顯汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義言法界又言國土者遍界對一人言國土對衣服言五空大四一標本阿難空性無形因色顯發如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少此空為當因土所出因鑿所有無因自生鑿土得空所謂因色顯發也西天貴賤族分四姓如此方四民剎帝利王族也婆羅門淨志也毗舍商賈也首陀農夫也是謂四姓頗羅墮利根也旃陀羅魁膾也此又智愚之族二辯明阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出無異因謂一體也若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空即因不可離因亦非汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出令詳察其非因緣自然也鑿空虗實謂鑿實空虗也上諸巧辯皆遣識心妄計而顯圓融真體也三會通若此虗空性圓周遍本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅會上義而通前文也由上所明非因緣和合則知空性圓徧非生滅法一大既爾餘大皆然故通言地水火風云現前者使觸事而明無他求也阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入若悟虗空性圓周遍本無出入即悟四大性真圓融本無生滅也四結類汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義空與覺亦體用異稱也體用不二故相依而舉一井之空喻一法性也十方之空喻萬法性也由一觀萬由自觀他性無二別特形器妄辯耳六見大四一標本阿難見覺無知因色空有如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異見覺之體本自無知二辯明阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗上總標下詳辯相亡猶相奪也若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成辯非一體也若此見精與暗與明非一體者汝離明暗及與虗空分㭊見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見辯非異體也明暗相背云何或同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異辯非或同非同或異非異也非遷改者明暗遷而見不改也汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出令詳察其性真圓融不涉諸妄也深別曰審審議曰詳當理曰諦諦視曰觀初於地獨言汝觀於火言諦觀其次言更諦觀審諦觀至見重疊而言至識翻覆而言者意同言宛言全言曾之類為其轉不知渾不知甚不知故也見覺空頑非和非合不應見精無從自出當知性圓周徧本無生滅也三會通若見聞知性圓周遍本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅例前會通之文阿難汝性沉淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異生滅同異皆因妄塵非生非異不離妄計離此諸妄即如來藏也四結顯汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅甞觸覺觸覺知妙德瑩然徧周法界圓滿十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義性見等者亦體用相依而舉有見有覺雖覺明之咎而體實性見用實覺精也如一下例餘根也嘗觸即舌根以味合方覺故亦名觸覺觸覺知即身意也七識大四一標本阿難識性無源因於六種根塵妄出根塵識三皆妄相因汝今徧觀此會聖眾用目循歷其目周視但如鏡中無別分㭊汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗示別了之體也此識了知為生於見為生於相為生虗空為無所因突然而出見根也相境也二辯明阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識明非生於見也若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發明非生於相也若生於空非相非見非見無辯自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別明非生於空也若生於空則非是相亦非是見非是見則無所辯非是相則無所緣若無所緣能緣何立又處此非相非見之間識體若空則同龜毛識體若有非同物象既自無體安能有用故曰欲何分別若無所因突然而出何不日中別識明月明非無因也汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出見托根相托境有出可狀無出非相識何所出耶識有分別為動見無分別為澄識動見澄性相隔異見與識隔聞知亦然皆非和合又非自然是則性真圓融不涉諸妄矣三會通若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅此識心總指識大也了別見聞覺知別指六識也兼彼空等總會七大旁通萬法也既本無所從則湛然圓徧地等既爾世界眾生物物皆爾不唯地等名大草芥塵毛皆可名大性真圓融本無生滅矣前文詳辯意皆萃此故自根境萬法總會而旁通也阿難汝心麤浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有識體深潛當微細沉思不可麤浮觀得其真則悟其本如來藏矣四結顯汝元不知如來藏中性識明知覺明真識妙覺湛然徧周法界含吐十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義識知皆出於性明故曰性識明知識雖覺明之咎其體實真故曰覺明真識體用不二真妄一真所以迭舉三時眾造悟自第二卷初發明至此造悟也文二一經家敘悟爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙是諸大眾各各自知心遍十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精徧圓含褁十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅禮佛合掌得未曾有於如來前說偈讚佛自初決擇心見絲至陰入七大多方發明使悟器界萬法當體全真本如來藏是謂微妙開示也既悟器界性真圓融故身心蕩然得無罣礙悟妙覺湛然周徧法界故各各自知心遍十方也覺湛周遍含吐十虗故見十方空如手中葉萬法性真本如來藏故一切所有皆即妙心也悟本心量廣大如此故反觀妄身其微如塵其幻如漚忽無所有而本妙常心了了悟獲於是深慶說偈讚謝也二阿難偈讚三一讚謝二初讚妙湛總持不動尊首楞嚴王世希有妙湛總持即澄圓妙性如來藏體前之屢稱妙覺湛然不動周圓含吐十虗者此也人雖本具要由首楞大定而發阿難既自造悟遂知佛之所以為佛者特此而已故以是稱讚也覺海圓澄物不能汩曰妙湛藏心遍圓含褁十方曰總持體寂如空常住不滅曰不動具此而獨尊三界由此而為諸法王求之世間不可多得是誠希有也次謝銷我億劫顛倒想不歷僧祇獲法身無始迷真妄認緣影即億劫倒想也一蒙開示了獲本心即不歷僧祇也願今得果成寶王還度如是恒沙眾將此身心奉塵剎是則名為報佛恩伏請世尊為證明五濁惡世誓先入如一眾生未成佛終不於此取泥洹既悟自性深感發明之恩故願有所成弘道利生稱佛心而上報也願得聖果智心也還度多眾悲心也智悲雙運廣大無盡即所謂深心也誓入五濁不取涅槃即深心之效也憑此報恩故請佛為證也二重請大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場既讚謝已重請後法庶盡斷惑障成就果願也欲斷惑障須藉雄猛智力大慈悲德故備稱以重請也前發明心見顯如來藏方破見道麤惑次須決通疑滯開修證門以斷修道細惑詳審盡除乃登上覺自第四卷決通疑滯攝伏攀緣即審除細惑之方也既消倒想頓獲法身疑已得果且又願求而更除細惑者佛果有七曰菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智所謂獲法身者則分得菩提自見佛性而已見性之後必須審除細惑使生滅滅生俱寂以合乎涅槃真如白淨純凝以合乎菴摩羅識廓然圓照以合乎空如來藏大圓鏡智七果圓備乃所謂登無上覺也今之學者纔得其二頓忘餘五輕捐教法不復修斷則生滅何時而寂雜染何時而淨交交擾擾何時而廓然昏昏昧昧何時而圓照縱雖見性有為習漏不免復生吾知其倒想依然將又倍於億劫為可歎惜矣聞此首楞畢竟之教快宜勉進疾使一切畢竟也三總結舜若多性可銷亡爍迦羅心無動轉舜若多此云空爍迦羅云堅固謂空性無體尚可銷亡我心堅固終無動轉此依楞嚴定力結前願心自誓究竟畢無退墮願心如此然後聖果可期佛恩可報也音切燧音遂析先擊切爨七亂切鎔音容紆憶俱切泮音判陟知力切滔音叨突陀骨切褁音果爍書若切
