body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解二即六入明如來藏前明五陰此明六入文二初總標復次阿難云何六入本如來藏妙真如性六根吸塵名入二別明六一眼入三一依真起妄阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相即彼者指色陰中目瞪發勞別見狂華明眼入之妄同彼也然目乃浮根勞因瞪發菩提性中皆為幻妄故云同是菩提瞪發勞相二辨妄無實因于明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體因塵發見因根吸塵故有眼入然離塵無體足知虗妄如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入必無明暗等者謂儻無明暗則見無自性又似從明暗生非根生也三了妄即真是故當知眼入虗妄本非因緣非自然性既無所從故非因緣自然本如來藏妙真如性矣餘五例此二耳入三一依真起妄阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相指本無聲耳本無聞妄相感觸故頭中作聲耳入之妄皆如是也必依指喻者明凡聲本無由妄感觸非感非觸彼此寂然則如來藏本然真妙矣耳勞因塞乃至意勞因習妄同眼勞故例稱瞪發二辨妄無實因于動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體耳因動靜發聞猶目因明暗發見也如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入有聞成性謂有所聞則成有性三了妄即真是故當知耳入虗妄本非因緣非自然性三鼻入三一依真起妄阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相畜縮氣也冷因畜有不畜本無鼻入之妄皆如是也餘意例前二辨妄無實因于通塞二種妄塵發聞居中吸此塵象名嗅聞性此聞離彼通塞二塵畢竟無體當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當回嗅汝鼻空自有聞何關汝入一無實義三了妄即真是故當知鼻入虗妄本非因緣非自然性四舌入三一依真起妄阿難譬如有人以舌舐吻熟舐令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相吻非苦甜因勞妄有故不動之時淡性常在舌入之妄皆如是也二辨妄無實因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是嘗苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入例前無實三了妄即真是故當知舌入虗妄本非因緣非自然性五身入三一依真起妄阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因于勞觸兼身與勞同是菩提瞪發勞相身入主觸然觸無自性猶如二手冷熱相涉兩無定勢足知其妄也手不自觸因合覺觸故曰合覺之觸合不自合因離知合故曰顯於離知涉勢若成等者謂以熱涉冷使冷成熱亦則勞觸而已二辨妄無實因于難合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入三了妄即真是故當知身入虗妄本非因緣非自然性六意入三一依真起妄阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相意入主於憶知憶知生於寤寐故托睡寤以明也覽憶為生失忘為滅而住異處中既覽而憶旋失而忘是謂顛倒吸習妄塵中歸意根前念後念次第相續故曰不相逾越此意入之相也二辨妄無實因于生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體意主覺知而根潛身中故云集知居中意著法塵而想像內發故云吸撮內塵文殊云法稱為內塵即過去諸法影像是也亦名落謝塵阿毗曇名無表色皆內塵也逆流謂返緣也意總五根故稱見聞然五根但能順緣現境唯意能返緣五根所緣不及之地如追憶夢境五根無及矣知是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入反覆窮詰一無實義也列子云其寤也形開其寐也形交故云寤寐二相隨身開合三了妄即真是故當知意入虗妄本非因緣非自然性三即十二處顯如來藏二初總標復次阿難云何十二處本如來藏妙真如性六根六塵名十二處二別明六一眼色處三一舉相問處阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相樹林泉池色也能觀此者眼也二辨處無實二一依根辨阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是眼能生色則眼為色性然見空之時既無色相則色性應銷眼中之色性既銷則顯發一切都無色相矣且色空二法對待而顯色相既無何以顯空故曰誰明空質然則計眼生色處者妄也空亦如是者因色例空亦無定處也二依境辨若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色色能生見則觀空之時見無所生故曰銷亡亡即無見誰明空色則計色生眼處者妄也三了妄即真是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性二耳聲處三一舉相問處阿難汝更聽此祇陀園中食辦擊鼓衆集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處來往可辨乃有實處二辨處無實二一依根辨阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鍾聲同來食處如我入城祇園無我喻聲來耳邊則餘處無聲然千衆皆聞則聲處無實矣二依境辨若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鍾聲齊出應不俱聞何況其中象馬牛羊種種音響如我歸園城中無我喻耳往聲處則餘處無耳然異音皆聞則耳處無實矣若無來往亦復無聞前後辨妄皆遣識心分別計度也三了妄即真是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性三鼻香處二一舉相問處阿難汝又嗅此爐中栴檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生栴檀木生於汝鼻為生於空二辨處無實二一依根辨阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非栴檀云何鼻中有栴檀氣稱汝聞香當於鼻入鼻中出香說聞非義計鼻生者妄也二依境辨若生於空空性常桓香應常在何藉爐中爇此枯木藉爇而有非生空矣若生於木則此香質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠四十里內云何已聞香質木也煙非木也離木離煙又遠四十里聞香豈木生哉既非鼻非空非木無實處矣三了妄即真是故當知香鼻與聞俱無處所即嗅與香二處虗妄本非因緣非自然性四舌味處三一舉相問處阿難汝常二時衆中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中二辨處無實二一依根辨阿難若復此味生於汝舌在汝口中秪有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知既無定體味不生舌矣石蜜沙糖也堅如砂石二依境辨若生於食食非有識云何自知又食自知即同他食何預於汝名味之知食不自知因舌知味縱食能知則知不在汝便同他食汝無所預何名知味理既不然味不生食矣若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味虗空無味不可辨明故托鹹以辨三了妄即真是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性五身觸處三一舉相問處阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭二辨處無實二一依手辨若在於手頭則無知云何成觸二依頭辨若在於頭手則無用云何名觸觸因根境能所相感而獨依根明者示萬法一體由妄分能所故有妄觸然在手在頭初無定處即身與觸處皆虗妄矣若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸二者合辨身觸二處皆無實也觸則無成者謂觸須二物一則不成非所非能言皆無實處三了妄即真是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性六意法處三一舉相問處阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所善惡緣慮心也無記昏住心也意緣不出此三而吸撮內塵成所緣法故曰生成法則二辨處無實二一依根辨阿難若即心者法則非塵非心所緣云何成處法既即心則不屬塵故非所緣不成意處二依境辨若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷暖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立法塵非相因意知顯故問為知非知知則屬心然體異於汝又且非塵故同他心量設若非知然此法塵既非色等特由知發今既非知處當何在既於色空之內無所表顯不應存於色空之外況空又非有外也則心緣意處終無實矣三了妄即真是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性四即十八界明如來藏二初總標復次阿難云何十八界本如來藏妙真如性根塵識三各六分內外中名界二別明六一眼色界三一舉相問界阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界眼色眼與色也由徵心云識生其中則為心在故曰如汝所明二辨界無實三一依根辨阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若獨因眼不有色空則識無所緣見無所表界無所立非因眼矣二依境辨若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立若因色生當隨色滅色滅空現當不識知矣若亦識知則是色相遷變汝識獨存獨則無鄰界從何立非因色矣下牒難從變則變界相自無不變則恆既從色生應不識知虗空所在變則無體故界相自無若不隨變則識性常一當一於色應不識空理又不然非從色生矣三根境合辨若兼二種眼色共生合則中離離則兩合體性雜亂云何成界若眼色兼合共生識界當半有知半無知故曰中離若中離者半合根半合境故曰兩合二義推窮皆不成界三了妄即真是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性既不因眼又不因色諸妄併除藏性自顯餘五例此二耳聲界三一舉相問界阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界二辨界無實三一依根辨阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立耳識別了曰知耳形觸聲曰聞皆由動靜而發若無動靜各無所成矣知乃識之體故曰知尚無成識何形貌聞特耳形雜物色觸聲塵而已非耳識也故曰云何耳形名為識界二依境辨若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界若謂識生於聲則識因境有自不關根然不因根聞何知聲所許聲因聞謂聲因聞許也然識從聲生聲即識矣則聞應聞識設若不聞又非界義皆不可也聞則同聲識已被聞誰知聞識若無知者終如草木識為能聞聲為所聞若實聞識識則同聲已為所聞誰為能聞故曰誰知聞識能聞無知則如草木又不可也三根境合辨不應聲聞雜成中界界無中位則內外相復從何成依根依境單論既非不應二者合成識界而為中位中位既無邊界何立三了妄即真是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性三鼻香界三一舉相問界阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界二辨界無實三一依根辨阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取嗅知動搖之性爪形鼻相也動嗅鼻性也若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界名身則非鼻名觸則屬塵故鼻無名若取嗅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在肉質之知屬身故元觸非鼻虗空之知屬空故肉應無覺又應空是汝身則今阿難身空無所在矣此計識因鼻生者妄也二依境辨以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木二物不來汝自嗅鼻為香為臭若知屬香則鼻不預知知不屬香矣若香生鼻則木應無香且伊蘭之臭旃檀之香二物不來鼻作何氣則香不生鼻矣此計識因香生者妄也三根境合辨臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體境二則根亦應二此皆遣識心分別計度也若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立以根一境則境性互奪從何立界若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識眼識因眼而有既不見眼鼻識因香而有應不知香若曰能知即非香生若曰不知即不名識皆不可也香非知有香界不成識不知香因界則非從香建立香不因根則不成香界識不知香則不成識界既無中間不成內外彼諸聞性畢竟虗妄中間識界也內外鼻香界也三了妄即真是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性四舌味界三一舉相問界阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界二辨界無實三一依根辨阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦甘蔗等舉五味也若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味自不生云何立界味因舌嘗若舌本苦則無能嘗者孰為識體若舌本淡既不因境味無所生無味與對從何立界此計界因舌生者妄也二依境辨若因味生識自為味同於舌根應不自嘗云何識知是味非味識自為味謂識即味也同於舌根謂識不自嘗也又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界不應虗空生汝心識識因味生則味多識亦應多識一味亦應一體必味生者牒定識因味生也鹹淡甘辛同為一味者結成識一味亦應一也異識既一異味既同則無分別無別則非識非識則無界此計界因味生者妄也衆味曰和合本味曰俱生轉味曰變異三根境合辨舌味和合即於是中元無自性云何界生根境合混則自性無定從何生界三了妄即真是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性五身觸界三一舉相問界阿難又汝所明所觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界二辨界無實三一依根辨阿難若因身生必無合離二覺觀緣身何所識覺觀即身識也以合離二境為緣二依境辨若因觸生必無汝身誰有非身知合離者無身則不知合離是則因身非因境也三根境合辨阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界物不觸知身知有觸者徒觸不能生知因身然後知觸此明身識由根境合顯也合則當知身即觸也觸即身也若身即觸則身非身矣若觸即身則觸非觸矣身觸互奪故無處所合身則無觸位故即為身體離身則無觸用故即同虗空然則內外中間之位皆不成立縱曰識因觸生從何立界耶三了妄即真是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性六意法界三一舉相問界阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界二辨界無實三一依根辨阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用意識發於所思意根生於法塵二者皆屬前境離此則根無形識無用是必因境則計根生者妄也又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立又辨根識混濫不成因界也識心意識也思量了別意根也同則無復能所異則不能有識二既混濫已無自性則界無所立矣二依境辨若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅五塵各對眼耳五根非意所攝五法各因色空諸緣終無實狀既非意攝又無實狀安能生意識耶所因既無因生有識作何形相相狀不有界云何生前謂識因法生今所因者既隨緣起滅自無實狀則因之生識復作何狀耶狀不有則界亦亡矣三了妄即真是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性既非因緣自然是謂妙真如性音切吸許及切嗅虛救切舐神紙切吻文粉切甜徒兼切踰羊朱切寤音悟撮此活切寐密二切撞音幢銖音殊藉慈夜切爇如悅切
