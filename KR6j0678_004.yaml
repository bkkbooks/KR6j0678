body:
  text: 唐天竺沙門般剌蜜諦譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受溫陵開元蓮寺比丘戒環解八辨明真說甄別疑濫二初阿難通難阿難白佛言世尊誠如法王所說覺緣遍十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我遍滿十方有何差別覺緣即覺性遍緣無乎不在者也前云見性周遍非汝而誰又云即心圓明遍含國土即所謂覺緣遍十方界常住不滅也然黃髮之流亦說真我遍界及所立冥諦謂真性冥冥體非生滅則與佛說何異蓋外道不見性真但依賴耶妄計混濫真說故此問難冀佛甄別也外道通稱梵志投灰苦行外道也二問答質疑四一疑同自然二一疑世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界先引佛語起疑也楞伽會上為大慧菩薩說因緣義以破外道自然之執非彼境界者非同外道所見也我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入群邪獲真實心妙覺明性楞伽雖說因緣破彼妄執今觀覺性有真自然體遠離倒妄則似非因緣及異彼妄執之自然也阿難意以今經所談覺性既非生滅則似乎自然既非自然則似乎因緣恐末學濫解故特與質問二釋佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明釋非自然也真實之告即自住三摩地中等文也自然謂自體本然也自體本然則不隨境變今皆隨變非自然矣二疑同因緣二一疑阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性捨一執一迷者皆然二釋佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞釋非因緣也假物為因循物為緣既無定趣非因緣矣三疊拂直示當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法疊拂遍計直示精覺也因緣自然是非等相皆是妄情遍計分別精覺妙明本無是事故曰離一切相遍計既離則圓成實體觸處現前故曰即一切法祖師所謂但離妄緣即如如佛又曰是非已去了是非裏薦取此離一切相即一切法之意也汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉結上文而責滯情也精覺不可措心如虗空不可措手四引經再辨四初引經問難阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何佛言阿難我說世間諸因緣相非第一義緣生之法因空而有因明而顯因心而知因眼而見是乃世間名相於第一義皆為戲論二委曲辨核阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見因三種光而後能見名和合相非真見體當知真見非和合相不逐緣生不隨境滅阿難若無明時名不見者應不見暗若必見暗此但無明云何無見漸核真見也阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見逆質俗情也若復二相自相凌奪非汝見性於中暫無如是則知二俱名見云何不見順顯真見也明暗自奪見不暫無此即不逐緣生不隨境滅者也三正明見體二初明離緣是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞明暗空塞皆屬緣塵各非見體二明離相四義成就汝復應知見見之時見非是見四義成就汝復應知者結成上義復起下文也上明見非是明乃至見非是塞義既成就次復應知見見之時見非是見蓋知明暗之非見則雖悟見體離緣而未見見體知見見之非見則悟見體離相而真見見體矣四結責勉進見猶離見見不能及云何復說因緣自然及和合相汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路見體尚猶離見而見不能及況諸言說能及哉離緣離相言說不及是謂清淨實相妙菩提路而聲聞但局名相不能通達故勉令善思勿疲怠也前文躡迹廣明身心真妄意在發正知見顯如來藏而學者見見未明覺心未淨故下文重開慧目再淨餘塵使真精瞭然則如來藏存於目擊矣九廣明眚妄重開慧目三初阿難牒請阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨牒前重請也諸和合相即因日月燈然後有見者也不和合相即非明非暗非通非塞者也二佛與開示三初愍衆敕聽爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果憐愍者愍諸有學空溺多聞不開慧目而迷倒輪轉也大陀羅尼等者即首楞正觀也於此能了則顛倒見妄無復發生遂盡諸漏獲菩提果矣二辨妄開示二初總標妄本阿難一切衆生輪回世間由二顛倒分別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見二倒見妄即同別二見也別業言起惑之異妄逐緣影迷失正見同業言感妄所同妄隨生死淪替本覺由此見妄循造妄業故云當處發生隨業受報人天諸趣故云當業輪轉二別釋妄相二一喻明二一喻別業四一舉喻云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊目有赤眚則於燈見重疊之色見有妄病故於境起差別之惑二明妄二一即燈見明妄於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等重疊影光既非燈色又非見色唯彼見者目眚所成喻差別妄見非由境起亦非根起皆是衆生見病所成也唯眚之觀謂唯有眚者見之也名字何等謂色若在根則燈之圓影不得名色矣二離燈見明妄復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影上即燈見既無實體此離燈見又無定處足知其妄矣三結顯妄源是故當知色實在燈見病為影燈有色而無影影由目眚之為智有照而無妄妄由見病所起四了妄無體影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見知影由見病之為則影與見俱眚病耳而見眚者自非病也見眚者即見體也見體本自無病則影見之眚皆為浮妄了不相涉故不應執言是燈是見亦不應執非燈非見如第二月非體非影全即虗妄故不應窮詰也體謂真月影謂水月此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見既了無體何用擬心二喻同分二一廣舉云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至于三十四十五十二局喻阿難若復此中有一小洲秪有兩國唯一國人同感惡緣則彼小洲當土衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹霓種種惡相但此國見彼國衆生本所不見亦復不聞不祥氣現唯災地見之乃同業妄感也彼無災地不見不聞喻有漏境界唯妄覺見之即同業妄見也彼無漏者見本清淨故釋迦化土現淨穢之不同諸天飯食隨福德而有異也暈適珮玦日月之災象也彗孛飛流星辰之災象也負耳虹霓陰陽之災象也惡氣環日為暈日食曰適所謂適見于日月之災也珮玦謂妖氣近日如環珮之狀星芒偏指曰彗如彗也芒氣四出曰孛孛孛然也絶迹而去曰飛光迹相連曰流陰陽之氣或背日如負旁日如耳或明而為虹暗而為霓二法合二一合別業五一標告阿難吾今為汝以此二事進退合明二事者別業眚見同分不祥也法喻互顯曰進退合明二牒喻阿難如彼衆生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎圓影無實則似境而已乃見勞目眚所成非燈色所造喻別業之妄咎由根起非由境也雖由根起特根之妄非見之妄故曰然見眚者終無見咎也前云見眚非病此云見眚者無見咎次云本覺明心覺緣非眚後云皆即見眚非見眚者又云彼見精真性非眚者皆指見體也三正合例汝今日以目觀見山河國土及諸衆生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚器界無實亦似境而已乃無始見病所成非前境所造故曰元我覺明覺所緣眚也見與見緣指妄根妄境也雖似有而無實元則我之覺明見所緣眚而已此眚非他但有覺有見即為眚病所謂知見立知即無明本也然此特覺明之妄非本覺之妄故曰本覺明心覺緣非眚也四牒答覺所覺眚覺非眚中此實見見云何復名覺聞知見所覺即一切可見之境也覺可見之境皆為眚病而此覺性非墮眚中即非可見之境矣見此非可見者即實見見也真見如是云何復以覺聞知見眚中之事而名之哉五結告是故汝今見我及汝并諸世間十類衆生皆即見眚非見眚者彼見真精性非眚者故不名見皆即見眚非見眚者言可見之法皆即眚病非是見體彼見真體本非眚類故不名見此結見非是見也二合同分二一牒喻阿難如彼衆生同分妄見例彼妄見別業一人一病目人同彼一國彼見圓影眚妄所生此衆同分所現不祥同見業中瘴惡所起俱是無始見妄所生引別業例同分引眚妄例瘴惡以明妄業雖異妄本不殊故曰俱是無始見妄所生二正合例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死上以一人例一國此以一國例大千合顯器界根身無非見病和合妄起也覺明無漏妙心即依真起妄者三舉要結答若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住諸和合緣即因境而起妄念粗相不和合者即離緣獨證法執細相此皆諸生死因能虧菩提起生滅汙淨心淪本覺故能遠離則圓滿清淨而本覺常住此章始於阿難請開慧目使覺心明淨故此結答乃開慧目淨覺心之要也三再淨餘塵二一牒疑阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合覺元自本覺而出即始覺也下所謂證菩提心者是也前於妙明本覺疑同因緣自然既與辨質而未明證道始覺非和合生及不和合是為覺心餘塵故再與辨之使明淨也二辨淨二一舉妄情阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者二正與辨四一辨非和五初總問則汝今者妙淨見精為與明和為與暗和為與通和為與塞和設有所和即涉妄塵不名妙淨二別辨若明和者且汝觀明當明現前何處雜見見相可辨雜何形像見相謂見與明相三反辨若非見者云何見明若即見者云何見見明若非見不能見明此疑若相雜也明若即見誰為能見又非雜矣此章皆明浮塵幻相一無實體不容窮詰必見圓滿何處和明若明圓滿不合見和惟見與明體必圓滿不合相和蓋和則間雜非圓滿矣四結成見必異明雜則失彼性明名字雜失明性和明非義牒上結成非和也見既異明若和而雜之則失彼妙淨性名定非與明和矣五例明彼暗與通及諸群塞亦復如是知非與明和餘皆非也二辨非合四初總問復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合和者雜而不辨合則附而不離二別辨若明合者至於暗時明相已滅此見即不與諸暗合云何見暗合則不離故明相滅時見亦隨滅不復合暗三反辨若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗若不合暗而能見暗則與明合時應不見明然既不見明云何言與明合云何了明非暗耶合義不成則證菩提心非和合起明矣四例明彼暗與通及諸群塞亦復如是二辨非非和二初起疑阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶此又捨一執一也二正辨四初總問佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和二別辨若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔和則同而無畔非和則異故必有畔且求畔不得非非和矣三反辨阿難若明際中必無見者則不相及自不知其明相所在畔云何成相及乃有畔畔義不成非非和也四例明彼暗與通及諸群塞亦復如是四辨非非合三初總問又妙見精非和合者為非明合為非暗合為非通合為非塞合二別辨若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理以為非合則根境乖背既不知明亦不顯見二體既無從何甄別合與非合之理耶三例明彼暗與通及諸群塞亦復如是上皆依淨妙見精遣拂情塵也自卷初發明覺性廣辨真妄乃至重開慧目再淨餘塵至此身心灑落真妄兩亡斯可顯示如來藏性使知根塵處界法法圓明物物顯現是為造悟修證大本也十即諸根塵顯如來藏二初括前總顯阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得明暗通塞合非合理皆所謂浮塵幻相和合妄起和合妄滅故曰當處出生隨處滅盡本無有生亦無和合則幻妄稱相而已幻無自性依真而立如華起空全體即空如泡生水全體即水故曰其性真為妙覺明體近取諸身遠取諸物莫不皆然故曰如是乃至等也如來藏者當人法身妙性也依果而稱曰如來含攝衆德曰藏未嘗去來曰常住暗不能昏曰妙明不隨生滅曰不動無不遍足曰周圓妙萬物而至神性一切而不異曰妙真如性能見是性則迷悟生死了不可得矣問真常之性人人本具既無去來生死奈何今之實有耶曰不真常則有真常則不有矣譬之空水目病則華風擊則泡豈其真常哉若晴明澄湛乃謂真常於明湛中靜求華泡夫何所得能審乎此則不疑聖言惟務在了幻妄而復真常也二隨事別明四初即五陰明二初總徵阿難云何五陰本如來藏妙真如性色受想行識五者成體蔭蔽妙明曰五陰二別明五一色陰三一依真起妄阿難譬如有人以清淨目觀晴明空唯一晴虗逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是淨目晴空喻淨智觀妙性故逈無所有勞目華空喻妄因緣幻色故別見狂相此色陰所起也空華喻色陰狂相喻色境皆妄感也二辨妄無實阿難是諸狂華非從空來非從目出如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難辨狂華不因空生明色陰不因境有也有出入則有實體故非虗空非空則實故如阿難體更無所容若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼辨狂華不因目出明色陰不因根生也華從目出則得目之性故應有見今旋時既不見眼又不翳眼非目出矣又見華時目應無翳乃成出義云何見華目尚有翳必見晴空乃號清明眼則目出之義了無定也三了妄即真是故當知色陰虗妄本非因緣非自然性既了幻華無因當知色陰虗妄本非因緣自然即如來藏妙真如性餘四例此二受陰三一依真起妄阿難譬如有人手足宴安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是觸情於境納境於心曰受宴安調適性無違順喻藏性本無諸受也二手空摩妄生澀滑喻妄觸引起諸受也忘生如圓覺所謂忽忘我身言調適之至也二辨妄無實阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合空體常遍不應有擇掌當自出不應有待又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤跡必有覺心知出知入自有一物身中往來何待合知要名為觸若從掌出出必有入然合而出時掌雖有知離而入時臂且不覺既無定實全一虗妄耳三了妄即真是故當知受陰虗妄本非因緣非自然性三想陰三一依真起妄阿難譬如有人談說酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是想無實相由心成相說梅思崖無實相也口水足酸由心成相也凡想如之二辨妄無實阿難如是酢說不從梅生非從口入如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出人談梅而口水梅不能談則計梅出者妄也耳聞梅而心想口不能聞則計口入者妄也耳聞梅而耳無水則計說計聞皆妄也想踏懸崖與說相類類例上義全上妄耳三了妄即真是故當知想陰虗妄本非因緣非自然性四行陰三一依真起妄阿難譬如瀑流波浪相續前際後際不相踰越行陰當知亦復如是妙湛妄動隨境轉徙念念遷謝新新不停故名行陰而譬瀑流也以念念生滅後不至前故曰不相踰越二辨妄無實阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此瀑流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流牒釋流性不因空水非即非離以明行陰無實體也有所有相謂流應離水別有體相也空非有外水流其間水外無流流終依水則非離空水矣三了妄即真是故當知行陰虗妄本非因緣非自然性五識陰三一依真起妄阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是瓶作頻伽鳥形有形無實譬衆生妄身也滿中之空譬識陰也性空真覺周遍法界一迷為識故局在妄身之內如瓶中之空耳內外一空喻性識一體塞其兩孔喻妄分同異也空無往來不可擎餉以隨頻伽瓶故妄有千里之行他國之餉喻性無生滅無捨受以依幻妄身故逃形於此托生於彼比迷性成識妄隨流轉之狀也二辨妄無實阿難如是虗空非彼方來非此方入明性無往來無出入也如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應見空出計有出入皆為虗妄三了妄即真是故當知識陰虗妄本非因緣非自然性身心萬法即如來藏妙真如性道嫌揀擇理忘情謂凡有言說皆為戲論擬心動念盡涉迷倒大覺將與覺之故此卷之初權且明正倒辨緣影擇見精示真量一就其迷倒情計為之拂心眼之塵翳洗肺腸之垢濁使心境灑落真妄兩忘然後融會入如來藏遂知根塵處界法法無非妙真如性此第二及第三卷大旨也音切甄音堅措音醋撮倉括切奪徒活切狹音洽眚所景切揑音涅秪音質暈音運適陟草切珮音佩玦音決虹音紅霓五雞切酢音醋腕烏貫切瀑薄報切踏徒合切崖疑皆切餉式亮切
